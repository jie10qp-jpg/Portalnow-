<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
    <title>PORTAL NOW · G7.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --font: 'Inter', sans-serif;
            --primary: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f8fafc; --surface: #ffffff; --surface-alt: #f1f5f9;
            --text: #0f172a; --text-secondary: #475569; --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12); --radius: 20px; --radius-sm: 14px;
            --transition: 0.25s cubic-bezier(0.2, 0.0, 0, 1.0); --bottom-nav-height: 70px;
        }
        .dark {
            --primary: #0f172a; --bg: #0b1120; --surface: #1e293b; --surface-alt: #334155;
            --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            line-height: 1.5; min-height: 100vh; overflow-x: hidden; max-width: 100vw;
            overscroll-behavior: none; touch-action: pan-x pan-y;
        }
        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 40px; box-shadow: var(--shadow-lg); font-weight: 500; font-size: 15px; color: var(--text); margin-bottom: 8px; }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); border-radius: var(--radius); padding: 30px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); text-align: center; }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin: 20px 0; }
        .bento-card { background: var(--surface); border-radius: var(--radius); padding: 24px 18px; box-shadow: var(--shadow); text-align: center; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
        .bento-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .bento-card.selected { background: #d1fae5; border-color: var(--success); }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; font-family: var(--font); cursor: pointer; }
        button:hover { background: var(--accent-hover); }
        button.danger { background: var(--danger); }
        button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 40px; font-family: var(--font); font-size: 15px; background: var(--surface); color: var(--text); margin: 6px 0; }
        .header { background: var(--surface); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
        .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px 20px; box-sizing: border-box; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); width: 100%; word-wrap: break-word; box-sizing: border-box; max-width: 100%; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 8px 16px; }
        .nav-item.active { color: var(--accent); font-weight: 600; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; border: 3px solid var(--accent); cursor: pointer; }
        .profile-menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; }
        .logout-btn { background: var(--danger); color: white; text-align: center; padding: 16px; border-radius: 40px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .question-block { background: var(--surface-alt); border-radius: var(--radius-sm); padding: 15px; margin-bottom: 15px; position: relative; }
        .question-block .remove-question { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; }
        .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-option { font-size: 30px; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
        .avatar-option.selected { border-color: var(--accent); background: var(--surface-alt); }
        .cheat-warning { background: var(--danger); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 10px; }
        .timer { font-size: 2rem; font-weight: 700; text-align: center; padding: 10px; background: var(--surface-alt); border-radius: 40px; margin: 10px 0; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--surface-alt); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .badge { background: var(--danger); color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-left: 6px; }
        .schedule-slot { display: flex; justify-content: space-between; align-items: center; background: var(--surface-alt); border-radius: var(--radius-sm); padding: 12px; margin: 8px 0; }
        .schedule-slot .slot-info { font-size: 14px; }
        .schedule-slot button { font-size: 13px; padding: 6px 12px; }
        .notif-editor-toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; align-items: center; }
        .notif-editor-toolbar button, .notif-editor-toolbar select, .notif-editor-toolbar input { width: auto; padding: 6px 10px; font-size: 14px; }
        .notif-editor { min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; background: var(--surface); }
        @media (max-width: 640px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body class="light">
<div id="toast-container" class="toast-container"></div>
<div id="modal-container"></div>
<div id="loadingSpinner" class="loading-overlay hidden"><div class="spinner"></div></div>

<!-- LOGIN -->
<div id="pg-login">
    <div style="display:flex; align-items:center; justify-content:center; height:100vh; padding:20px;">
        <div class="card" style="max-width:380px; width:100%; text-align:center; padding:40px 30px;">
            <h1>🔷 PORTAL NOW</h1>
            <p style="color:var(--text-secondary);">HỆ THỐNG HỌC TẬP</p>
            <input type="text" id="u" placeholder="Tên đăng nhập ">
            <div style="position:relative;">
                <input type="password" id="p" placeholder="Mật mã" autocomplete="current-password">
                <span onclick="togglePassword()" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:20px;" id="eyeIcon">👁️</span>
            </div>
            <button onclick="doLogin()" style="width:100%; margin-top:15px;">ĐĂNG NHẬP</button>
            <div style="margin-top:12px; font-size:13px;">
                <a href="javascript:void(0)" onclick="showForgotPwd()" style="color:var(--accent);">Quên mật mã?</a>
            </div>
        </div>
    </div>
</div>

<!-- ADMIN -->
<div id="pg-admin" class="hidden">
    <div class="header"><b>⚙️ QUẢN TRỊ G7.2</b><div><button class="ghost" onclick="toggleTheme()">🌓</button><button class="danger" onclick="locOut()">THOÁT</button></div></div>
    <div class="container">
        <div id="admin-menu" class="bento-grid"></div>
        <div class="card">
            <h3>📈 Thống kê nhanh</h3>
            <div><span id="stat-hv">0</span> Học viên | <span id="stat-teach">0</span> Giáo viên | <span id="stat-parent">0</span> Phụ huynh | <span id="stat-hw">0</span> Bài tập | <span id="stat-sub">0</span> Bài nộp</div>
        </div>
    </div>
</div>

<!-- STUDENT -->
<div id="pg-hv" class="hidden">
    <div class="header"><b id="hv-info"></b></div>
    <div class="container student-content" id="hv-main"></div>
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="sv('home')"><span>🏠</span><span>Trang chủ</span></div>
        <div class="nav-item" id="nav-reg" onclick="sv('reg')"><span>📅</span><span>Lịch học</span></div>
        <div class="nav-item" id="nav-2c" onclick="sv('2c')"><span>📝</span><span>Bài tập</span></div>
        <div class="nav-item" id="nav-2f" onclick="sv('2f')"><span>📋</span><span>Thi cử</span></div>
        <div class="nav-item" id="nav-profile" onclick="sv('profile')"><span>👤</span><span>Tôi</span></div>
    </div>
</div>

<!-- PARENT -->
<div id="pg-parent" class="hidden">
    <div class="header"><b id="parent-info"></b></div>
    <div class="container" id="parent-main"></div>
</div>

<!-- DETAIL PAGE -->
<div id="pg-det" class="container hidden">
    <button onclick="cl()" class="ghost">← QUAY LẠI</button>
    <div id="det-content"></div>
</div>

<!-- CHATBOT -->
<div id="chatbot-toggle" style="position:fixed; bottom:80px; right:20px; width:50px; height:50px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1000; font-size:24px;" onclick="toggleChat()">💬</div>
<div id="chatbot-window" class="hidden" style="position:fixed; bottom:140px; right:20px; width:300px; height:400px; background:var(--surface); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow-lg); z-index:1000; display:flex; flex-direction:column;">
  <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
    <b>🤖 Trợ lý ảo</b>
    <button class="ghost" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
  <div style="padding:10px; border-top:1px solid var(--border); display:flex;">
    <input id="chat-input" placeholder="Nhập câu hỏi..." style="flex:1;">
    <button onclick="sendChat()">▶</button>
  </div>
</div>

<script>
// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
    apiKey: "AIzaSyBGiB7JJq9KZsOIUqGtXmGm2pM8pGmTq0k",
    authDomain: "portalnowpn.firebaseapp.com",
    databaseURL: "https://portalnowpn-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "portalnowpn",
    storageBucket: "portalnowpn.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:abcdef1234567890"
};
firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
const fbAuth = firebase.auth();
const fbStorage = firebase.storage();

// ========== GLOBAL STATE ==========
let db = {};
let user = null;
let isTakingExam = false;
let examTimer = null;
let examEndTime = null;
let currentWorkType = null;
let currentWorkName = null;
let startTime = null;
let cheatCount = 0;
const MAX_CHEATS = 3;
const avatarIcons = ['👤','😺','🐶','🦊','🐨','🐼','🐸','🐵','🦁','🐯','🐮','🐷','🐭','🐰','🐔'];
const realtimeRefs = {};

// ========== UTILS ==========
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function modal(msg, onConfirm, onCancel) {
    const container = document.getElementById('modal-container');
    container.innerHTML = `
      <div class="modal-overlay">
        <div class="modal-box">
          <p>${msg}</p>
          <button id="modal-confirm" class="danger">Xác nhận</button>
          <button id="modal-cancel" class="ghost">Hủy</button>
        </div>
      </div>`;
    document.getElementById('modal-confirm').onclick = () => { container.innerHTML = ''; if (onConfirm) onConfirm(); };
    document.getElementById('modal-cancel').onclick = () => { container.innerHTML = ''; if (onCancel) onCancel(); };
}

function showLoading() { document.getElementById('loadingSpinner').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingSpinner').classList.add('hidden'); }

// ========== DATABASE HELPERS ==========
async function loadDB() {
    showLoading();
    try {
        const snapshot = await fbDB.ref('/').once('value');
        db = snapshot.val() || {};
    } catch (e) { db = {}; toast('Không thể tải dữ liệu', 'error'); }
    if (db.notif_history) db.notif_history.forEach(n => { if (!n.id) n.id = 'legacy-' + Date.now() + Math.random(); });
    if (db.private_notif) {
        Object.values(db.private_notif).forEach(arr => {
            if (Array.isArray(arr)) arr.forEach(n => { if (!n.id) n.id = 'legacy-' + Date.now() + Math.random(); });
        });
    }
    hideLoading();
    initDB();
    updateStats();
}

function initDB() {
    const schema = {
        users: {}, parents: {},
        sked: { t: "Tuần mới", slots: [], isOpen: true, regOpen: '', regClose: '' },
        exams: [], hw_list: [], submissions: [],
        data: {}, notif_history: [], private_notif: {}, forgot_pwd: [],
        bank_info: {}, sked_history: [],
        question_bank: { subjects: {} }, audit_log: [],
        config: { adminPinHash: CryptoJS.SHA256("1234").toString(), subAdminPinHash: CryptoJS.SHA256("5678").toString() },
        question_stats: {}
    };
    Object.keys(schema).forEach(k => { if (!db[k]) db[k] = schema[k]; });
    if (!db.users || Object.keys(db.users).length === 0) {
        const adminUid = 'admin-' + Date.now();
        db.users = {};
        db.users[adminUid] = { n: 'Admin chính', u: 'ADMIN.pn', p: CryptoJS.SHA256('portalnow1').toString(), r: 'admin', email: 'admin@portal.now', avatar: '👤', phone: '' };
    }
    if (!db.parents) db.parents = {};
    if (!db.question_bank) db.question_bank = { subjects: {} };
    if (!db.audit_log) db.audit_log = [];
    if (!db.config) db.config = { adminPinHash: CryptoJS.SHA256("1234").toString(), subAdminPinHash: CryptoJS.SHA256("5678").toString() };
    if (!db.question_stats) db.question_stats = {};
}

async function saveDB(path = null, data = null) {
    try {
        if (path && data) await fbDB.ref(path).update(data);
        else await fbDB.ref('/').set(db);
        updateStats();
    } catch (e) { console.error('Firebase save error:', e); toast('Lỗi đồng bộ dữ liệu!', 'error'); }
}

// ========== AUDIT LOG ==========
function addAudit(action, target = null, details = '') {
    if (!db.audit_log) db.audit_log = [];
    db.audit_log.unshift({ uid: user ? user.uid : 'system', name: user ? user.n : 'Hệ thống', action, target: target || '', details, timestamp: new Date().toISOString() });
    if (db.audit_log.length > 500) db.audit_log.length = 500;
}

// ========== ROLE HELPERS ==========
const isTeacher = () => user && (user.r === 'admin' || user.r === 'teacher' || user.r === 'subadmin');
const isMainAdmin = () => user && user.r === 'admin';
const isSubAdmin = () => user && user.r === 'subadmin';

// ========== NAVIGATION ==========
function show(id) {
    ['pg-login','pg-admin','pg-hv','pg-parent','pg-det'].forEach(x => document.getElementById(x)?.classList.add('hidden'));
    document.getElementById(id)?.classList.remove('hidden');
}

function cl() {
    if (!user) { locOut(); return; }
    if (isTeacher()) show('pg-admin');
    else if (user.r === 'hv') show('pg-hv');
    else if (user.r === 'parent') show('pg-parent');
}

function locOut() {
    if (realtimeRefs.notifGlobal) { fbDB.ref('notif_history').off('value'); realtimeRefs.notifGlobal = null; }
    if (realtimeRefs.privateNotif) { fbDB.ref(`private_notif/${user?.uid}`).off('value'); realtimeRefs.privateNotif = null; }
    user = null;
    clearInterval(examTimer);
    show('pg-login');
}

function updateStats() {
    const users = db.users || {};
    const el = (id, v) => { const e = document.getElementById(id); if (e) e.innerText = v; };
    el('stat-hv', Object.values(users).filter(u => u.r === 'hv').length);
    el('stat-teach', Object.values(users).filter(u => u.r === 'teacher').length);
    el('stat-parent', Object.keys(db.parents || {}).length);
    el('stat-hw', (db.hw_list || []).length);
    el('stat-sub', (db.submissions || []).length);
}

function setActiveNav(id) {
    ['home','reg','2c','2f','profile'].forEach(k => {
        const el = document.getElementById('nav-'+k);
        if (el) el.classList.toggle('active', k === id);
    });
}

// ========== LOGIN ==========
async function doLogin() {
    const username = document.getElementById('u').value.trim();
    const password = document.getElementById('p').value.trim();
    if (!username || !password) { toast('Nhập đầy đủ thông tin', 'error'); return; }
    showLoading();
    await loadDB();
    const hashed = CryptoJS.SHA256(password).toString();
    let foundUser = Object.values(db.users || {}).find(u => u.u === username && u.p === hashed);
    if (foundUser) {
        user = { uid: Object.keys(db.users).find(k => db.users[k] === foundUser), ...foundUser };
        afterLogin();
        return;
    }
    const parentEntry = Object.entries(db.parents || {}).find(([id, p]) => p.phone === username && p.childUsername === password);
    if (parentEntry) {
        const child = Object.values(db.users || {}).find(u => u.u === parentEntry[1].childUsername);
        user = { uid: parentEntry[0], r: 'parent', ...parentEntry[1], child: child || null };
        afterLogin();
        return;
    }
    toast('Sai tài khoản hoặc mật khẩu', 'error');
    hideLoading();
}

function afterLogin() {
    hideLoading();
    if (isTeacher()) {
        show('pg-admin');
        renderAdminMenu();
        updateStats();
        toast(`Chào mừng ${user.n}!`);
    } else if (user.r === 'hv') {
        document.getElementById('hv-info').innerText = user.n;
        show('pg-hv');
        setActiveNav('home');
        attachStudentRealtime(user.uid);
        sv('home');
        toast(`Xin chào, ${user.n}!`);
    } else if (user.r === 'parent') {
        document.getElementById('parent-info').innerText = user.name || 'Phụ huynh';
        show('pg-parent');
        parentDashboard('home');
        toast(`Xin chào, ${user.name || 'Phụ huynh'}!`);
    }
}

function attachStudentRealtime(uid) {
    if (realtimeRefs.notifGlobal) fbDB.ref('notif_history').off('value');
    realtimeRefs.notifGlobal = fbDB.ref('notif_history').on('value', (snap) => {
        db.notif_history = snap.val() || [];
        if (!document.getElementById('pg-hv').classList.contains('hidden')) {
            const activeTab = document.querySelector('.nav-item.active span:last-child')?.innerText;
            if (activeTab === 'Trang chủ' || activeTab === 'Thông báo') sv('home');
        }
    });
    if (realtimeRefs.privateNotif) fbDB.ref(`private_notif/${uid}`).off('value');
    realtimeRefs.privateNotif = fbDB.ref(`private_notif/${uid}`).on('value', (snap) => {
        if (!db.private_notif) db.private_notif = {};
        db.private_notif[uid] = snap.val() || [];
        if (!document.getElementById('pg-hv').classList.contains('hidden')) {
            const activeTab = document.querySelector('.nav-item.active span:last-child')?.innerText;
            if (activeTab === 'Trang chủ' || activeTab === 'Thông báo') sv('home');
        }
    });
}

// ========== ADMIN MENU ==========
function renderAdminMenu() {
    const menuDiv = document.getElementById('admin-menu');
    if (!menuDiv) return;
    let html = '';
    html += `<div class="bento-card" onclick="op('2a')">📅 Xếp lịch học</div>`;
    html += `<div class="bento-card" onclick="op('2b')">📢 Thông báo</div>`;
    html += `<div class="bento-card" onclick="op('2c')">📝 Bài tập</div>`;
    html += `<div class="bento-card" onclick="op('2e')">👥 Học viên</div>`;
    html += `<div class="bento-card" onclick="op('2f')">📋 Kiểm tra/Thi</div>`;
    html += `<div class="bento-card" onclick="op('res')">📊 Kết quả</div>`;
    if (isMainAdmin() || (isSubAdmin() && user.permissions?.includes('finance'))) {
        html += `<div class="bento-card" onclick="op('2g')">💰 Học phí</div>`;
    }
    if (isMainAdmin()) {

function playNotificationSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
    } catch (e) {}
}

function toggleNotifTarget() {

function renderNotifList(filter) {
    const container = document.getElementById('notifList');
    if (!container) return;
    let allList = [...(db.notif_history || [])];
    if (db.private_notif) {
        Object.values(db.private_notif).forEach(arr => { if (Array.isArray(arr)) allList = allList.concat(arr); });
    }
    let list = allList;
    if (filter === 'public') list = allList.filter(n => !n.target);
    else if (filter === 'private') list = allList.filter(n => n.target);
    list.sort((a, b) => new Date(b.date) - new Date(a.date));
    container.innerHTML = list.map(n => `
      <div class="card">
        <small>${n.date} ${n.target ? '(Riêng)' : '(Chung)'}</small>
        <div style="margin:6px 0;">${n.msgHtml || n.msg}</div>
        ${n.attachment ? `<a href="${n.attachment.url}" target="_blank" style="display:block; margin-top:8px;">📎 Tải file: ${n.attachment.name}</a>` : ''}
        <button class="ghost" onclick="editNotif('${n.id}')">✏️</button>
        <button class="danger" onclick="deleteNotif('${n.id}')">🗑️</button>
      </div>`).join('');
}

async function addN() {
    const type = document.getElementById('notifType').value;
    const editor = document.getElementById('notif-editor');
    const msgHtml = editor.innerHTML.trim();
    const msgText = editor.innerText.trim();
    if (!msgText && !msgHtml) { toast('Nhập nội dung thông báo', 'error'); return; }
    const fileInput = document.getElementById('notif-attachment');
    let attachmentInfo = null;
    if (fileInput && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        showLoading();
        try {
            const storageRef = fbStorage.ref('attachments/' + Date.now() + '_' + file.name);
            const uploadTask = await storageRef.put(file);
            const downloadURL = await uploadTask.ref.getDownloadURL();
            attachmentInfo = { name: file.name, url: downloadURL, type: file.type };
        } catch (e) { toast('Lỗi tải file đính kèm', 'error'); hideLoading(); return; }
        hideLoading();
    }
    const entry = { id: 'msg-' + Date.now(), msg: msgText, msgHtml, date: new Date().toLocaleString(), target: null, attachment: attachmentInfo };
    if (type === 'private') {
        entry.target = document.getElementById('notifStudent').value;
        if (!db.private_notif) db.private_notif = {};
        if (!db.private_notif[entry.target]) db.private_notif[entry.target] = [];
        db.private_notif[entry.target].push(entry);
        toast('Đã gửi thông báo riêng');
    } else {
        if (!db.notif_history) db.notif_history = [];
        db.notif_history.unshift(entry);
        Object.values(db.users||{}).filter(u => u.r==='hv').forEach(h => {
            if (!db.data[h.uid]) db.data[h.uid] = {};
            db.data[h.uid]['2b_new'] = true;
        });
        toast('Đã gửi thông báo chung');
    }
    playNotificationSound();
    await saveDB();
    renderNotifList('all');
    editor.innerHTML = '';
    if (fileInput) fileInput.value = '';
}

function editNotif(id) {
    let n = (db.notif_history || []).find(x => x.id === id) || Object.values(db.private_notif||{}).flat().find(x => x.id === id);
    if (!n) return;
    const newContent = prompt("Sửa nội dung (HTML):", n.msgHtml || n.msg);
    if (newContent) { n.msgHtml = newContent; n.msg = newContent.replace(/<[^>]*>/g, ''); saveDB(); renderNotifList('all'); }
}

async function deleteNotif(id) {
    let idx = (db.notif_history || []).findIndex(x => x.id === id);
    if (idx > -1) { db.notif_history.splice(idx, 1); await saveDB(); op('2b'); return; }
    for (let key in db.private_notif) {
        idx = (db.private_notif[key] || []).findIndex(x => x.id === id);
        if (idx > -1) { db.private_notif[key].splice(idx, 1); await saveDB(); op('2b'); return; }
    }
}

function importWordToQuestions(type) {
    const inputId = type === 'hw' ? 'importWordHw' : 'importWordExam';
    const file = document.getElementById(inputId).files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(event) {
        const result = await mammoth.extractRawText({ arrayBuffer: event.target.result });
        const lines = result.value.split('\n').filter(line => line.trim());
        const container = document.getElementById(type === 'hw' ? 'hw-questions-container' : 'exam-questions-container');
        lines.forEach(line => {
            const block = document.createElement('div');
            block.className = 'question-block';
            if (line.includes('|')) {
                const parts = line.split('|').map(s => s.trim());
                block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                  <input class="q-text" value="${parts[0]||''}">
                  <div class="mcq-options">
                    <input class="opt-a" value="${parts[1]||''}"><input class="opt-b" value="${parts[2]||''}">
                    <input class="opt-c" value="${parts[3]||''}"><input class="opt-d" value="${parts[4]||''}">
                  </div>
                  <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
                    <span>Đáp án:</span><select class="q-ans"><option value="A" ${parts[5]==='A'?'selected':''}>A</option><option value="B" ${parts[5]==='B'?'selected':''}>B</option><option value="C" ${parts[5]==='C'?'selected':''}>C</option><option value="D" ${parts[5]==='D'?'selected':''}>D</option></select>
                  </div>
                  <input type="number" class="q-point" value="${parts[6]||1}">`;
            } else {
                block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                  <input class="q-text" value="${line}">
                  <textarea class="essay-answer" disabled></textarea>
                  <input type="number" class="q-point" value="1">`;
            }
            container.appendChild(block);
        });
        toast('Đã import câu hỏi từ Word');
    };
    reader.readAsArrayBuffer(file);
}

async function saveHomework() {

    const container = document.getElementById('hw-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    blocks.forEach(b => {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, point });
        }
    });
    db.hw_list.push({
        n, start: document.getElementById('h_start').value, end: document.getElementById('h_end').value,
        time: document.getElementById('h_time').value, slot: document.getElementById('h_slot').value,
        questions, assignedTo: [], assigned: false

async function saveExam() {
    const n = document.getElementById('x_n').value;
    if (!n) { toast('Nhập tên đề thi', 'error'); return; }
    const container = document.getElementById('exam-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    blocks.forEach(b => {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, point });
        }
    });
    db.exams.push({
        n, start: document.getElementById('x_start').value, end: document.getElementById('x_end').value,
        time: document.getElementById('x_time').value, slot: document.getElementById('x_slot').value,
        p: document.getElementById('x_p').value, st: document.getElementById('x_s').value,
        questions, assignedTo: [], assigned: false
    });
    await saveDB(); op('2f'); toast('Đề thi đã lưu');
}

async function deleteExam(i) { db.exams.splice(i, 1); await saveDB(); op('2f'); }

function editEx(i) {
    const x = db.exams[i];
    document.getElementById('x_n').value = x.n;
    document.getElementById('x_start').value = x.start || '';
    document.getElementById('x_end').value = x.end || '';
    document.getElementById('x_time').value = x.time || '';
    document.getElementById('x_slot').value = x.slot || '';

        if (q.type === 'mcq') {
            block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
              <input class="q-text" value="${q.q}">
              <div class="mcq-options">
                <input class="opt-a" value="${q.a}"><input class="opt-b" value="${q.b}">
                <input class="opt-c" value="${q.c}"><input class="opt-d" value="${q.d}">

              </div>
              <input type="number" class="q-point" value="${q.point||1}">`;

async function svFee(uid) {
    let d = db.data[uid].fee;
    const a = parseInt(document.getElementById('f_a').value) || 0;
    d.slots = parseInt(document.getElementById('f_s').value) || 0;
    d.rate = parseInt(document.getElementById('f_r').value) || 0;
    if (a > 0) { d.paid += a; d.logs.unshift(new Date().toLocaleDateString() + ': +' + a); }
    await saveDB(); op('2g');
}

async function saveBankInfo() {
    const bankName = document.getElementById('bankName').value;
    const accountNumber = document.getElementById('bankNumber').value;
    const qrCodeInput = document.getElementById('qrCodeInput').value;
    const qrFile = document.getElementById('qrFile').files[0];
    let qrUrl = qrCodeInput;
    if (qrFile) {
        showLoading();
        const storageRef = fbStorage.ref('bank_qr/' + Date.now() + '_' + qrFile.name);
        const uploadTask = await storageRef.put(qrFile);
        qrUrl = await uploadTask.ref.getDownloadURL();
        hideLoading();
    }
    db.bank_info = { bankName, accountNumber, qrCode: qrUrl };
    await saveDB(); toast('Đã lưu thông tin ngân hàng');
}

async function approveReceipt(uid, i) {
    const r = db.data[uid].fee.receipts[i];
    db.data[uid].fee.paid += r.amount;
    db.data[uid].fee.logs.unshift(`✅ ${r.date}: +${r.amount}đ (${r.note})`);
    db.data[uid].fee.receipts.splice(i, 1);
    await saveDB(); edFee(uid);
}

async function rejectReceipt(uid, i) {
    db.data[uid].fee.receipts.splice(i, 1);
    await saveDB(); edFee(uid);
}

// Gọi là sv(id) – điều hướng tab

    if (!user || user.r !== 'hv') { locOut(); return; }

    const m = document.getElementById('hv-main');

// ========== ĐĂNG KÝ / HỦY SLOT ==========
async function tglReg(i) {
    const s = db.sked.slots[i];
    if (!s.r) s.r = [];
    const idx = s.r.indexOf(user.uid);
    if (idx > -1) {
        s.r.splice(idx, 1);
    } else {
        const totalRegistered = (db.sked.slots || []).reduce((sum, sl) => sum + (sl.r || []).filter(uid => uid === user.uid).length, 0);
        if (totalRegistered >= 2) { toast('Bạn đã đăng ký đủ 2 tiết. Hủy bớt để đăng ký tiết khác.', 'error'); return; }
        if (s.r.length >= s.c) { toast('Slot đã đầy!', 'error'); return; }
        s.r.push(user.uid);
    }
    await saveDB();
    sv('reg');
}

// ========== LÀM BÀI TẬP ==========
function stH(index) {
    const assignedHw = (db.hw_list || []).filter(h => h.assignedTo && h.assignedTo.includes(user.uid));
    const h = assignedHw[index];
    if (!h) return;
    startTime = new Date();
    currentWorkType = 'hw'; currentWorkName = h.n;
    let html = `<h3>${h.n}</h3>`;
    if (h.time) {
        examEndTime = new Date(startTime.getTime() + h.time * 60000);
        clearInterval(examTimer);
        examTimer = setInterval(() => {
            const diff = examEndTime - new Date();
            if (diff <= 0) { clearInterval(examTimer); toast('Hết giờ! Bài sẽ được nộp.', 'error'); sub('hw', h.n); }
            const min = Math.floor(diff / 60000);
            const sec = Math.floor((diff % 60000) / 1000);
            const el = document.getElementById('hwTimer');
            if (el) el.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
        html += `<div class="timer" id="hwTimer"></div>`;
    }
    h.questions.forEach((q, qi) => {
        if (q.type === 'mcq') {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br>
              <label><input type="radio" name="q${qi}" value="A"> A. ${q.a}</label><br>
              <label><input type="radio" name="q${qi}" value="B"> B. ${q.b}</label><br>
              <label><input type="radio" name="q${qi}" value="C"> C. ${q.c}</label><br>
              <label><input type="radio" name="q${qi}" value="D"> D. ${q.d}</label></div>`;
        } else {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><textarea id="essay${qi}" placeholder="Trả lời..."></textarea></div>`;
        }
    });
    html += `<button onclick="sub('hw','${h.n}')">NỘP BÀI</button>`;
    document.getElementById('hv-main').innerHTML = html;
}

// ========== VÀO THI ==========
function stX(index) {
    const assignedExams = (db.exams || []).filter(x => x.assignedTo && x.assignedTo.includes(user.uid) && x.st == '1');
    const x = assignedExams[index];
    if (!x) return;
    const p = prompt("Mật khẩu đề thi:");
    if (p !== x.p) { toast('Sai mật khẩu!', 'error'); return; }
    const submitted = (db.submissions || []).filter(s => s.u === user.uid && s.n === x.n).length;
    if (x.slot && submitted >= parseInt(x.slot)) { toast('Bạn đã hết lượt thi', 'error'); return; }
    startTime = new Date();
    currentWorkType = 'exam'; currentWorkName = x.n;
    isTakingExam = true;
    activateAntiCheat();
    let html = `<h3>${x.n}</h3><div class="cheat-warning" id="cheatWarning" style="display:none"></div>`;
    if (x.time) {
        examEndTime = new Date(startTime.getTime() + x.time * 60000);
        clearInterval(examTimer);
        examTimer = setInterval(() => {
            const diff = examEndTime - new Date();
            if (diff <= 0) { clearInterval(examTimer); toast('Hết giờ! Bài thi đã được nộp.', 'error'); sub('exam', x.n); }
            const min = Math.floor(diff / 60000);
            const sec = Math.floor((diff % 60000) / 1000);
            const el = document.getElementById('examTimer');
            if (el) el.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
        html += `<div class="timer" id="examTimer"></div>`;
    }
    x.questions.forEach((q, qi) => {
        if (q.type === 'mcq') {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br>
              <label><input type="radio" name="q${qi}" value="A"> A. ${q.a}</label><br>
              <label><input type="radio" name="q${qi}" value="B"> B. ${q.b}</label><br>
              <label><input type="radio" name="q${qi}" value="C"> C. ${q.c}</label><br>
              <label><input type="radio" name="q${qi}" value="D"> D. ${q.d}</label></div>`;
        } else {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><textarea id="essay${qi}" placeholder="Trả lời..."></textarea></div>`;
        }
    });
    html += `<button onclick="sub('exam','${x.n}')">NỘP BÀI</button>`;
    document.getElementById('hv-main').innerHTML = html;
}

// ========== NỘP BÀI ==========
async function sub(type, name) {
    const work = type === 'hw'
        ? (db.hw_list || []).find(h => h.assignedTo && h.assignedTo.includes(user.uid) && h.n === name)
        : (db.exams || []).find(x => x.assignedTo && x.assignedTo.includes(user.uid) && x.n === name);
    if (!work) return;
    let answers = [];
    if (work.questions) {
        work.questions.forEach((q, qi) => {
            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="q${qi}"]:checked`);
                answers.push({ q: q.q, selected: selected ? selected.value : '', correct: q.ans, point: q.point||1 });
            } else {
                const ans = document.getElementById(`essay${qi}`)?.value || '';
                answers.push({ q: q.q, ans, point: q.point||1 });
            }
        });
    }
    const diff = Math.floor((new Date() - startTime) / 1000), dur = Math.floor(diff / 60) + "p " + (diff % 60) + "s";
    const subObj = { u: user.uid, type, n: name, date: new Date().toLocaleString(), dur, answers };
    if (type === 'exam') {
        const mcqAnswers = answers.filter(a => a.selected !== undefined);
        const correctCount = mcqAnswers.filter(a => a.selected === a.correct).length;
        subObj.score = `${correctCount}/${mcqAnswers.length}`;
        isTakingExam = false;
        deactivateAntiCheat();
    }
    db.submissions.push(subObj);
    updateQuestionStats(work, answers);
    if (type === 'hw' && work.questions) {
        const allCorrect = work.questions.every((q, qi) => {
            if (q.type === 'mcq') return answers[qi] && answers[qi].selected === q.ans;
            return true;
        });
        if (allCorrect) addBadge(user.uid, '🏆 Hoàn thành xuất sắc: ' + work.n);
    }
    clearInterval(examTimer);
    await saveDB();
    toast('Nộp bài thành công!');
    sv(type === 'hw' ? '2c' : '2f');
}

function addBadge(uid, badgeName) {
    if (!db.users[uid].badges) db.users[uid].badges = [];
    if (!db.users[uid].badges.includes(badgeName)) {
        db.users[uid].badges.push(badgeName);
        toast('🎖 Bạn nhận được huy hiệu: ' + badgeName);
    }
}

function updateQuestionStats(work, answers) {
    if (!db.question_stats) db.question_stats = {};
    if (!work.questions) return;
    work.questions.forEach((q, qi) => {
        if (q.type === 'mcq') {
            const questionId = q.q.substring(0, 50);
            if (!db.question_stats[questionId]) db.question_stats[questionId] = { total: 0, wrong: 0, q: q.q };
            db.question_stats[questionId].total++;
            const studentAnswer = answers[qi]?.selected;
            if (studentAnswer && studentAnswer !== q.ans) db.question_stats[questionId].wrong++;
        }
    });
}

function viewSubmission(name, date) {
    const subs = db.submissions || [];
    const sub = subs.find(s => s.u === user.uid && s.n === name && s.date === date);
    if (!sub) { toast('Không tìm thấy bài làm','error'); return; }
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) { toast('Bài tập/thi không còn tồn tại','error'); return; }
    let html = `<h3>Bài làm: ${sub.n}</h3><p>Ngày nộp: ${sub.date} (${sub.dur})</p>`;
    if (sub.answers) {
        sub.answers.forEach((a, i) => {
            if (a.selected !== undefined) {
                const correctClass = a.selected === a.correct ? 'color:var(--success)' : 'color:var(--danger)';
                html += `<div class="card"><b>Câu ${i+1}:</b> ${a.q}<br>Bạn chọn: ${a.selected || 'Chưa chọn'} | Đúng: ${a.correct} <span style="${correctClass}">${a.selected === a.correct ? '✅' : '❌'}</span></div>`;
            } else {
                html += `<div class="card"><b>Câu ${i+1}:</b> ${a.q}<br><b>Trả lời:</b> ${a.ans || 'Không trả lời'}</div>`;
            }
        });
        if (sub.score) html += `<div class="card"><b>Điểm: ${sub.score}</b></div>`;
    }
    html += `<button onclick="sv('${sub.type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('hv-main').innerHTML = html;
}

// ========== GỬI BIÊN LAI ==========
async function sendReceipt() {
    if (!user || user.r !== 'hv') return;
    const d = db.data[user.uid];
    if (!d.fee) d.fee = { slots: 0, rate: 0, paid: 0, logs: [], receipts: [] };
    const amt = parseInt(document.getElementById('receiptAmount').value) || 0;
    if (amt <= 0) { toast('Nhập số tiền', 'error'); return; }
    const method = document.getElementById('receiptMethod').value;
    const note = document.getElementById('receiptNote').value;
    const imgFile = document.getElementById('receiptImage').files[0];
    let receiptData = { date: new Date().toLocaleString(), amount: amt, note, method, imageUrl: '' };
    if (imgFile) {
        showLoading();
        const storageRef = fbStorage.ref('receipts/' + user.uid + '/' + Date.now() + '_' + imgFile.name);
        try {
            const uploadTask = await storageRef.put(imgFile);
            receiptData.imageUrl = await uploadTask.ref.getDownloadURL();
        } catch (e) { toast('Lỗi tải ảnh lên', 'error'); hideLoading(); return; }
        hideLoading();
    }
    d.fee.receipts.push(receiptData);
    await saveDB(); sv('2g'); toast('Đã gửi biên lai, chờ duyệt');
}

async function sendSupport() {
    const msg = document.getElementById('supportMsg').value;
    if (!msg) { toast('Nhập nội dung cần hỗ trợ', 'error'); return; }
    if (!db.forgot_pwd) db.forgot_pwd = [];
    db.forgot_pwd.push({ name: user.n, email: user.email || '', phone: user.phone || '', date: new Date().toLocaleString(), status: 'support', msg });
    await saveDB(); toast('Đã gửi yêu cầu hỗ trợ');
    sv('profile');
}

// ========== ANTI-CHEAT ==========
function activateAntiCheat() {
    cheatCount = 0;
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('blur', handleWindowBlur);
    document.addEventListener('contextmenu', preventContextMenu);
    document.addEventListener('copy', preventCopy);
    updateCheatWarning();
}

function deactivateAntiCheat() {
    document.removeEventListener('visibilitychange', handleVisibilityChange);
    window.removeEventListener('blur', handleWindowBlur);
    document.removeEventListener('contextmenu', preventContextMenu);
    document.removeEventListener('copy', preventCopy);
    const warning = document.getElementById('cheatWarning');
    if (warning) warning.style.display = 'none';
}

function handleVisibilityChange() {
    if (document.hidden && isTakingExam) { cheatCount++; updateCheatWarning(); if (cheatCount >= MAX_CHEATS) { toast('Bạn đã rời màn hình quá nhiều. Bài thi sẽ tự động nộp.', 'error'); sub('exam', currentWorkName); } }
}

function handleWindowBlur() {
    if (isTakingExam) { cheatCount++; updateCheatWarning(); if (cheatCount >= MAX_CHEATS) { toast('Bạn đã rời màn hình quá nhiều. Bài thi sẽ tự động nộp.', 'error'); sub('exam', currentWorkName); } }
}

function preventContextMenu(e) { e.preventDefault(); }
function preventCopy(e) { e.preventDefault(); }

function updateCheatWarning() {
    const warning = document.getElementById('cheatWarning');
    if (warning) {
        warning.style.display = cheatCount > 0 ? 'block' : 'none';
        warning.innerText = `Cảnh báo: bạn đã rời màn hình ${cheatCount}/${MAX_CHEATS} lần. Nếu vượt quá, bài thi sẽ tự động nộp!`;
    }
}

// ========== CHẤM BÀI CHI TIẾT (ADMIN) ==========
function viewSubmissionDetail(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) { toast('Bài tập/thi không còn tồn tại', 'error'); return; }
    let html = `<h3>📄 Bài làm: ${sub.n}</h3>
      <p><b>Học viên:</b> ${db.users[sub.u]?.n || sub.u} | <b>Ngày nộp:</b> ${sub.date} | <b>Thời gian:</b> ${sub.dur}</p>`;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        html += `<div class="card" style="margin-bottom:12px;">
          <b>Câu ${qi+1} (${question.point||1}đ):</b> ${question.q}`;
        if (question.type === 'mcq') {
            const correctAns = question.ans || '?';
            const userAns = ans.selected || 'Chưa chọn';
            const isCorrect = userAns === correctAns;
            html += `<br><b>Đáp án đúng:</b> ${correctAns}<br>
              <b>Học viên chọn:</b> ${userAns} <span style="color:${isCorrect?'var(--success)':'var(--danger)'}">${isCorrect?'✅':'❌'}</span>`;
        } else {
            html += `<br><b>Bài làm:</b> <div style="white-space:pre-wrap; background:var(--surface-alt); padding:8px; border-radius:8px;">${ans.ans || 'Không trả lời'}</div>`;
            html += `<div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
              <label>Điểm (0-${question.point||10}): </label>
              <input type="number" id="grade-${qi}" value="${ans.grade !== undefined ? ans.grade : ''}" min="0" max="${question.point||10}" step="0.5" style="width:80px;">
              <label>Nhận xét: </label>
              <input type="text" id="comment-${qi}" value="${ans.comment || ''}" style="flex:1;">
              <button onclick="aiGrade(${submissionIndex}, ${qi})" type="button">🤖 Chấm AI</button>
              <span id="score-${qi}" style="font-weight:bold; margin-left:8px;">${ans.aiScore !== undefined ? `AI: ${ans.aiScore}/${question.point}` : ''}</span>
            </div>`;
        }
        html += `</div>`;
    });
    html += `<div class="card"><b>Tổng điểm:</b> <span id="total-score">Đang tính...</span>
      <button onclick="saveManualGrades(${submissionIndex})">💾 Lưu điểm & nhận xét</button>
      <button onclick="calculateTotal(${submissionIndex})">🔄 Tính tổng</button></div>
      <button onclick="renderSubs('${sub.type}')">← Quay lại danh sách</button>`;
    document.getElementById('det-content').innerHTML = html;
    setTimeout(() => calculateTotal(submissionIndex), 100);
}

function calculateTotal(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        const point = question.point || 1;
        maxTotal += point;
        if (ans.selected !== undefined) { if (ans.selected === question.ans) total += point; }
        else { const input = document.getElementById(`grade-${qi}`); const grade = input ? parseFloat(input.value) : (ans.grade || 0); if (!isNaN(grade)) total += grade; }
    });
    const totalSpan = document.getElementById('total-score');
    if (totalSpan) totalSpan.innerText = `${total.toFixed(1)} / ${maxTotal}`;
}

async function saveManualGrades(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    sub.answers.forEach((ans, qi) => {
        if (ans.selected === undefined) {
            const gradeInput = document.getElementById(`grade-${qi}`);
            const commentInput = document.getElementById(`comment-${qi}`);
            if (gradeInput) { const val = parseFloat(gradeInput.value); if (!isNaN(val) && val >= 0 && val <= (work.questions[qi]?.point || 10)) ans.grade = val; }
            if (commentInput) ans.comment = commentInput.value.trim();
        }
    });
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const q = work.questions[qi];
        if (!q) return;
        maxTotal += q.point || 1;
        if (ans.selected !== undefined) { if (ans.selected === q.ans) total += q.point || 1; }
        else { total += ans.grade || 0; }
    });
    sub.score = `${total.toFixed(1)}/${maxTotal}`;
    await saveDB();
    toast('Đã lưu điểm');
    viewSubmissionDetail(submissionIndex);
}

function renderSubs(type) {
    const subs = (db.submissions || []).filter(s => s.type === type);
    const typeName = type === 'hw' ? 'Bài tập' : 'Đề thi';
    let html = `<h3>📋 Danh sách bài nộp – ${typeName}</h3>`;
    if (subs.length === 0) html += '<p>Chưa có bài nộp nào.</p>';
    else {
        subs.forEach((s, idx) => {
            const student = db.users[s.u];
            const studentName = student ? student.n : 'Không rõ';
            const subIndex = db.submissions.indexOf(s);
            html += `<div class="card"><b>${s.n}</b> – ${studentName} – ${s.date} (⏱ ${s.dur||'N/A'}) ${s.score !== undefined ? '– Điểm: '+s.score : ''}<br><button class="detail-grade-btn" onclick="viewSubmissionDetail(${subIndex})">📝 Xem chi tiết</button></div>`;
        });
    }
    html += `<br><button class="ghost" onclick="op('${type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
}

// ========== AI CHATBOT ==========
const DEFAULT_GEMINI_KEY = 'AIzaSyAkZ5mFveBNKrguL2ecCDPIj9R0AHviR0E';
function getGeminiKey() { return (db.config && db.config.geminiApiKey) || DEFAULT_GEMINI_KEY; }

function toggleChat() { document.getElementById('chatbot-window').classList.toggle('hidden'); }

async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    const messagesDiv = document.getElementById('chat-messages');
    messagesDiv.innerHTML += `<div style="margin-bottom:6px;"><b>🧑 Bạn:</b> ${msg}</div>`;
    input.value = '';
    const apiKey = getGeminiKey();
    if (!apiKey || apiKey === 'YOUR_GEMINI_API_KEY') {
        setTimeout(() => {
            messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--accent);"><b>🤖 AI:</b> (Chưa cấu hình API key) Tính năng chatbot cần API Gemini. Hãy liên hệ quản trị viên.</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 500);
        return;
    }
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Bạn là trợ lý ảo của hệ thống học tập PORTAL NOW.

NGUYÊN TẮC TRẢ LỜI:
1. Trả lời NGẮN GỌN, trực tiếp vào vấn đề
2. Nếu được hỏi về cách dùng hệ thống → hướng dẫn từng bước cụ thể
3. Nếu được hỏi về bài tập, kiến thức → giải thích rõ ràng, có ví dụ
4. Nếu câu hỏi không rõ → hỏi lại để làm rõ
5. TUYỆT ĐỐI KHÔNG nói "xin lỗi" hay "tôi không thể" nếu câu hỏi hợp lệ

CÂU HỎI CỦA HỌC VIÊN: ${msg}` }] }],
                generationConfig: { temperature: 0.7, maxOutputTokens: 300 }
            })
        });
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Xin lỗi, tôi chưa hiểu câu hỏi.';
        messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--accent);"><b>🤖 AI:</b> ${reply}</div>`;
    } catch (e) {
        messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--danger);"><b>🤖 AI:</b> Lỗi kết nối đến máy chủ AI.</div>`;
    }
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ========== AI CHẤM TỰ LUẬN ==========
async function aiGrade(submissionIndex, questionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) { toast('Không tìm thấy bài nộp', 'error'); return; }
    const answer = sub.answers[questionIndex];
    if (!answer || answer.selected !== undefined) { toast('Chỉ áp dụng cho câu tự luận', 'error'); return; }
    const questionText = answer.q || '';
    const studentResponse = answer.ans || '';
    const maxScore = answer.point || 10;
    const apiKey = getGeminiKey();
    if (!apiKey || apiKey === 'YOUR_GEMINI_API_KEY') { toast('Chưa cấu hình API key', 'error'); return; }
    showLoading();
    try {
        const prompt = `Bạn là giáo viên chấm bài tự luận nghiêm khắc nhưng công bằng.

CÂU HỎI: "${questionText}"
BÀI LÀM CỦA HỌC SINH: "${studentResponse}"
ĐIỂM TỐI ĐA: ${maxScore}

YÊU CẦU:
1. Cho điểm chính xác từ 0 đến ${maxScore} (có thể là số thập phân như 7.5)
2. Nhận xét cụ thể: chỉ ra điểm mạnh, điểm yếu, chỗ cần cải thiện
3. So sánh với đáp án mong đợi (nếu có thể)

TRẢ VỀ ĐÚNG ĐỊNH DẠNG SAU (không thêm gì khác):
ĐIỂM: <số điểm>
NHẬN XÉT: <nội dung nhận xét>`;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.3, maxOutputTokens: 100 }
            })
        });
        const data = await res.json();
        const generated = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const scoreMatch = generated.match(/ĐIỂM:\s*([\d.]+)/i);
        const commentMatch = generated.match(/NHẬN XÉT:\s*(.+)/i);
        const aiScore = scoreMatch ? parseFloat(scoreMatch[1]) : null;
        const aiComment = commentMatch ? commentMatch[1] : generated;
        if (aiScore !== null && aiScore >= 0 && aiScore <= maxScore) {
            const scoreField = document.getElementById(`score-${questionIndex}`);
            if (scoreField) scoreField.value = aiScore;
            answer.aiScore = aiScore;
            answer.aiComment = aiComment;
            toast(`AI đề xuất: ${aiScore}/${maxScore} điểm. ${aiComment}`, 'success');
        } else { toast('AI không trả về điểm hợp lệ', 'error'); }
    } catch (e) { toast('Lỗi kết nối AI', 'error'); }
    hideLoading();
}

// ========== DỌN DẸP DỮ LIỆU ==========
function renderCleanup(c) {
    const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
    const currentYear = new Date().getFullYear();
    c.innerHTML = `<h3>🧹 Dọn dẹp dữ liệu cũ</h3>
      <div class="card">
        <p>Chọn thời điểm: mọi dữ liệu <b>trước</b> tháng/năm sẽ bị xóa. Cẩn thận!</p>
        <div style="display:flex; gap:10px;">
          <select id="clean-month">${months.map(m => `<option value="${m}">Tháng ${m}</option>`).join('')}</select>
          <input id="clean-year" type="number" value="${currentYear}" min="2020" max="${currentYear+1}">
        </div>
        <button class="danger" onclick="executeCleanup()">🗑️ Xóa dữ liệu trước thời điểm này</button>
      </div>`;
}

async function executeCleanup() {
    const month = document.getElementById('clean-month').value;
    const year = document.getElementById('clean-year').value;
    const cutoff = new Date(`${year}-${month}-01T00:00:00`);
    if (isNaN(cutoff.getTime())) { toast('Thời gian không hợp lệ', 'error'); return; }
    modal(`Xác nhận xóa tất cả dữ liệu trước ${month}/${year}? Hành động không thể hoàn tác!`, async () => {
        showLoading();
        db.submissions = (db.submissions || []).filter(s => new Date(s.date) >= cutoff);
        db.notif_history = (db.notif_history || []).filter(n => new Date(n.date) >= cutoff);
        if (db.private_notif) {
            Object.keys(db.private_notif).forEach(uid => {
                db.private_notif[uid] = (db.private_notif[uid] || []).filter(n => new Date(n.date) >= cutoff);
            });
        }
        db.audit_log = (db.audit_log || []).filter(l => new Date(l.timestamp) >= cutoff);
        db.forgot_pwd = (db.forgot_pwd || []).filter(r => new Date(r.date) >= cutoff);
        db.sked_history = (db.sked_history || []).filter(h => new Date(h.date) >= cutoff);
        await saveDB();
        hideLoading();
        toast('Đã dọn dẹp xong!');
        op('cleanup');
    });
}

// ========== CÁC HÀM LƯU LỊCH SỬ TUẦN ==========
async function saveWeekToHistory() {
    if (!db.sked_history) db.sked_history = [];
    db.sked_history.unshift({ id: Date.now(), t: db.sked.t, date: new Date().toLocaleDateString(), slots: JSON.parse(JSON.stringify(db.sked.slots)) });
    await saveDB();
    toast('Đã lưu lịch sử tuần');
}

// ========== KHỞI ĐỘNG ==========
(async function init() {
    await loadDB();
    updateStats();
    setInterval(() => {
        if (!db.hw_list) return;
        const now = Date.now();
        db.hw_list.forEach(h => {
            if (h.end && h.assignedTo && new Date(h.end).getTime() - now <= 15*60*1000 && new Date(h.end).getTime() > now) {
                h.assignedTo.forEach(uid => {
                    if (Notification.permission === 'granted') {
                        new Notification(`Sắp hết hạn: ${h.n}`, { body: 'Bạn có 15 phút để nộp bài!' });
                    }
                });
            }
        });
    }, 60000);
    if (window.Notification && Notification.permission === 'default') {
        Notification.requestPermission();
    }
})();
