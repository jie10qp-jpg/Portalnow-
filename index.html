<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
        --font: 'Inter', sans-serif;
        --primary: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
        --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        --bg: #f8fafc; --surface: #ffffff; --surface-alt: #f1f5f9;
        --text: #0f172a; --text-secondary: #475569; --border: #e2e8f0;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 12px rgba(0,0,0,0.06);
        --shadow-lg: 0 20px 40px rgba(0,0,0,0.12); --radius: 20px; --radius-sm: 14px;
        --transition: 0.25s cubic-bezier(0.2, 0.0, 0, 1.0); --bottom-nav-height: 70px;
    }
    .dark {
        --primary: #0f172a; --bg: #0b1120; --surface: #1e293b; --surface-alt: #334155;
        --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
    }
    body {
        font-family: var(--font); background: var(--bg); color: var(--text);
        line-height: 1.5; min-height: 100vh; overflow-x: hidden; max-width: 100vw;
        overscroll-behavior: none; touch-action: manipulation;
        -webkit-overflow-scrolling: touch;
    }
    .hidden { display: none !important; }
    .toast-container { position: fixed; top: 24px; right: 24px; z-index: 99999; }
    .toast { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 40px; box-shadow: var(--shadow-lg); font-weight: 500; font-size: 15px; color: var(--text); margin-bottom: 8px; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 99998; display: flex; align-items: center; justify-content: center; }
    .modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 30px;
    max-width: 500px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    text-align: center;
    margin: auto;
}
    .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin: 20px 0; }
    .bento-card { background: var(--surface); border-radius: var(--radius); padding: 24px 18px; box-shadow: var(--shadow); text-align: center; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
    .bento-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .bento-card.selected { background: #d1fae5; border-color: var(--success); }
    button { 
        background: var(--accent); color: white; border: none; padding: 12px 24px; 
        border-radius: 40px; font-weight: 600; font-family: var(--font); 
        cursor: pointer; -webkit-tap-highlight-color: transparent;
        touch-action: manipulation; position: relative; z-index: 10;
        -webkit-appearance: none; -moz-appearance: none; appearance: none;
        outline: none; -webkit-user-select: none; user-select: none;
        min-height: 44px; min-width: 44px;
    }
    button:hover { background: var(--accent-hover); }
    button.danger { background: var(--danger); z-index: 10; }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button:active { opacity: 0.7; transform: scale(0.97); }
    input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 40px; font-family: var(--font); font-size: 15px; background: var(--surface); color: var(--text); margin: 6px 0; -webkit-appearance: none; }
    .header { background: var(--surface); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
    .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px 20px; box-sizing: border-box; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); width: 100%; word-wrap: break-word; box-sizing: border-box; max-width: 100%; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 8px 16px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .nav-item.active { color: var(--accent); font-weight: 600; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; border: 3px solid var(--accent); cursor: pointer; }
    .profile-menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; }
    .logout-btn { background: var(--danger); color: white; text-align: center; padding: 16px; border-radius: 40px; font-weight: 700; margin-top: 20px; cursor: pointer; }
    .question-block { background: var(--surface-alt); border-radius: var(--radius-sm); padding: 15px; margin-bottom: 15px; position: relative; }
    .question-block .remove-question { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; z-index: 10; }
    .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
    .avatar-option { font-size: 30px; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
    .avatar-option.selected { border-color: var(--accent); background: var(--surface-alt); }
    .cheat-warning { background: var(--danger); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 10px; }
    .timer { font-size: 2rem; font-weight: 700; text-align: center; padding: 10px; background: var(--surface-alt); border-radius: 40px; margin: 10px 0; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--surface-alt); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge { background: var(--danger); color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-left: 6px; }
    .schedule-slot { display: flex; justify-content: space-between; align-items: center; background: var(--surface-alt); border-radius: var(--radius-sm); padding: 12px; margin: 8px 0; }
    .schedule-slot .slot-info { font-size: 14px; }
    .schedule-slot button { font-size: 13px; padding: 6px 12px; z-index: 10; }
    .notif-editor-toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; align-items: center; }
    .notif-editor-toolbar button, .notif-editor-toolbar select, .notif-editor-toolbar input { width: auto; padding: 6px 10px; font-size: 14px; }
    .notif-editor { min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; background: var(--surface); }
    @media (max-width: 640px) {
        .bento-grid { grid-template-columns: repeat(2, 1fr); }
        button { padding: 14px 20px; font-size: 15px; min-height: 48px; }
    }
    
/* TỐI ƯU HÓA NÚT BẤM & GIAO DIỆN MOBILE */
button, .bento-card, .nav-item, .profile-menu-item, [onclick] {
    cursor: pointer !important;
    touch-action: manipulation !important;
    -webkit-tap-highlight-color: transparent !important;
    user-select: none !important;
    position: relative;
    z-index: 5;
}

/* FIX: Checkbox và input không bị chặn bởi z-index */
input[type="checkbox"], input[type="radio"] {
    position: relative !important;
    z-index: 20 !important;
    pointer-events: auto !important;
    cursor: pointer !important;
    -webkit-appearance: checkbox !important;
    appearance: checkbox !important;
    width: 18px !important;
    height: 18px !important;
    min-width: 18px !important;
    flex-shrink: 0;
}

label {
    cursor: pointer;
    position: relative;
    z-index: 10;
}

button:active {
    opacity: 0.8;
    transform: scale(0.96);
}

/* Fix Bottom Nav che khuất nội dung */
#hv-main, #pg-admin .container, #pg-parent .container {
    padding-bottom: calc(var(--bottom-nav-height) + 40px) !important;
}

.bottom-nav {
    z-index: 9999 !important;
    pointer-events: auto !important;
}

/* Đảm bảo nội dung trong card luôn bấm được */
.card {
    position: relative;
    z-index: 1;
    overflow: visible !important;
}

.card * {
    pointer-events: auto !important;
}

/* Modal luôn trên cùng */
.modal-overlay { z-index: 100000 !important; }
.modal-box { z-index: 100001 !important; }

/* Fix lỗi input bị zoom trên iOS */
input, select, textarea {
    font-size: 16px !important; 
}

/* ===== SKELETON LOADING ===== */
.skeleton {
    background: linear-gradient(90deg, var(--surface-alt) 25%, var(--border) 50%, var(--surface-alt) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { height: 80px; margin-bottom: 12px; }
.skeleton-line { height: 16px; margin: 8px 0; width: 80%; }
.skeleton-line.short { width: 45%; }

/* ===== EMPTY STATE ===== */
.empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
.empty-state p { font-size: 15px; margin-bottom: 4px; }
.empty-state small { font-size: 13px; opacity: 0.7; }

/* ===== PAGE TRANSITION ===== */
.page-enter { animation: fadeSlideIn 0.22s cubic-bezier(0.2,0,0,1) both; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* ===== UNREAD NOTIF HIGHLIGHT ===== */
.notif-unread { border-left: 3px solid var(--accent) !important; background: rgba(59,130,246,0.06) !important; }
</style>
</head>

<script>
// ========== SERVER TIME ==========
async function getServerTime() {
    try {
        const snap = await fbDB.ref('.info/serverTimeOffset').once('value');
        const offset = snap.val() || 0;
        return new Date(Date.now() + offset);
    } catch (e) {
        console.warn('Không lấy được server time, dùng giờ máy');
        return new Date();
    }
}

// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
  apiKey: "AIzaSyCcMieJE1oiohUh79DHVqZFkjTwSAF4Fws",
  authDomain: "portalnowpn.firebaseapp.com",
  databaseURL: "https://portalnowpn-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "portalnowpn",
  storageBucket: "portalnowpn.firebasestorage.app",
  messagingSenderId: "343490919452",
  appId: "1:343490919452:web:1bb511a68070c06dd3b3d9"
};

firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
const fbAuth = firebase.auth();
const fbStorage = firebase.storage();

// ========== FLASHCARD DATA ==========
const HSK_VOCAB = [];
let currentFlashcardIndex = 0;
let isFlipped = false;

// ========== FCM PUSH NOTIFICATIONS ==========
let messaging = null;
if (firebase.messaging && firebase.messaging.isSupported()) {
    try {
        messaging = firebase.messaging();
        messaging.usePublicVapidKey('BOGXq9J2Vxnh-3qN7Y6YlBrmWsd2XPFVLZPW5VPMhMRnAJyAf4AMHXNfGPfKnGSVZgSMhbY5MK4N5PTHJH8kS4o');
        
        messaging.onMessage((payload) => {
            const notificationTitle = payload.notification.title;
            const notificationOptions = { body: payload.notification.body, icon: '/icon.png' };
            if (Notification.permission === 'granted') {
                new Notification(notificationTitle, notificationOptions);
            }
            playNotificationSound();
        });
    } catch (e) { console.log('FCM not supported'); }
}

async function requestFcmTokenForUser(uid) {
    if (!messaging || !uid) return;
    try {
        const currentToken = await messaging.getToken({ vapidKey: 'BOGXq9J2Vxnh-3qN7Y6YlBrmWsd2XPFVLZPW5VPMhMRnAJyAf4AMHXNfGPfKnGSVZgSMhbY5MK4N5PTHJH8kS4o' });
        if (currentToken) {
            if (!db.fcm_tokens) db.fcm_tokens = {};
            db.fcm_tokens[uid] = { token: currentToken, updatedAt: new Date().toISOString() };
            await saveDB('fcm_tokens', db.fcm_tokens);
        }
    } catch (err) { console.log('FCM token error:', err); }
}

// ========== GLOBAL STATE ==========
let db = {};
let user = null;
let isTakingExam = false;
let examTimer = null;
let examEndTime = null;
let currentWorkType = null;
let currentWorkName = null;
let startTime = null;
let cheatCount = 0;
const MAX_CHEATS = 3;
const avatarIcons = ['👤','😺','🐶','🦊','🐨','🐼','🐸','🐵','🦁','🐯','🐮','🐷','🐭','🐰','🐔'];
const ALL_PERMS = ['2a','2b','2c','2e','2f','res','2g','teachers','parents','flashcards_admin','voucher','support','audit','config','cleanup','attendance','gifts','story_admin','badges','story_config'];
const realtimeRefs = {};

function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
function renderSkeleton(count = 3) {
    return Array(count).fill(0).map(() =>
        `<div class="card skeleton-card skeleton"></div>`
    ).join('');
}

function renderEmptyState(icon, title, subtitle = '') {
    return `<div class="empty-state">
        <span class="empty-icon">${icon}</span>
        <p><b>${escapeHtml(title)}</b></p>
        ${subtitle ? `<small>${escapeHtml(subtitle)}</small>` : ''}
    </div>`;
}

function debounce(fn, delay = 400) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
}

function throttle(fn, limit = 1000) {
    let last = 0;
    return (...args) => { const now = Date.now(); if (now - last >= limit) { last = now; fn(...args); } };
}
// ========== UTILS ==========
function toast(msg, type = 'success', duration = 3000) {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), duration);
}

function handleError(e, context = '') {
    console.error(context, e);
    const msg = e?.message || String(e) || '';

    if (!navigator.onLine || msg.includes('network') || msg.includes('fetch') || msg.includes('timeout')) {
        toast('📡 Mất kết nối — Kiểm tra mạng và thử lại', 'error', 5000);
    } else if (msg.includes('permission') || msg.includes('PERMISSION_DENIED') || e?.code === 'permission-denied') {
        toast('🔒 Bạn không có quyền thực hiện thao tác này', 'error', 4000);
    } else if (msg.includes('validation') || msg.includes('required') || msg.includes('invalid')) {
        toast('⚠️ Dữ liệu chưa hợp lệ — Kiểm tra lại thông tin', 'error', 4000);
    } else {
        toast('❌ Đã xảy ra lỗi' + (context ? ` (${context})` : ''), 'error', 4000);
    }

    // Ghi log lên Firebase
    try {
        fbDB.ref('error_logs').push({
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            context,
            message: msg,
            user: user ? user.uid : null
        });
    } catch {}
}

async function logError(error, context) {
    console.error(context, error);
    try {
        await fbDB.ref('error_logs').push({
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            context,
            message: error.message || String(error),
            stack: error.stack,
            user: user ? user.uid : null

// ========== POINT SYSTEM ANTI-FARM ==========
const POINT_DAILY_MAX = 100;
const POINT_COOLDOWNS = { hw: 0, exam: 0, flashcard: 30000, login: 0 }; // ms cooldown

async function awardPoints(uid, amount, reason, taskId = null) {
    if (!uid || !amount) return false;

    const today = new Date().toISOString().slice(0, 10);
    const histKey = `pts_daily_${uid}_${today}`;
    const ref = fbDB.ref(`point_ledger/${uid}`);

    try {
        // Dùng transaction để tránh race condition
        const result = await fbDB.ref(`point_ledger/${uid}`).transaction(ledger => {
            if (!ledger) ledger = { total: 0, daily: {}, history: [] };
            if (!ledger.daily) ledger.daily = {};
            if (!ledger.history) ledger.history = [];

            const todayPts = ledger.daily[today] || 0;
            if (todayPts + amount > POINT_DAILY_MAX) {
                return; // Abort transaction — đã đạt giới hạn ngày
            }

            // Kiểm tra trùng taskId (chống duplicate)
            if (taskId && ledger.history.some(h => h.taskId === taskId)) {
                return; // Abort — đã cộng điểm cho task này rồi
            }

            ledger.daily[today] = todayPts + amount;
            ledger.total = (ledger.total || 0) + amount;
            ledger.history.unshift({
                taskId: taskId || `manual_${Date.now()}`,
                amount,
                reason,
                timestamp: new Date().toISOString()
            });
            if (ledger.history.length > 200) ledger.history.length = 200;
            return ledger;
        });

        if (result.committed) {
            // Đồng bộ lên users node
            const total = result.snapshot.val()?.total || 0;
            await fbDB.ref(`users/${uid}/pts`).set(total);
            if (db.users?.[uid]) db.users[uid].pts = total;
            return true;
        }
        return false;
    } catch (e) {
        console.error('awardPoints error:', e);
        return false;
    }
}

// ========== LOGIN SECURITY ==========
const LOGIN_MAX_ATTEMPTS = 5;
const LOGIN_LOCKOUT_MS = 5 * 60 * 1000; // 5 phút
const _loginKey = (u) => `login_fail_${u}`;

function getLoginState(username) {
    try {
        const raw = sessionStorage.getItem(_loginKey(username));
        return raw ? JSON.parse(raw) : { count: 0, lockedUntil: 0 };
    } catch { return { count: 0, lockedUntil: 0 }; }
}

function recordLoginFail(username) {
    const state = getLoginState(username);
    state.count = (state.count || 0) + 1;
    if (state.count >= LOGIN_MAX_ATTEMPTS) {
        state.lockedUntil = Date.now() + LOGIN_LOCKOUT_MS;
        state.count = 0;
    }
    sessionStorage.setItem(_loginKey(username), JSON.stringify(state));
}

function clearLoginFail(username) {
    sessionStorage.removeItem(_loginKey(username));
}

function isLoginLocked(username) {
    const state = getLoginState(username);
    if (state.lockedUntil && Date.now() < state.lockedUntil) {
        const remaining = Math.ceil((state.lockedUntil - Date.now()) / 1000);
        return remaining;
    }
    return 0;
}

// ========== LOGIN ==========
async function doLogin() {
    const username = document.getElementById('u').value.trim();
    const password = document.getElementById('p').value.trim();

    if (!username || !password) {
        toast('Vui lòng nhập tài khoản và mật mã', 'error');
        return;
    }

    // Kiểm tra khóa tạm thời
    const lockRemaining = isLoginLocked(username);
    if (lockRemaining > 0) {
        const mins = Math.floor(lockRemaining / 60);
        const secs = lockRemaining % 60;
        toast(`⛔ Tài khoản tạm khóa ${mins}p${secs}s do nhập sai nhiều lần`, 'error');
        return;
    }

    showLoading();
    try {
        const [usersSnap, parentsSnap] = await Promise.all([
            fbDB.ref('users').once('value'),
            fbDB.ref('parents').once('value')
        ]);
        
        db.users = usersSnap.val() || {};
        db.parents = parentsSnap.val() || {};

        // 1. Kiểm tra Admin Root — KHÔNG hardcode, lấy từ Firebase config
        const configSnap = await fbDB.ref('config/admin_credentials').once('value');
        const adminCreds = configSnap.val();
        if (adminCreds) {
            const adminHash = CryptoJS.SHA256(password).toString();
            if (username === adminCreds.username && adminHash === adminCreds.passwordHash) {
                clearLoginFail(username);
                user = { uid: 'admin_root', n: adminCreds.displayName || 'Tổng Quản Trị', r: 'admin' };
                finalizeLogin();
                return;
            }
        } else {
            // Fallback tạm thời nếu chưa cấu hình Firebase
            if (username === 'ADMIN.pn' && password === 'portalnow1') {
                clearLoginFail(username);
                user = { uid: 'admin_root', n: 'Tổng Quản Trị', r: 'admin' };
                finalizeLogin();
                return;
            }
        }

        // 2. Kiểm tra Phụ huynh
        // FIX: Hỗ trợ cả field mới (studentUser) lẫn cũ (childUsername) trong Firebase
        // Mật khẩu = số điện thoại phụ huynh (plain text, không hash)
        const parentEntry = Object.entries(db.parents).find(([id, p]) => {
            const matchUser = (p.studentUser === username) || (p.childUsername === username);
            const matchPass = String(p.phone) === String(password);
            return matchUser && matchPass;
        });
        if (parentEntry) {
            clearLoginFail(username);
            user = { uid: parentEntry[0], ...parentEntry[1], r: 'parent' };
            finalizeLogin();
            return;
        }

        // 3. Kiểm tra Học viên/Giáo viên
        const hashedInput = CryptoJS.SHA256(password).toString();
        const userEntryArr = Object.entries(db.users).find(([uid, u]) => 
            u.u === username && (u.p === hashedInput || u.p === password)
        );
        if (userEntryArr) {
            clearLoginFail(username);
            user = { uid: userEntryArr[0], ...userEntryArr[1] };
            finalizeLogin();
            return;
        }

        // Đăng nhập thất bại
        recordLoginFail(username);
        const stateAfter = getLoginState(username);
        if (stateAfter.lockedUntil && Date.now() < stateAfter.lockedUntil) {
            toast(`⛔ Đã khóa 5 phút do nhập sai ${LOGIN_MAX_ATTEMPTS} lần liên tiếp!`, 'error', 6000);
        } else {
            const attemptsLeft = LOGIN_MAX_ATTEMPTS - (stateAfter.count || 0);
            toast(`❌ Sai tài khoản/mật mã! Còn ${attemptsLeft} lần thử.`, 'error');
        }

    } catch (e) {
        console.error(e);
        toast('Lỗi kết nối máy chủ', 'error');
    } finally {
        hideLoading();
    }
}

async function finalizeLogin() {
    if (user) {

        sessionStorage.setItem(sessionKey, JSON.stringify({ uid: user.uid, loginAt: Date.now() }));

async function teacherLoadNotifs() {
    const uid = document.getElementById('tc_notif_student').value;
    const listEl = document.getElementById('tc_notif_list');
    if (!uid || !listEl) return;

    if (uid === '__public__') {
        const notifs = [...(db.notif_history || [])].sort((a,b) => {
            const ta = a.timestamp || new Date(a.date).getTime() || 0;
            const tb = b.timestamp || new Date(b.date).getTime() || 0;
            return tb - ta;
        });
        listEl.innerHTML = notifs.map(n => `<div class="card"><small>${n.date}</small><div>${n.msgHtml||n.msg}</div></div>`).join('') || '<p>Chưa có.</p>';
        return;
    }

    const snap = await fbDB.ref('private_notif/' + uid).once('value');
    const raw = snap.val();
    let notifs = !raw ? [] : (Array.isArray(raw) ? raw : Object.values(raw));
    notifs = notifs.filter(n => n && (n.msg || n.msgHtml));
    notifs.sort((a,b) => {
        const ta = a.timestamp || new Date(a.date).getTime() || 0;
        const tb = b.timestamp || new Date(b.date).getTime() || 0;
        return tb - ta;
    });
    listEl.innerHTML = notifs.map(n => `<div class="card"><small>${n.date}</small><div>${n.msgHtml||n.msg}</div></div>`).join('') || '<p>Chưa có thông báo riêng.</p>';
}

function playNotificationSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
    } catch (e) {}
}

async function addS() {
    const n = document.getElementById('an').value.trim();
    const d = document.getElementById('ad').value;
    const ati = document.getElementById('ati').value.trim();
    const c = parseInt(document.getElementById('ac').value) || 10;

    if (c < 1) { toast('Sĩ số phải lớn hơn 0', 'error'); return; }
    
    // 👇 THÊM 3 DÒNG NÀY: Kiểm tra và đảm bảo slots là mảng
    if (!db.sked.slots) {
        db.sked.slots = [];
    }
    if (!Array.isArray(db.sked.slots)) {
        db.sked.slots = Object.values(db.sked.slots);
    }
    
    const newSlot = { id: 'slot-' + Date.now(), n, d, ati, c, r: [] };
    db.sked.slots.push(newSlot);  // ← Bây giờ AN TOÀN vì đã đảm bảo là mảng
    await saveDB('sked/slots', db.sked.slots);
    op('2a');
    toast('✅ Đã thêm tiết học thành công!');

async function deleteSlot(slotId) {
    if (!db.sked.slots) {
        db.sked.slots = [];
        return;
    }
    if (!Array.isArray(db.sked.slots)) {
        db.sked.slots = Object.values(db.sked.slots);
    }
    
    const index = db.sked.slots.findIndex(s => s.id === slotId);
    if (index === -1) return;
    
    db.sked.slots.splice(index, 1);

async function addN() {
    const btn = document.querySelector('#pg-det button[onclick="addN()"]');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Đang gửi...'; }
    try {
        const type = document.getElementById('notifType').value;
        const editor = document.getElementById('notif-editor');
        const msgHtml = editor.innerHTML.trim();
        const msgText = editor.innerText.trim();
        if (!msgText && !msgHtml) { toast('Nhập nội dung thông báo', 'error'); return; }
        const fileInput = document.getElementById('notif-attachment');
        let attachmentInfo = null;
        if (fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0];
            showLoading();
            try {
                const storageRef = fbStorage.ref('attachments/' + Date.now() + '_' + file.name);
                const uploadTask = await storageRef.put(file);
                const downloadURL = await uploadTask.ref.getDownloadURL();
                attachmentInfo = { name: file.name, url: downloadURL, type: file.type };
            } catch (e) { toast('Lỗi tải file đính kèm', 'error'); hideLoading(); return; }
            hideLoading();
        }
        const entry = { id: 'msg-' + Date.now(), msg: msgText, msgHtml, date: new Date().toLocaleString(), target: null, attachment: attachmentInfo };
        if (type === 'private') {
            entry.target = document.getElementById('notifStudent').value;
            if (!db.private_notif) db.private_notif = {};
            if (!db.private_notif[entry.target]) db.private_notif[entry.target] = [];
            db.private_notif[entry.target].push(entry);
            await saveDB('private_notif/' + entry.target, db.private_notif[entry.target]);
            toast('Đã gửi thông báo riêng');
        } else {
            if (!db.notif_history) db.notif_history = [];
            db.notif_history.unshift(entry);
            await saveDB('notif_history', db.notif_history);
            const newVersion = (db.notif_version || 0) + 1;
            db.notif_version = newVersion;
            await saveDB('notif_version', newVersion);
            toast('Đã gửi thông báo chung');
        }
        playNotificationSound();
        renderNotifList('all');
        editor.innerHTML = '';
        if (fileInput) fileInput.value = '';
    } catch (error) {
        console.error(error);
        toast('Lỗi khi gửi thông báo: ' + error.message, 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'GỬI'; }
    }
}

function editNotif(id) {
    let n = (db.notif_history || []).find(x => x.id === id);
    let path = 'notif_history';
    let array = db.notif_history;
    if (!n) {
        for (let uid in db.private_notif) {
            let found = (db.private_notif[uid] || []).find(x => x.id === id);
            if (found) {
                n = found;
                path = 'private_notif/' + uid;
                array = db.private_notif[uid];
                break;
            }
        }
    }
    if (!n) return;
    const newContent = prompt("Sửa nội dung (HTML):", n.msgHtml || n.msg);
    if (newContent) {
        n.msgHtml = newContent;
        n.msg = newContent.replace(/<[^>]*>/g, '');
        saveDB(path, array);
        renderNotifList('all');
    }
}

async function deleteNotif(id) {
    // Tìm trong notif_history trước
    let path = 'notif_history';
    let array = [...(db.notif_history || [])];
    let idx = array.findIndex(x => x.id === id);
    
    if (idx > -1) {
        array.splice(idx, 1);
        db.notif_history = array;
        await saveDB(path, array);
        toast('Đã xóa thông báo');
        op('2b');
        return;
    }
    
    // Tìm trong private_notif
    for (let uid in db.private_notif) {
        let arr = [...(db.private_notif[uid] || [])];
        idx = arr.findIndex(x => x.id === id);
        if (idx > -1) {
            arr.splice(idx, 1);
            db.private_notif[uid] = arr;
            await saveDB('private_notif/' + uid, arr);
            toast('Đã xóa thông báo riêng');
            op('2b');
            return;
        }
    }
    
    toast('Không tìm thấy thông báo để xóa', 'error');
    op('2b');
}

function renderAttendance(c) {
    if (!db.attendance) db.attendance = {};

    const todayKey = today;
    const todayAttendance = db.attendance[todayKey] || {};
    
    const students = Object.entries(db.users || {}).filter(([uid, u]) => u.r === 'hv');
    
    let html = `<h3>📋 Điểm danh - ${new Date().toLocaleDateString('vi-VN')}</h3>

    </div>`;
    
    students.forEach(([uid, h]) => {
        const status = todayAttendance[uid] || 'unmarked'; // present / absent / late / unmarked
        let statusColor = 'var(--text-secondary)';
        if (status === 'present') statusColor = 'var(--success)';
        if (status === 'absent') statusColor = 'var(--danger)';
        if (status === 'late') statusColor = 'var(--warning)';
        
        html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">

<button type="button" onclick="markAttendance('${uid}', '${todayKey}', 'present')" style="background:${status === 'present' ? 'var(--success)' : 'var(--surface)'}; color:${status === 'present' ? 'white' : 'var(--text)'}; border:1px solid var(--border);">✅ Có mặt</button>
<button type="button" onclick="markAttendance('${uid}', '${todayKey}', 'late')" style="background:${status === 'late' ? 'var(--warning)' : 'var(--surface)'}; color:${status === 'late' ? 'white' : 'var(--text)'}; border:1px solid var(--border);">⏰ Trễ</button>
<button type="button" onclick="markAttendance('${uid}', '${todayKey}', 'absent')" style="background:${status === 'absent' ? 'var(--danger)' : 'var(--surface)'}; color:${status === 'absent' ? 'white' : 'var(--text)'}; border:1px solid var(--border);">❌ Vắng</button>

function importWordToQuestions(type) {
    const inputId = type === 'hw' ? 'importWordHw' : 'importWordExam';
    const file = document.getElementById(inputId).files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(event) {
        const result = await mammoth.extractRawText({ arrayBuffer: event.target.result });
        const lines = result.value.split('\n').filter(line => line.trim());
        const container = document.getElementById(type === 'hw' ? 'hw-questions-container' : 'exam-questions-container');
        lines.forEach(line => {
            const block = document.createElement('div');
            block.className = 'question-block';
            if (line.includes('|')) {
                const parts = line.split('|').map(s => s.trim());
                block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                  <input class="q-text" value="${parts[0]||''}">
                  <div class="mcq-options">
                    <input class="opt-a" value="${parts[1]||''}"><input class="opt-b" value="${parts[2]||''}">

async function saveHomework() {
    const n = document.getElementById('h_n').value;
    if (!n) { toast('Nhập tên bài tập', 'error'); return; }
    const container = document.getElementById('hw-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    showLoading();
    for (const b of blocks) {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        const audioFile = b.querySelector('.q-audio')?.files[0];
        let audioUrl = '';
        if (audioFile) {
            const storageRef = fbStorage.ref('audio_questions/' + Date.now() + '_' + audioFile.name);
            try {
                const uploadTask = await storageRef.put(audioFile);
                audioUrl = await uploadTask.ref.getDownloadURL();
            } catch (e) { toast('Lỗi tải file âm thanh', 'error'); hideLoading(); return; }
        }
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText, audioUrl,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, audioUrl, point });
        }
    }
    db.hw_list.push({
        n, start: document.getElementById('h_start').value, end: document.getElementById('h_end').value,
        time: document.getElementById('h_time').value, slot: document.getElementById('h_slot').value,
        questions, assignedTo: [], assigned: false
    });
    hideLoading();
    await saveDB('hw_list', db.hw_list);
    op('2c');
    toast('Bài tập đã lưu');
}

async function addHV() {
    const n = document.getElementById('en').value, l = document.getElementById('el').value;
    const username = document.getElementById('eu').value.trim();
    const u = username + '.pn.edu';
    const rawPassword = document.getElementById('ep').value;
    const email = document.getElementById('e_email')?.value || '';
    const phone = document.getElementById('e_phone')?.value || '';
    
    if (!n || !username) { toast('Vui lòng điền Tên và Tài khoản', 'error'); return; }
    if (!rawPassword) { toast('Vui lòng nhập mật khẩu', 'error'); return; }
    if (rawPassword.length < 6) { toast('Mật khẩu phải có ít nhất 6 ký tự!', 'error'); return; }
    
    const emailAuth = u + '@portal.now';
    
    showLoading();
    try {
        // Tạo tài khoản Firebase Auth và lấy uid thật
        const userCred = await fbAuth.createUserWithEmailAndPassword(emailAuth, rawPassword);
        const realUid = userCred.user.uid; // 👈 Lấy uid từ Firebase
        
        // Kiểm tra trùng username trong DB (theo trường u)
        if (Object.values(db.users||{}).some(user => user.u === u)) {
            toast('Tài khoản đã tồn tại trong hệ thống!', 'error');
            await userCred.user.delete(); // xóa Firebase Auth vừa tạo
            hideLoading();
            return;
        }
        
        const hashed = CryptoJS.SHA256(rawPassword).toString();
        db.users[realUid] = { n, l, u, p: hashed, email, phone, avatar: '👤', r: 'hv' };
        addAudit('Tạo học viên', realUid, n);
        await fbDB.ref('users/' + realUid).set(db.users[realUid]);
        
        hideLoading();
        await op('2e');
        toast('Đã tạo học viên với UID đồng bộ Firebase!');
    } catch (e) {
        hideLoading();
        if (e.code === 'auth/email-already-in-use') {
            toast('Email đã tồn tại trong Firebase Auth. Hãy xóa tài khoản cũ trước khi tạo mới.', 'error');
        } else if (e.code === 'auth/weak-password') {
            toast('Mật khẩu quá yếu! Cần ít nhất 6 ký tự.', 'error');
        } else {
            toast('Lỗi: ' + e.message, 'error');
        }
    }
}

function confirmDeleteStudent(uid) {
    if (!isTeacher()) { toast('Không có quyền!', 'error'); return; }
    const target = db.users[uid];
    if (!target) return;
    
    modal(`⚠️ Xóa học viên "${target.n}"?<br><small>Hành động này không thể hoàn tác. Tất cả dữ liệu liên quan sẽ bị xóa.</small>`, async () => {
        showLoading();
        const username = target.u;
        try {
            // 1. Xóa node users
            await fbDB.ref('users/' + uid).remove();
            delete db.users[uid];
            
            // 2. Xóa node data
            await fbDB.ref('data/' + uid).remove();
            if (db.data[uid]) delete db.data[uid];
            
            // 3. Xóa private_notif
            await fbDB.ref('private_notif/' + uid).remove();
            if (db.private_notif && db.private_notif[uid]) delete db.private_notif[uid];
            
            // 4. Huy hiệu (Badges) đã nằm trong node users, sẽ tự động bị xóa ở bước 1. Đã gỡ bỏ code thừa.
            
            // 5. Xóa liên kết phụ huynh
            for (let pid in db.parents) {
                if (db.parents[pid] && db.parents[pid].childUsername === username) {
                    await fbDB.ref('parents/' + pid).remove();
                    delete db.parents[pid];
                }
            }
            
            // 6. Xóa trong gift_history (lọc)
            const giftHistorySnap = await fbDB.ref('gift_history').once('value');
            let giftHistory = giftHistorySnap.val() || [];
            if (Array.isArray(giftHistory)) {
                const newGiftHistory = giftHistory.filter(h => h.uid !== uid);
                if (newGiftHistory.length !== giftHistory.length) {
                    await fbDB.ref('gift_history').set(newGiftHistory);
                    db.gift_history = newGiftHistory;
                }
            }
            
            // 7. Xóa trong submissions
            const submissionsSnap = await fbDB.ref('submissions').once('value');
            let submissions = submissionsSnap.val() || [];
            if (Array.isArray(submissions)) {
                const newSubmissions = submissions.filter(s => s.u !== uid);
                if (newSubmissions.length !== submissions.length) {
                    await fbDB.ref('submissions').set(newSubmissions);
                    db.submissions = newSubmissions;
                }
            }
            
            // 8. Xóa trong attendance (tất cả các ngày)
            const attendanceSnap = await fbDB.ref('attendance').once('value');
            const attendanceData = attendanceSnap.val() || {};
            let attendanceChanged = false;
            for (let dateKey in attendanceData) {
                if (attendanceData[dateKey] && attendanceData[dateKey][uid]) {
                    delete attendanceData[dateKey][uid];
                    attendanceChanged = true;
                }
            }
            if (attendanceChanged) {
                await fbDB.ref('attendance').set(attendanceData);
                db.attendance = attendanceData;
            }
            
            // 9. Xóa trong sked (tuần hiện tại)
            if (db.sked && db.sked.slots) {
                let skedChanged = false;
                db.sked.slots.forEach(slot => {
                    if (slot.r && slot.r.includes(uid)) {
                        slot.r = slot.r.filter(id => id !== uid);
                        skedChanged = true;
                    }
                });
                if (skedChanged) {
                    await fbDB.ref('sked/slots').set(db.sked.slots);
                }
            }
            
            // 10. Xóa trong sked_history (lịch sử tuần)
            if (db.sked_history && db.sked_history.length) {
                let historyChanged = false;
                db.sked_history.forEach(week => {
                    if (week.slots) {
                        week.slots.forEach(slot => {
                            if (slot.r && slot.r.includes(uid)) {
                                slot.r = slot.r.filter(id => id !== uid);
                                historyChanged = true;
                            }
                        });
                    }
                });
                if (historyChanged) {
                    await fbDB.ref('sked_history').set(db.sked_history);
                }
            }
            
            // 11. Xóa token FCM (nếu có)
            await fbDB.ref('fcm_tokens/' + uid).remove();
            
            addAudit('Xóa học viên (toàn bộ dữ liệu)', uid, target.n);
            hideLoading();
            op('2e');
            toast(`✅ Đã xóa hoàn toàn học viên "${target.n}" và mọi dữ liệu liên quan!`);
            
        } catch (error) {
            console.error('Lỗi khi xóa học viên:', error);
            hideLoading();
            toast('Lỗi: ' + error.message, 'error');
        }
    });
}

function viewRegHistory(uid) {
    const student = db.users[uid];
    if (!student) { toast('Không tìm thấy học viên', 'error'); return; }
    
    const allHistory = db.sked_history || [];
    const currentSlots = db.sked.slots || [];
    const allWeeks = [
        { t: db.sked.t || 'Tuần hiện tại', date: new Date().toLocaleDateString(), slots: currentSlots, isCurrent: true },
        ...allHistory.map(w => ({ ...w, isCurrent: false }))
    ];
    
    let html = `<h3>📋 Lịch sử đăng ký: ${student.n}</h3>`;
    let foundAny = false;
    
    allWeeks.forEach(week => {
        const registeredSlots = week.slots.filter(s => (s.r || []).includes(uid));
        if (registeredSlots.length > 0) {
            foundAny = true;
            html += `<div class="card"><b>📅 ${week.t}</b> <small>(${week.date || 'N/A'})</small><ul>`;
            registeredSlots.forEach(s => {
                const slotId = s.id || '';
                html += `<li style="display:flex; justify-content:space-between; align-items:center;">
                    ${s.n} (${s.d} - ${s.ati})
                    <button class="danger" onclick="adminRemoveRegistration('${uid}', '${slotId}', '${week.isCurrent ? 'current' : 'history'}')" style="font-size:12px; padding:4px 8px;">🗑️ Hủy ĐK</button>
                </li>`;
            });
            html += `</ul></div>`;
        }
    });
    
    if (!foundAny) {
        html += '<p>Học viên này chưa từng đăng ký tiết nào.</p>';
    }
    
    html += `<br><button type="button" onclick="op('2e')">← Quay lại danh sách học viên</button>`;
    document.getElementById('det-content').innerHTML = html;
}

async function adminRemoveRegistration(studentUid, slotId, weekType) {
    if (!isTeacher()) { toast('Không có quyền', 'error'); return; }
    let slot;
    if (weekType === 'current') {
        slot = db.sked.slots.find(s => s.id === slotId);
    } else {
        toast('Không thể sửa lịch sử cũ, chỉ có thể hủy đăng ký ở tuần hiện tại.', 'error');
        return;
    }
    if (!slot) return;
    if (!slot.r) slot.r = [];
    const idx = slot.r.indexOf(studentUid);
    if (idx > -1) {
        slot.r.splice(idx, 1);
        await saveDB('sked/slots', db.sked.slots);
        const student = db.users[studentUid];
        const msg = `Lịch học của bạn đã bị thay đổi bởi quản trị viên. Tiết "${slot.n}" (${slot.d} - ${slot.ati}) đã bị hủy. Vui lòng kiểm tra lại lịch học.`;
        if (!db.private_notif) db.private_notif = {};
        if (!db.private_notif[studentUid]) db.private_notif[studentUid] = [];
        db.private_notif[studentUid].push({
            id: 'msg-' + Date.now(),
            msg: msg,
            msgHtml: msg,
            date: new Date().toLocaleString(),
            target: studentUid
        });
        await saveDB('private_notif/' + studentUid, db.private_notif[studentUid]);
        toast('Đã hủy đăng ký và thông báo cho học viên.');
        viewRegHistory(studentUid);
    }
}

async function saveExam() {
    const n = document.getElementById('x_n').value;
    if (!n) { toast('Nhập tên đề thi', 'error'); return; }
    const container = document.getElementById('exam-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    showLoading();
    for (const b of blocks) {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        const audioFile = b.querySelector('.q-audio')?.files[0];
        let audioUrl = '';
        if (audioFile) {
            const storageRef = fbStorage.ref('audio_questions/' + Date.now() + '_' + audioFile.name);
            try {
                const uploadTask = await storageRef.put(audioFile);
                audioUrl = await uploadTask.ref.getDownloadURL();
            } catch (e) { toast('Lỗi tải file âm thanh', 'error'); hideLoading(); return; }
        }
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText, audioUrl,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, audioUrl, point });
        }
    }
    db.exams.push({
        n, start: document.getElementById('x_start').value, end: document.getElementById('x_end').value,
        time: document.getElementById('x_time').value, slot: document.getElementById('x_slot').value,
        p: document.getElementById('x_p').value, st: document.getElementById('x_s').value,
        questions, assignedTo: [], assigned: false
    });
    hideLoading();
    await saveDB('exams', db.exams);
    op('2f');
    toast('Đề thi đã lưu');
}

async function svFee(uid) {
    if (!isMainAdmin() && !(isSubAdmin() && user.permissions?.includes('2g'))) {
        toast('Không có quyền', 'error'); op('2g'); return;
    }
    
    // Tìm nút bấm lưu hiện tại để vô hiệu hóa chống click trùng
    const saveBtn = document.querySelector("button[onclick^='svFee']");
    if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.innerText = '⏳ ĐANG LƯU...';
    }

    const a = parseInt(document.getElementById('f_a').value) || 0;
    const newSlots = parseInt(document.getElementById('f_s').value) || 0;
    const newRate = parseInt(document.getElementById('f_r').value) || 0;
    const feeRef = fbDB.ref(`data/${uid}/fee`);
    
    try {
        await feeRef.transaction(current => {
            if (!current) current = { slots: 0, rate: 0, paid: 0, logs: [], receipts: [] };
            if (a > 0) {
                current.paid = (current.paid || 0) + a;
                current.logs.unshift(new Date().toLocaleDateString() + ': +' + a);
            }
            current.slots = newSlots;
            current.rate = newRate;
            return current;
        });
        toast('Đã cập nhật học phí!');
        op('2g');
    } catch (error) {
        console.error(error);
        toast('Lỗi khi lưu học phí: ' + error.message, 'error');
    } finally {
        // Mở khóa lại nút bấm nếu xảy ra lỗi hoặc hoàn tất
        if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = '💾 LƯU';
        }
    }
}

async function saveBankInfo() {
    const bankName = document.getElementById('bankName').value;
    const accountNumber = document.getElementById('bankNumber').value;
    const qrCodeInput = document.getElementById('qrCodeInput').value;
    const qrFileInput = document.getElementById('qrFile');
    const qrFile = qrFileInput ? qrFileInput.files[0] : null; // Bảo vệ an toàn tránh lỗi crash
    
    let qrUrl = qrCodeInput;
    
    // Chỉ xử lý upload nếu người dùng thực sự chọn một file mới
    if (qrFile && qrFile.name) {
        showLoading();
        try {
            const storageRef = fbStorage.ref('bank_qr/' + Date.now() + '_' + qrFile.name);
            const uploadTask = await storageRef.put(qrFile);
            qrUrl = await uploadTask.ref.getDownloadURL();
        } catch (uploadError) {
            console.error('Lỗi tải ảnh QR lên Storage:', uploadError);
            toast('Không thể tải ảnh biên lai/QR lên hệ thống', 'error');
        } finally {
            hideLoading();
        }
    }
    
    db.bank_info = { bankName, accountNumber, qrCode: qrUrl };
    await saveDB('bank_info', db.bank_info);
    toast('Đã lưu thông tin ngân hàng');
}

async function approveReceipt(uid, i) {
    if (!isMainAdmin() && !(isSubAdmin() && user.permissions?.includes('2g'))) { toast('Không có quyền', 'error'); op('2g'); return; }
    const d = db.data[uid].fee;
    d.receipts = d.receipts || [];
    if (!d.receipts[i]) return;
    const r = d.receipts[i];
    d.paid = (d.paid || 0) + r.amount;
    d.logs = d.logs || [];
    d.logs.unshift(`✅ ${r.date}: +${r.amount}đ (${r.note})`);
    d.receipts.splice(i, 1);
    await saveDB('data/' + uid + '/fee', d);
    edFee(uid);
}

async function rejectReceipt(uid, i) {
    if (!isMainAdmin() && !(isSubAdmin() && user.permissions?.includes('2g'))) { toast('Không có quyền', 'error'); op('2g'); return; }
    const d = db.data[uid].fee;
    d.receipts = d.receipts || [];
    d.receipts.splice(i, 1);
    await saveDB('data/' + uid + '/fee', d);
    edFee(uid);
}

async function addVoucher() {
    const code = document.getElementById('v_code').value.trim();
    const amount = parseInt(document.getElementById('v_amount').value) || 0;
    const maxUses = parseInt(document.getElementById('v_uses').value) || 1;
    
    if (!code || code.length !== 12) { toast('Mã voucher phải đúng 12 ký tự!', 'error'); return; }
    if (!/[a-zA-Z]/.test(code) || !/[0-9]/.test(code)) { toast('Mã voucher phải có cả chữ và số!', 'error'); return; }
    if (amount <= 0) { toast('Số tiền khấu trừ phải > 0', 'error'); return; }
    if ((db.vouchers || []).some(v => v.code === code)) { toast('Mã voucher đã tồn tại!', 'error'); return; }
    
    if (!db.vouchers) db.vouchers = [];
    db.vouchers.push({ code, amount, maxUses, remaining: maxUses, active: true, createdBy: user.n, createdAt: new Date().toLocaleString() });
    await saveDB('vouchers', db.vouchers);
    op('voucher');
    toast('Đã tạo voucher');
}

function copyVoucherCode(code) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(code);
        toast('Đã sao chép mã: ' + code);
    } else {
        const ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Đã sao chép mã: ' + code);
    }
}

}

    });
}

async function quickNotifyScore(uid) {
    if (!db.users[uid]) {
        const snap = await fbDB.ref('users/' + uid).once('value');
        if (snap.exists()) db.users[uid] = snap.val();
        else return toast('Lỗi: Học viên không tồn tại!', 'error');
    }
    const msg = 'Điểm số của bạn đã được cập nhật. Hãy kiểm tra lại kết quả nhé.';
    const notifKey = 'score-' + Date.now();
    const notifData = {
        id: notifKey,
        msg: msg,
        msgHtml: `<b>📊 Cập nhật điểm:</b> ${msg}`,
        date: new Date().toLocaleString(),
        target: uid
    };
    // Lưu từng tin nhắn riêng bằng key cụ thể — tránh lỗi array/object mismatch
    await fbDB.ref('private_notif/' + uid + '/' + notifKey).set(notifData);
    if (!db.private_notif) db.private_notif = {};
    if (!db.private_notif[uid]) db.private_notif[uid] = [];
    if (!Array.isArray(db.private_notif[uid])) db.private_notif[uid] = Object.values(db.private_notif[uid]);
    db.private_notif[uid].push(notifData);
    toast(`Đã gửi thông báo điểm cho ${db.users[uid].n}`);
    playNotificationSound();
}

async function edScr(uid) {
    // FIX: Đảm bảo user tồn tại trong db.users
    if (!db.users[uid]) {
        const snap = await fbDB.ref('users/' + uid).once('value');
        if (snap.exists()) db.users[uid] = snap.val();
    }
    if (!db.data[uid]) {
        const dSnap = await fbDB.ref('data/' + uid).once('value');
        db.data[uid] = dSnap.val() || {};
    }
    const d = db.data[uid] || (db.data[uid] = {});
    if (!d.pts_tl) d.pts_tl = [];
    if (!d.pts_kt) d.pts_kt = [];
    const row = (p, i, t) => `<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td><td><button class="danger" onclick="deletePoint('${uid}','${t}',${i})">X</button></td></tr>`;
    document.getElementById('det-content').innerHTML = `
      <h4>Điểm: ${db.users[uid]?.n || uid}</h4>
      <div class="card">
        <input id="p_n" placeholder="Tên bài"><input id="p_s" placeholder="Điểm"><input id="p_cm" placeholder="Nhận xét">
        <select id="p_t"><option value="tl">Tích lũy</option><option value="kt">Kiểm tra/Thi</option></select>
        <button type="button" onclick="adPt('${uid}')">THÊM</button>
      </div>
      <div class="table-responsive">
        <table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse:collapse;">
          <thead><tr><th>Tên bài</th><th>Điểm</th><th>Nhận xét</th><th></th></tr></thead>
          <tbody>${d.pts_tl.map((p, i) => row(p, i, 'tl')).join('')}${d.pts_kt.map((p, i) => row(p, i, 'kt')).join('')}</tbody>
        </table>
      </div>
      <div class="card" style="margin-top:12px;">
        <h5>📢 Thông báo nhanh</h5>
        <button type="button" onclick="quickNotifyScore('${uid}')">📢 TB: "Điểm số của bạn đã được cập nhật. Hãy kiểm tra lại"</button>
      </div>`;
}

async function adPt(uid) {
    const t = document.getElementById('p_t').value;
    const item = { n: document.getElementById('p_n').value, s: document.getElementById('p_s').value, cm: document.getElementById('p_cm').value };
    const path = t === 'tl' ? `data/${uid}/pts_tl` : `data/${uid}/pts_kt`;
    const pointsRef = fbDB.ref(path);
    try {
        await pointsRef.transaction(current => {
            if (!current) current = [];
            current.push(item);
            return current;
        });
        edScr(uid);
        toast('Đã thêm điểm');
    } catch (error) {
        console.error(error);
        toast('Lỗi khi lưu điểm', 'error');
    }
}

async function deletePoint(uid, t, i) {
    modal('⚠️ Xóa điểm này?', async () => {
        if (t === 'tl') {
            db.data[uid].pts_tl.splice(i, 1);
            await saveDB('data/' + uid + '/pts_tl', db.data[uid].pts_tl);
        } else {
            db.data[uid].pts_kt.splice(i, 1);
            await saveDB('data/' + uid + '/pts_kt', db.data[uid].pts_kt);
        }
        edScr(uid);
        toast('Đã xóa điểm');
    });
}

function editPermissions(uid) {
    if (!isMainAdmin()) { toast('Không có quyền', 'error'); return; }
    const target = db.users[uid];
    if (!target || target.r !== 'subadmin') return;
    
    const allPerms = ALL_PERMS;
    const currentPerms = target.permissions || [];
    
    let html = `<h3>🔧 Phân quyền cho: ${target.n}</h3>
    <div class="card" style="display:flex; flex-wrap:wrap; gap:8px;">`;
    allPerms.forEach(p => {
        const checked = currentPerms.includes(p) ? 'checked' : '';
        const labels = {
            '2a':'📅 Lịch học', '2b':'📢 Thông báo', '2c':'📝 Bài tập', '2e':'👥 Học viên', 
            '2f':'📋 Thi cử', 'res':'📊 Kết quả', '2g':'💰 Học phí', 'teachers':'🍎 Giáo viên',

            'story_admin':'📰 Story', 'badges':'🏅 Huy hiệu', 'story_config':'⚙️ Cấu hình Story'
        };
        html += `<label style="display:flex; align-items:center; gap:4px; margin:4px; padding:4px 8px; background:var(--surface-alt); border-radius:8px; cursor:pointer;">
            <input type="checkbox" id="perm_${p}" ${checked} style="width:20px; height:20px; margin:0;"> 
            ${labels[p] || p}
        </label>`;
    });
    html += `</div>
        <button onclick="savePermissions('${uid}')" style="margin-top:10px;">💾 Lưu quyền</button>
        <button onclick="op('admins')" class="ghost" style="margin-top:10px;">← Quay lại</button>`;

async function savePermissions(uid) {
    if (!isMainAdmin()) return;
    const target = db.users[uid];
    if (!target || target.r !== 'subadmin') return;
    
    const allPerms = ALL_PERMS;
    const selected = [];
    for (let p of allPerms) {
        const checkbox = document.getElementById('perm_'+p);
        if (checkbox && checkbox.checked) selected.push(p);
    }
    target.permissions = selected;
    // FIX: Dùng fbDB.ref().set() trực tiếp thay vì saveDB để tránh lỗi array với update()
    await fbDB.ref('users/' + uid + '/permissions').set(selected);
    toast('Đã lưu quyền cho ' + target.n);
    op('admins');
}

async function addAdmin() {
    if (!isMainAdmin()) return;
    const name = document.getElementById('ad_name').value;
    let username = document.getElementById('ad_u').value.trim();
    if (!username.endsWith('.pn')) username += '.pn';
    const rawPassword = document.getElementById('ad_p').value;
    const role = document.getElementById('ad_role').value;
    
    if (!name || !username) { toast('Điền đầy đủ thông tin', 'error'); return; }
    if (!rawPassword) { toast('Vui lòng nhập mật khẩu', 'error'); return; }
    if (rawPassword.length < 6) { toast('Mật khẩu phải có ít nhất 6 ký tự!', 'error'); return; }
    
    const emailAuth = username + '@portal.now';
    
    showLoading();
    try {
        const userCred = await fbAuth.createUserWithEmailAndPassword(emailAuth, rawPassword);
        const realUid = userCred.user.uid;
        
        if (Object.values(db.users||{}).some(user => user.u === username)) {
            toast('Tài khoản đã tồn tại!', 'error');
            await userCred.user.delete();
            hideLoading();
            return;
        }
        
        const hashed = CryptoJS.SHA256(rawPassword).toString();
        db.users[realUid] = { n: name, u: username, p: hashed, r: role, avatar: '👤', permissions: role === 'subadmin' ? ['2a','2b','2c','2e','2f','res','teachers','parents'] : [] };
        addAudit('Thêm admin/subadmin', realUid, name);
        await fbDB.ref('users/' + realUid).set(db.users[realUid]);
        
        hideLoading();
        op('admins');
        toast('Đã thêm admin (UID đồng bộ)');
    } catch (e) {
        hideLoading();
        toast('Lỗi: ' + e.message, 'error');
    }
}

function confirmDeleteUser(uid) {
    if (!isMainAdmin()) { toast('Chỉ Admin chính mới có quyền xóa!', 'error'); return; }

}

async function renderAudit(c) {
    c.innerHTML = '<p style="text-align:center; padding:20px;">Đang tải lịch sử...</p>';
    try {
        // Luôn load mới từ Firebase, không dùng db.audit_log cũ
        const snap = await fbDB.ref('audit_log').once('value');
        db.audit_log = snap.val() || [];
        if (!Array.isArray(db.audit_log)) db.audit_log = Object.values(db.audit_log);
    } catch(e) {
        console.warn('Không tải được lịch sử hoạt động:', e);
    }
    const logs = (db.audit_log || []).slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    c.innerHTML = `<h3>📋 Lịch sử hoạt động</h3>
    <p style="color:var(--text-secondary); font-size:13px;">Tổng: ${logs.length} bản ghi</p>` +
    (logs.length ? logs.map(l => `<div class="card" style="margin-bottom:8px;">
        <small style="color:var(--text-secondary);">${new Date(l.timestamp).toLocaleString()}</small>
        <div><b>${escapeHtml(l.name || '')}</b>: ${escapeHtml(l.action || '')} 
        ${l.target ? `<span style="color:var(--accent);">[${escapeHtml(l.target)}]</span>` : ''}
        ${l.details ? `— ${escapeHtml(l.details)}` : ''}</div>
    </div>`).join('') : '<p>Chưa có lịch sử nào.</p>');
}

// ========== SRS – SPACED REPETITION SYSTEM ==========
// Thuật toán SM-2: tính khoảng cách ôn tập tiếp theo dựa trên độ khó
function calcNextSRS(card, quality) {
    // quality: 0=Không nhớ, 1=Khó, 2=Nhớ được, 3=Dễ
    const srs = card.srs || { interval: 1, repetitions: 0, easeFactor: 2.5, nextReview: Date.now() };
    let { interval, repetitions, easeFactor } = srs;

    if (quality < 1) {
        // Quên – reset về 1 ngày
        repetitions = 0; interval = 1;
    } else {
        if (repetitions === 0) interval = 1;
        else if (repetitions === 1) interval = 6;
        else interval = Math.round(interval * easeFactor);
        repetitions++;
    }
    // Điều chỉnh easeFactor (không dưới 1.3)
    easeFactor = Math.max(1.3, easeFactor + 0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02));
    const nextReview = Date.now() + interval * 24 * 60 * 60 * 1000;
    return { interval, repetitions, easeFactor, nextReview, lastQuality: quality };
}

async function saveSRSProgress(cardIndex, quality) {
    const allCards = db.custom_flashcards || [];
    if (!allCards[cardIndex]) return;
    const card = allCards[cardIndex];
    card.srs = calcNextSRS(card, quality);
    // Lưu tiến độ SRS cá nhân vào data của học viên
    if (!db.data) db.data = {};
    if (!db.data[user.uid]) db.data[user.uid] = {};
    if (!db.data[user.uid].srs_progress) db.data[user.uid].srs_progress = {};
    db.data[user.uid].srs_progress[cardIndex] = card.srs;
    await fbDB.ref('data/' + user.uid + '/srs_progress/' + cardIndex).set(card.srs);
    toast(quality >= 2 ? `✅ Ôn lại sau ${card.srs.interval} ngày` : '🔁 Sẽ hỏi lại sớm!');
}

async function startSRSMode() {
    const m = document.getElementById('hv-main');
    const allCards = db.custom_flashcards || [];
    if (allCards.length === 0) { toast('Chưa có thẻ!', 'error'); return; }

    // Tải SRS progress của học viên
    const srsSnap = await fbDB.ref('data/' + user.uid + '/srs_progress').once('value');
    const srsData = srsSnap.val() || {};

    const now = Date.now();
    // Lọc thẻ cần ôn hôm nay (nextReview <= now) hoặc chưa học lần nào
    const dueCards = allCards.map((c, i) => ({ ...c, _idx: i, srs: srsData[i] || null }))
        .filter(c => !c.srs || c.srs.nextReview <= now);

    if (dueCards.length === 0) {
        m.innerHTML = `<h3>🧠 Ôn tập SRS</h3>
        <div class="card" style="text-align:center; padding:30px;">
            <div style="font-size:60px;">🎉</div>
            <h3>Tuyệt vời! Không có thẻ nào cần ôn hôm nay.</h3>
            <p style="color:var(--text-secondary);">Quay lại sau để ôn thêm.</p>
        </div>
        <button onclick="sv('flashcards')">← Quay lại</button>`;
        return;
    }

    window._srs_queue = [...dueCards];
    window._srs_pos = 0;
    renderSRSCard();
}

function renderSRSCard() {
    const m = document.getElementById('hv-main');
    const queue = window._srs_queue || [];
    const pos = window._srs_pos || 0;

    if (pos >= queue.length) {
        m.innerHTML = `<h3>🧠 Ôn tập SRS</h3>
        <div class="card" style="text-align:center; padding:30px;">
            <div style="font-size:50px;">✅</div>
            <h3>Hoàn thành! Đã ôn ${queue.length} thẻ.</h3>
        </div>
        <button onclick="sv('flashcards')">← Quay lại</button>`;
        return;
    }

    const card = queue[pos];
    m.innerHTML = `<h3>🧠 SRS – ${pos + 1}/${queue.length} thẻ</h3>
    <div class="card" style="text-align:center; padding:30px;">
        <div style="font-size:70px; margin-bottom:10px;">${card.cn}</div>
        <div id="srs-answer" class="hidden" style="margin-top:15px;">
            <p style="font-size:24px; color:var(--accent);">${card.py}</p>
            <p style="font-size:20px;">${card.vn}</p>
            <small style="color:var(--text-secondary);">[${card.category || ''}]</small>
        </div>
        <button onclick="document.getElementById('srs-answer').classList.remove('hidden'); this.style.display='none';" style="margin-top:20px;">👁 Lật thẻ</button>
    </div>
    <div id="srs-rate" class="hidden card" style="text-align:center;">
        <p style="font-weight:600; margin-bottom:10px;">Bạn nhớ thế nào?</p>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="danger" onclick="rateSRS(0)">😵 Không nhớ</button>
            <button style="background:var(--warning)" onclick="rateSRS(1)">😕 Khó nhớ</button>
            <button style="background:var(--accent)" onclick="rateSRS(2)">🙂 Nhớ được</button>
            <button style="background:var(--success)" onclick="rateSRS(3)">😄 Dễ nhớ</button>
        </div>
    </div>
    <script>
        document.querySelector('[onclick*="Lật"]')?.addEventListener('click', function() {
            document.getElementById('srs-rate').classList.remove('hidden');
        });
    <\/script>
    <button onclick="sv('flashcards')" class="ghost" style="margin-top:10px;">✕ Thoát</button>`;
}

async function rateSRS(quality) {
    const queue = window._srs_queue || [];
    const pos = window._srs_pos || 0;
    const card = queue[pos];
    if (!card) return;
    await saveSRSProgress(card._idx, quality);
    if (quality < 1) {
        // Đưa thẻ khó vào cuối queue để hỏi lại
        window._srs_queue.push(card);
    }
    window._srs_pos = pos + 1;
    renderSRSCard();
}

function flipCard() {
    isFlipped = !isFlipped;
    document.getElementById('flashcard-inner').style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
}

function nextCard() {
    const arr = window._fc_current || db.custom_flashcards || [];
    currentFlashcardIndex = (currentFlashcardIndex + 1) % arr.length;
    updateFlashcardDisplay(arr);
}

function prevCard() {
    const arr = window._fc_current || db.custom_flashcards || [];
    currentFlashcardIndex = (currentFlashcardIndex - 1 + arr.length) % arr.length;
    updateFlashcardDisplay(arr);
}

function updateFlashcardDisplay(arr) {
    const v = arr[currentFlashcardIndex];
    document.getElementById('fc-cn').innerText = v.cn;
    document.getElementById('fc-py').innerText = v.py;
    document.getElementById('fc-vn').innerText = v.vn;
    document.getElementById('fc-progress').innerText = `${currentFlashcardIndex + 1} / ${arr.length}`;
    document.getElementById('flashcard-inner').style.transform = 'rotateY(0deg)';
    isFlipped = false;
}

function shuffleCards() {
    const arr = window._fc_current || db.custom_flashcards || [];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    currentFlashcardIndex = 0;
    updateFlashcardDisplay(arr);
    toast('Đã xáo trộn thẻ');
}

var writingCanvas, writingCtx, isDrawing = false;
var canvasHistory = [];

function renderWritingPad(parentEl) {
    const allCards = db.custom_flashcards || [];
    const card = allCards.length > 0 ? allCards[currentFlashcardIndex % allCards.length] : null;
    const cn = card ? card.cn : '爱';
    const py = card ? card.py : 'ài';
    const vn = card ? card.vn : 'yêu';
    
    parentEl.innerHTML = `
      <h3>✍️ Tập viết chữ Hán</h3>
      <div class="card" style="text-align:center;">
        <div style="font-size:80px; margin:10px 0; color:var(--text);">${cn}</div>
        <small style="color:var(--text-secondary);">${py} - ${vn}</small>
      </div>
      <div class="card" style="padding:10px;">
        <canvas id="writingCanvas" width="300" height="300" style="border:2px dashed var(--border); border-radius:12px; width:100%; max-width:300px; touch-action:none; cursor:crosshair; background:white;"></canvas>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap;">
<button type="button" onclick="clearCanvas()">🧹 Xóa</button>
<button type="button" onclick="undoCanvas()">↩ Lùi</button>
<button type="button" onclick="saveCanvasImage()">💾 Lưu ảnh</button>
<button type="button" onclick="changeWritingWord()">🔄 Đổi chữ</button>
        </div>
      </div>
      <button type="button" onclick="sv('profile')" style="margin-top:10px;">← Quay lại</button>`;
    
    setTimeout(() => {
        writingCanvas = document.getElementById('writingCanvas');
        if (!writingCanvas) return;
        writingCtx = writingCanvas.getContext('2d');
        writingCtx.lineWidth = 8;
        writingCtx.lineCap = 'round';
        writingCtx.strokeStyle = '#1e293b';
        
        writingCanvas.addEventListener('mousedown', startDrawing);
        writingCanvas.addEventListener('mousemove', draw);
        writingCanvas.addEventListener('mouseup', stopDrawing);
        writingCanvas.addEventListener('mouseleave', stopDrawing);
        writingCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        writingCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        writingCanvas.addEventListener('touchend', stopDrawing);
    }, 100);
}

function startDrawing(e) {
    isDrawing = true;
    const rect = writingCanvas.getBoundingClientRect();
    const scaleX = writingCanvas.width / rect.width;
    const scaleY = writingCanvas.height / rect.height;
    writingCtx.beginPath();
    writingCtx.moveTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
}

function draw(e) {
    if (!isDrawing) return;
    const rect = writingCanvas.getBoundingClientRect();
    const scaleX = writingCanvas.width / rect.width;
    const scaleY = writingCanvas.height / rect.height;
    writingCtx.lineTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
    writingCtx.stroke();
}

function stopDrawing() { isDrawing = false; }

function clearCanvas() {
    writingCtx.clearRect(0, 0, writingCanvas.width, writingCanvas.height);
    canvasHistory = [];
}

function undoCanvas() {
    // Cách đơn giản nhất là xóa trắng nếu chưa làm hệ thống lưu lịch sử nét vẽ
    if (writingCtx) {
        writingCtx.clearRect(0, 0, writingCanvas.width, writingCanvas.height);
        toast('Đã làm sạch vùng viết');
    }
}


function saveCanvasImage() {
    const dataUrl = writingCanvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.href = dataUrl;
    link.download = 'chu_han_' + Date.now() + '.png';
    link.click();
    toast('Đã tải ảnh xuống');
}

function changeWritingWord() {
    const allCards = db.custom_flashcards || [];
    if (allCards.length === 0) return;
    currentFlashcardIndex = (currentFlashcardIndex + 1) % allCards.length;
    renderWritingPad(document.getElementById('hv-main'));
}

// ========== ĐĂNG KÝ / HỦY SLOT (DÙNG ID AN TOÀN) ==========
async function tglRegById(slotId) {
    if (!db.sked) return;
    const skedRef = fbDB.ref('sked');
    try {
        await skedRef.transaction(current => {
            if (!current) return { slots: [] };
            let slots = Array.isArray(current.slots) ? current.slots : Object.values(current.slots || {});
            const slotIndex = slots.findIndex(s => s.id === slotId);
            if (slotIndex === -1) return;
            const slot = slots[slotIndex];
            if (!slot.r) slot.r = [];
            const idx = slot.r.indexOf(user.uid);
            if (idx > -1) {
                slot.r.splice(idx, 1);
            } else {
                let totalRegistered = 0;
                slots.forEach(s => { if (s.r && s.r.includes(user.uid)) totalRegistered++; });
                if (totalRegistered >= 8) {
                    toast('Bạn đã đăng ký tối đa 8 tiết!', 'error');
                    return;
                }
                if (slot.r.length >= slot.c) {
                    toast('Slot đã đầy!', 'error');
                    return;
                }
                slot.r.push(user.uid);
            }
            // Cập nhật biến DB local ngay lập tức để UI không bị giật/lag
            db.sked.slots = slots;
            return { ...current, slots };
        });
        toast('Cập nhật thành công!');
        await sv('reg'); // Ép UI chờ đồng bộ xong mới render lại
    } catch (e) {
        console.error('Transaction error:', e);
        toast('Lỗi hệ thống, thử lại sau', 'error');
    }
}

async function stH(index) {
    const assignedHw = (db.hw_list || []).filter(h => h.assignedTo && h.assignedTo.includes(user.uid));
    const h = assignedHw[index];
    if (!h) return;
    const serverNow = await getServerTime();
    startTime = serverNow;
    currentWorkType = 'hw'; currentWorkName = h.n;
    let html = `<h3>${h.n}</h3>`;
    if (h.time) {
        examEndTime = new Date(serverNow.getTime() + h.time * 60000);
        clearInterval(examTimer);
        examTimer = setInterval(async () => {
            const nowServer = await getServerTime();
            const diff = examEndTime - nowServer;
            if (diff <= 0) { clearInterval(examTimer); toast('Hết giờ! Bài sẽ được nộp.', 'error'); sub('hw', h.n); }
            const min = Math.floor(diff / 60000);
            const sec = Math.floor((diff % 60000) / 1000);
            const el = document.getElementById('hwTimer');
            if (el) el.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
        html += `<div class="timer" id="hwTimer"></div>`;
    }
    h.questions.forEach((q, qi) => {

        if (q.audioUrl) {
            audioHtml = `<div style="margin:8px 0;"><audio controls style="width:100%;"><source src="${q.audioUrl}" type="audio/mpeg"></audio></div>`;
