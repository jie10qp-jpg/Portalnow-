// ========== NỘP BÀI ==========
async function sub(type, name) {
    const work = type === 'hw'
        ? (db.hw_list || []).find(h => h.assignedTo && h.assignedTo.includes(user.uid) && h.n === name)
        : (db.exams || []).find(x => x.assignedTo && x.assignedTo.includes(user.uid) && x.n === name);
    if (!work) return;
    let answers = [];
    if (work.questions) {
        work.questions.forEach((q, qi) => {
            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="q${qi}"]:checked`);
                answers.push({ q: q.q, selected: selected ? selected.value : '', correct: q.ans, point: q.point||1 });
            } else {
                const ans = document.getElementById(`essay${qi}`)?.value || '';
                answers.push({ q: q.q, ans, point: q.point||1 });
            }
        });
    }
    const nowServer = await getServerTime();
    const diff = Math.floor((nowServer - startTime) / 1000), dur = Math.floor(diff / 60) + "p " + (diff % 60) + "s";
    const subObj = { u: user.uid, type, n: name, date: nowServer.toLocaleString(), dur, answers };
    if (type === 'exam') {
        const mcqAnswers = answers.filter(a => a.selected !== undefined);
        const correctCount = mcqAnswers.filter(a => a.selected === a.correct).length;
        subObj.score = `${correctCount}/${mcqAnswers.length}`;
        isTakingExam = false;
        deactivateAntiCheat();
    }
    db.submissions.push(subObj);
    await saveDB('submissions', db.submissions);
    updateQuestionStats(work, answers);
    if (db.question_stats && Object.keys(db.question_stats).length) {
        await saveDB('question_stats', db.question_stats);
    }
    
// ===== HỆ THỐNG ĐIỂM MỚI (dùng transaction) =====
if (!db.gift_history) db.gift_history = [];

const now = new Date();
let deadline = null;
if (work && work.end) deadline = new Date(work.end);

let pointChange = 0;
let pointReason = '';

// UPDATE: Đọc định mức từ config Firebase (Admin có thể chỉnh)
const pc = (db.config && db.config.points_config) ? db.config.points_config : {
    hw_ontime: 5, hw_late: -3, exam_10: 20, exam_9: 10, exam_8: 5
};

if (type === 'hw') {
    if (deadline && now > deadline) {
        pointChange = pc.hw_late;
        pointReason = `Nộp muộn bài tập: ${name}`;
    } else {
        pointChange = pc.hw_ontime;
        pointReason = `Nộp bài tập đúng hạn: ${name}`;
    }
} 

else if (type === 'exam') {
    const hasEssay = work.questions && work.questions.some(q => q.type === 'essay');
    const mcqAnswers = answers.filter(a => a.selected !== undefined);
    const correctCount = mcqAnswers.filter(a => a.selected === a.correct).length;
    const totalMcq = mcqAnswers.length;
    const score = totalMcq > 0 ? Math.round((correctCount / totalMcq) * 10) : 0;

    // Chỉ tự động cộng điểm thưởng nếu đề thi KHÔNG có câu tự luận
    if (!hasEssay) {
        if (score >= 10) {
            pointChange = pc.exam_10;
            pointReason = `Điểm thi 10: ${name}`;
        } else if (score >= 9) {
            pointChange = pc.exam_9;
            pointReason = `Điểm thi 9: ${name}`;
        } else if (score >= 8) {
            pointChange = pc.exam_8;
            pointReason = `Điểm thi 8: ${name}`;
        }
    } else {
        toast('Bài thi có câu tự luận. Điểm thưởng sẽ được cập nhật sau khi giáo viên chấm bài.', 'success');
    }
}


if (pointChange !== 0) {
    const pointsRef = fbDB.ref('data/' + user.uid + '/points');
    try {
        await pointsRef.transaction(currentPoints => {
            const cur = currentPoints || 0;
            return cur + pointChange;
        }).then(async result => {
            if (result.committed) {
                // Cập nhật lại db.data để đồng bộ
                if (!db.data[user.uid]) db.data[user.uid] = {};
                db.data[user.uid].points = (db.data[user.uid].points || 0) + pointChange;
                
                db.gift_history.unshift({
                    timestamp: Date.now(),
                    studentName: user.n,
                    uid: user.uid,
                    points: pointChange,
                    reason: pointReason
                });
                if (db.gift_history.length > 500) db.gift_history = db.gift_history.slice(0, 500);
                await saveDB('gift_history', db.gift_history);
                
                if (pointChange > 0) {
                    toast(`🎉 +${pointChange} điểm! ${pointReason}`, 'success');
                } else {
                    toast(`⚠️ ${pointChange} điểm. ${pointReason}`, 'error');
                }
            } else {
                toast('Cập nhật điểm thất bại!', 'error');
            }
        });
    } catch (e) {
        console.error('Transaction error:', e);
    }
}
    
    // Giữ lại huy hiệu nếu làm đúng hết
    if (type === 'hw' && work && work.questions) {
        const allCorrect = work.questions.every((q, qi) => {
            if (q.type === 'mcq') return answers[qi] && answers[qi].selected === q.ans;
            return true;
        });
        if (allCorrect) addBadge(user.uid, '🏆 Hoàn thành xuất sắc: ' + work.n);
    }

    clearInterval(examTimer);
    
    // Hiển thị điểm thưởng nếu có
    const pcfg = db.config?.points_config || { hw_ontime: 5, hw_late: -3, exam_10: 20, exam_9: 10, exam_8: 5 };
    let earnedPoints = 0;
    let earnedReason = '';
    
    if (type === 'hw') {
        const now2 = new Date();
        const endTime = work.end ? new Date(work.end) : null;
        if (!endTime || now2 <= endTime) {
            earnedPoints = pcfg.hw_ontime;
            earnedReason = 'Nộp bài đúng hạn';
        } else {
            earnedPoints = pcfg.hw_late;
            earnedReason = 'Nộp bài trễ hạn';
        }
    }
    
    if (earnedPoints !== 0) {
        // Cộng/trừ điểm tự động
        try {
            await fbDB.ref('data/' + user.uid + '/points').transaction(cur => (cur || 0) + earnedPoints);
            if (!db.data[user.uid]) db.data[user.uid] = {};
            db.data[user.uid].points = (db.data[user.uid].points || 0) + earnedPoints;
            
            // Ghi lịch sử
            if (!db.gift_history) db.gift_history = [];
            db.gift_history.unshift({ timestamp: Date.now(), studentName: user.n, uid: user.uid, points: earnedPoints, reason: earnedReason + ': ' + (work.n || '') });
            await saveDB('gift_history', db.gift_history);
            
            // Hiện thông báo điểm thưởng nổi bật
            const pointColor = earnedPoints > 0 ? '#10b981' : '#ef4444';
            const pointIcon = earnedPoints > 0 ? '⭐' : '❌';
            const banner = document.createElement('div');
            banner.style.cssText = `position:fixed; top:80px; left:50%; transform:translateX(-50%); background:${pointColor}; color:white; padding:14px 28px; border-radius:40px; font-weight:700; font-size:18px; z-index:99999; box-shadow:0 8px 24px rgba(0,0,0,0.2); animation: fadeInDown 0.4s ease;`;
            banner.innerHTML = `${pointIcon} ${earnedPoints > 0 ? '+' + earnedPoints : earnedPoints} điểm – ${earnedReason}`;
            document.body.appendChild(banner);
            setTimeout(() => banner.remove(), 3000);
        } catch(e) { console.warn('Lỗi cộng điểm tự động:', e); }
    }
    
    toast('Nộp bài thành công!');
    sv(type === 'hw' ? '2c' : '2f');
}

function updateQuestionStats(work, answers) {
    if (!db.question_stats) db.question_stats = {};
    if (!work.questions) return;
    work.questions.forEach((q, qi) => {
        if (q.type === 'mcq') {
            const questionId = q.q.substring(0, 50);
            if (!db.question_stats[questionId]) db.question_stats[questionId] = { total: 0, wrong: 0, q: q.q };
            db.question_stats[questionId].total++;
            const studentAnswer = answers[qi]?.selected;
            if (studentAnswer && studentAnswer !== q.ans) db.question_stats[questionId].wrong++;
        }
    });
}

async function applyVoucher(uid) {
    const code = document.getElementById('voucherCode')?.value?.trim();
    const msgEl = document.getElementById('voucherMsg');
    if (!code) { toast('Nhập mã voucher', 'error'); return; }
    
    const vouchersSnap = await fbDB.ref('vouchers').once('value');
    const vouchers = vouchersSnap.val() || [];
    const voucherIndex = vouchers.findIndex(v => v.code === code && v.active && v.remaining > 0);
    
    if (voucherIndex === -1) { 
        if (msgEl) msgEl.innerText = '❌ Voucher không hợp lệ hoặc đã hết lượt'; 
        return; 
    }
    
    const d = db.data[uid] || {};
    if (!d.fee) d.fee = { slots: 0, rate: 0, paid: 0, logs: [], receipts: [] };
    
    vouchers[voucherIndex].remaining--;
    d.fee.paid += vouchers[voucherIndex].amount;
d.fee.logs.unshift(`🎟 ${new Date().toLocaleDateString()}: +${vouchers[voucherIndex].amount}đ (Voucher: ${code})`);
await saveDB('data/' + uid + '/fee', d.fee);

if (!db.voucher_history) db.voucher_history = [];
db.voucher_history.unshift({
    code: code,
    uid: uid,
    userName: user.n,
    amount: vouchers[voucherIndex].amount,
    date: new Date().toLocaleString()
});
await saveDB('voucher_history', db.voucher_history);

db.vouchers = vouchers;
await saveDB('vouchers', db.vouchers);
    if (msgEl) msgEl.innerText = `✅ Đã áp dụng voucher, giảm ${vouchers[voucherIndex].amount.toLocaleString()}đ`;
    toast('Voucher đã được áp dụng!');
    sv('2g');
}

function viewSubmissionDetail(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) { toast('Bài tập/thi không còn tồn tại', 'error'); return; }
    let html = `<h3>📄 Bài làm: ${sub.n}</h3>
      <p><b>Học viên:</b> ${db.users[sub.u]?.n || sub.u} | <b>Ngày nộp:</b> ${sub.date} | <b>Thời gian:</b> ${sub.dur}</p>`;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        html += `<div class="card" style="margin-bottom:12px;">
          <b>Câu ${qi+1} (${question.point||1}đ):</b> ${question.q}`;
        if (question.type === 'mcq') {
            const correctAns = question.ans || '?';
            const userAns = ans.selected || 'Chưa chọn';
            const isCorrect = userAns === correctAns;
            html += `<br><b>Đáp án đúng:</b> ${correctAns}<br>
              <b>Học viên chọn:</b> ${userAns} <span style="color:${isCorrect?'var(--success)':'var(--danger)'}">${isCorrect?'✅':'❌'}</span>`;
        } else {
            html += `<br><b>Bài làm:</b> <div style="white-space:pre-wrap; background:var(--surface-alt); padding:8px; border-radius:8px;">${ans.ans || 'Không trả lời'}</div>`;
            html += `<div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
              <label>Điểm (0-${question.point||10}): </label>
              <input type="number" id="grade-${qi}" value="${ans.grade !== undefined ? ans.grade : ''}" min="0" max="${question.point||10}" step="0.5" style="width:80px;">
              <label>Nhận xét: </label>
              <input type="text" id="comment-${qi}" value="${ans.comment || ''}" style="flex:1;">
              <button onclick="aiGrade(${submissionIndex}, ${qi})" type="button">🤖 Chấm AI</button>
              <span id="score-${qi}" style="font-weight:bold; margin-left:8px;">${ans.aiScore !== undefined ? `AI: ${ans.aiScore}/${question.point}` : ''}</span>
            </div>`;
        }
        html += `</div>`;
    });
    html += addAudioFeedbackUI(sub);
    html += `<div class="card"><b>Tổng điểm:</b> <span id="total-score">Đang tính...</span>
      <button onclick="saveManualGrades(${submissionIndex})">💾 Lưu điểm & nhận xét</button>
      <button onclick="calculateTotal(${submissionIndex})">🔄 Tính tổng</button></div>
      <button onclick="renderSubs('${sub.type}')">← Quay lại danh sách</button>`;
    document.getElementById('det-content').innerHTML = html;
    setTimeout(() => calculateTotal(submissionIndex), 100);
}

function calculateTotal(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        const point = question.point || 1;
        maxTotal += point;
        if (ans.selected !== undefined) { if (ans.selected === question.ans) total += point; }
        else { const input = document.getElementById(`grade-${qi}`); const grade = input ? parseFloat(input.value) : (ans.grade || 0); if (!isNaN(grade)) total += grade; }
    });
    const totalSpan = document.getElementById('total-score');
    if (totalSpan) totalSpan.innerText = `${total.toFixed(1)} / ${maxTotal}`;
}

async function saveManualGrades(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    sub.answers.forEach((ans, qi) => {
        if (ans.selected === undefined) {
            const gradeInput = document.getElementById(`grade-${qi}`);
            const commentInput = document.getElementById(`comment-${qi}`);
            if (gradeInput) { const val = parseFloat(gradeInput.value); if (!isNaN(val) && val >= 0 && val <= (work.questions[qi]?.point || 10)) ans.grade = val; }
            if (commentInput) ans.comment = commentInput.value.trim();
        }
    });
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const q = work.questions[qi];
        if (!q) return;
        maxTotal += q.point || 1;
        if (ans.selected !== undefined) { if (ans.selected === q.ans) total += q.point || 1; }
        else { total += ans.grade || 0; }
    });
    sub.score = `${total.toFixed(1)}/${maxTotal}`;
await saveDB('submissions/' + submissionIndex, sub);
    toast('Đã lưu điểm');
    viewSubmissionDetail(submissionIndex);
}

// ========== GHI ÂM PHẢN HỒI ==========
var mediaRecorder, audioChunks = [];
var recordingSubmissionIndex = null;

async function startAudioFeedback(submissionIndex) {
    recordingSubmissionIndex = submissionIndex;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const sub = db.submissions[submissionIndex];
            if (!sub) return;
            showLoading();
            const storageRef = fbStorage.ref('audio_feedback/' + sub.u + '_' + Date.now() + '.webm');
            const uploadTask = await storageRef.put(audioBlob);
            const downloadURL = await uploadTask.ref.getDownloadURL();
            sub.audioFeedback = downloadURL;
sub.audioFeedbackDate = new Date().toLocaleString();
await saveDB('submissions/' + recordingSubmissionIndex, sub);
            hideLoading();
            toast('Đã lưu phản hồi âm thanh');
            viewSubmissionDetail(submissionIndex);
        };
        mediaRecorder.start();
        document.getElementById('recordingStatus').innerText = '🔴 Đang ghi âm...';
        document.getElementById('startRecordBtn').disabled = true;
        document.getElementById('stopRecordBtn').disabled = false;
    } catch (e) { toast('Không thể truy cập microphone', 'error'); }
}

function stopAudioFeedback() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        document.getElementById('recordingStatus').innerText = '✅ Đã lưu';
        document.getElementById('startRecordBtn').disabled = false;
        document.getElementById('stopRecordBtn').disabled = true;
    }
}

function addAudioFeedbackUI(sub) {
    let html = '';
    if (sub.audioFeedback) {
        html += `<div style="margin-top:10px;"><b>🎙 Phản hồi âm thanh (${sub.audioFeedbackDate || 'N/A'}):</b><br>
          <audio controls src="${sub.audioFeedback}" style="width:100%; margin-top:5px;"></audio></div>`;
    }
    html += `<div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
      <button id="startRecordBtn" onclick="startAudioFeedback(${db.submissions.indexOf(sub)})">🎙 Ghi âm phản hồi</button>
      <button id="stopRecordBtn" onclick="stopAudioFeedback()" disabled>⏹ Dừng</button>
      <span id="recordingStatus" style="font-size:14px;"></span>
    </div>`;
    return html;
}

function renderSubs(type) {

async function aiGrade(submissionIndex, questionIndex) {
    const sub = db.submissions[submissionIndex];

    const answer = sub.answers[questionIndex];
    if (!answer || answer.selected !== undefined) { toast('Chỉ áp dụng cho câu tự luận', 'error'); return; }
    const questionText = answer.q || '';
    const studentResponse = answer.ans || '';
    const maxScore = answer.point || 10;
    const apiKey = getGeminiKey();
    if (!apiKey || apiKey === 'YOUR_GEMINI_API_KEY') { toast('Chưa cấu hình API key', 'error'); return; }
    showLoading();
    try {
        const prompt = `Bạn là giáo viên chấm bài tự luận nghiêm khắc nhưng công bằng.

CÂU HỎI: "${questionText}"
BÀI LÀM CỦA HỌC SINH: "${studentResponse}"
ĐIỂM TỐI ĐA: ${maxScore}

YÊU CẦU:
1. Cho điểm chính xác từ 0 đến ${maxScore} (có thể là số thập phân như 7.5)
2. Nhận xét cụ thể: chỉ ra điểm mạnh, điểm yếu, chỗ cần cải thiện
3. So sánh với đáp án mong đợi (nếu có thể)

TRẢ VỀ ĐÚNG ĐỊNH DẠNG SAU (không thêm gì khác):
ĐIỂM: <số điểm>
NHẬN XÉT: <nội dung nhận xét>`;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.3, maxOutputTokens: 100 }
            })
        });
        const data = await res.json();
        const generated = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const scoreMatch = generated.match(/ĐIỂM:\s*([\d.]+)/i);
        const commentMatch = generated.match(/NHẬN XÉT:\s*(.+)/i);
        const aiScore = scoreMatch ? parseFloat(scoreMatch[1]) : null;
        const aiComment = commentMatch ? commentMatch[1] : generated;
        if (aiScore !== null && aiScore >= 0 && aiScore <= maxScore) {
            // 1. Hiển thị điểm AI lên thẻ span
            const scoreSpan = document.getElementById(`score-${questionIndex}`);
            if (scoreSpan) scoreSpan.innerText = `AI: ${aiScore}/${maxScore}`;
            
            // 2. Tự động điền điểm AI vào ô input chấm điểm của giáo viên
            const gradeInput = document.getElementById(`grade-${questionIndex}`);
            if (gradeInput) gradeInput.value = aiScore;
            
            // 3. Tự động điền nhận xét AI vào ô input nhận xét
            const commentInput = document.getElementById(`comment-${questionIndex}`);
            if (commentInput) commentInput.value = aiComment;
            
            answer.aiScore = aiScore;
            answer.aiComment = aiComment;
            toast(`AI đề xuất: ${aiScore}/${maxScore} điểm. Đã tự động điền.`, 'success');
        } else { toast('AI không trả về điểm hợp lệ', 'error'); }
    } catch (e) { toast('Lỗi kết nối AI', 'error'); }
    hideLoading();
}

async function executeCleanup(type) {
    const month = document.getElementById('clean-month').value;
    const year = document.getElementById('clean-year').value;
    const cutoff = new Date(`${year}-${month}-01T00:00:00`);
    if (isNaN(cutoff.getTime())) { toast('Thời gian không hợp lệ', 'error'); return; }
    
    const typeNames = { all: 'tất cả', submissions: 'bài nộp', notif: 'thông báo', audit: 'lịch sử hoạt động', sked: 'lịch sử tuần' };
    
    modal(`Xác nhận xóa ${typeNames[type]} trước ${month}/${year}?`, async () => {
        showLoading();
        if (type === 'all' || type === 'submissions') {
            db.submissions = (db.submissions || []).filter(s => new Date(s.date) >= cutoff);
            await saveDB('submissions', db.submissions);
        }
        if (type === 'all' || type === 'notif') {
            db.notif_history = (db.notif_history || []).filter(n => new Date(n.date) >= cutoff);
            await saveDB('notif_history', db.notif_history);
            if (db.private_notif) {
                for (let uid in db.private_notif) {
                    db.private_notif[uid] = (db.private_notif[uid] || []).filter(n => new Date(n.date) >= cutoff);
                    await saveDB(`private_notif/${uid}`, db.private_notif[uid]);
                }
            }
        }
        if (type === 'all' || type === 'audit') {
            db.audit_log = (db.audit_log || []).filter(l => new Date(l.timestamp) >= cutoff);
            await saveDB('audit_log', db.audit_log);
        }
        if (type === 'all') {
            db.forgot_pwd = (db.forgot_pwd || []).filter(r => new Date(r.date) >= cutoff);
            await saveDB('forgot_pwd', db.forgot_pwd);
        }
        if (type === 'all' || type === 'sked') {
            db.sked_history = (db.sked_history || []).filter(h => new Date(h.date) >= cutoff);
            await saveDB('sked_history', db.sked_history);
        }
        hideLoading();
        toast('Đã dọn dẹp xong!');
        op('cleanup');
    });
}

async function redeemGift(idx) {
    if (!user || !user.uid) { toast('Vui lòng đăng nhập lại!', 'error'); return; }
    const gift = (db.gift_shop || [])[idx];
    if (!gift) { toast('Quà không tồn tại!', 'error'); return; }
    if (gift.remaining !== undefined && gift.remaining <= 0) {
        toast('Quà này đã hết số lượng!', 'error');
        return;
    }
    modal(`Đổi ${gift.icon} ${gift.name} với ${gift.cost} điểm?`, async () => {
        const pointsRef = fbDB.ref('data/' + user.uid + '/points');
        const giftRef = fbDB.ref('gift_shop');
        try {
            await fbDB.ref().transaction(currentData => {
                if (!currentData) return { points: 0, gift_shop: db.gift_shop };
                let points = currentData.data?.[user.uid]?.points || 0;
                let giftShop = currentData.gift_shop || db.gift_shop;
                if (points < gift.cost) {
                    toast('Không đủ điểm!', 'error');
                    return;
                }
                const giftIdx = giftShop.findIndex(g => g.id === gift.id);
                if (giftIdx === -1 || (giftShop[giftIdx].remaining !== undefined && giftShop[giftIdx].remaining <= 0)) {
                    toast('Quà đã hết!', 'error');
                    return;
                }
                points -= gift.cost;
                if (giftShop[giftIdx].remaining !== undefined) giftShop[giftIdx].remaining--;
                return {
                    data: { [user.uid]: { points } },
                    gift_shop: giftShop
                };
            }).then(async result => {
                if (result.committed) {
                    // Cập nhật db.data cục bộ
                    if (!db.data[user.uid]) db.data[user.uid] = {};
                    db.data[user.uid].points = (db.data[user.uid].points || 0) - gift.cost;
                    if (gift.remaining !== undefined) {
                        gift.remaining--;
                        await saveDB('gift_shop', db.gift_shop);
                    }
                    // Lịch sử
                    if (!db.gift_history) db.gift_history = [];
                    db.gift_history.unshift({
                        timestamp: Date.now(),
                        studentName: user.n,
                        uid: user.uid,
                        points: -gift.cost,
                        reason: `Đổi quà: ${gift.name}`
                    });
                    await saveDB('gift_history', db.gift_history);
                    // Thông báo
                    const msg = `Bạn đã đổi quà "${gift.name}". Xin hãy chờ đợi trong vòng 24h.`;
                    if (!db.private_notif) db.private_notif = {};
                    if (!db.private_notif[user.uid]) db.private_notif[user.uid] = [];
                    db.private_notif[user.uid].push({
                        id: 'msg-' + Date.now(),
                        msg: msg,
                        msgHtml: msg,
                        date: new Date().toLocaleString(),
                        target: user.uid
                    });
                    await saveDB('private_notif/' + user.uid, db.private_notif[user.uid]);
                    toast('Đổi quà thành công!');
                    sv('shop');
                } else {
                    toast('Giao dịch thất bại!', 'error');
                }
            });
        } catch (e) {
            console.error(e);
            toast('Lỗi hệ thống!', 'error');
        }
    });
}

        { id: '🏅', name: '🏅 Thành tích cao' },
        { id: '🥇', name: '🥇 Điểm TB cao nhất' },
        { id: '🥈', name: '🥈 Điểm TB cao nhì' },
        { id: '🥉', name: '🥉 Điểm TB cao ba' },
        { id: '🏆', name: '🏆 Thành tựu thi cử' },
        { id: '💯', name: '💯 Điểm tuyệt đối' },
        { id: '📖', name: '📖 Chăm học' },
        { id: '✏️', name: '✏️ Hoạt động sôi nổi' },
        { id: '🎉', name: '🎉 Sinh nhật' },
        { id: '✨', name: '✨ Giáo viên hiệu quả' },
        { id: '🔥', name: '🔥 Giáo viên thành tựu' }
    ];
    
    let html = `<h3>🏅 Quản lý Huy hiệu</h3>
    <div class="card">
        <b>Gán huy hiệu cho người dùng</b>
        <select id="badge_user_select" style="width:100%; padding:10px; margin:5px 0;">
            <option value="">-- Chọn người dùng --</option>`;
    
    students.forEach(h => {
        html += `<option value="${h.uid}">${escapeHtml(h.n)} [${h.r}]</option>`;
    });
    
    html += `</select>
        <select id="badge_type" style="width:100%; padding:10px; margin:5px 0;">`;
    
    badgeList.forEach(b => {
        html += `<option value="${b.id}">${b.name}</option>`;
    });
    
    html += `</select>
        <button onclick="addBadgeToUserFixed()">💾 Gán huy hiệu</button>
    </div>
    <hr>
    <h4>📋 Danh sách huy hiệu đã gán</h4>`;
    
    let hasAny = false;
    for (let uid in db.users) {
        const u = db.users[uid];
        if (!u || (u.r !== 'hv' && u.r !== 'teacher')) continue;
        // Hỗ trợ cả mảng cũ (legacy) lẫn object mới
        let badgesObj = {};
        if (u.badges && !Array.isArray(u.badges)) {
            badgesObj = u.badges; // cấu trúc mới: object
        } else if (Array.isArray(u.badges) && u.badges.length) {
            // legacy: chuyển mảng sang object để hiển thị
            u.badges.forEach(b => { badgesObj[b.codePointAt(0).toString(16)] = { icon: b, name: b }; });
        }
        const badgeEntries = Object.entries(badgesObj);
        if (badgeEntries.length) {
            hasAny = true;
            badgeEntries.forEach(([key, bdata]) => {
                const icon = bdata.icon || bdata;
                const name = bdata.name || badgeList.find(bl => bl.id === icon)?.name || icon;

            });
        }
    }
    if (!hasAny) html += '<p>Chưa có huy hiệu nào được gán.</p>';
    
    c.innerHTML = html;
}

async function postStory() {
    if (!user || !user.uid) { toast('Lỗi: Chưa đăng nhập!', 'error'); return; }
    const caption = document.getElementById('storyCaption')?.value.trim();
    const imgFile = document.getElementById('storyImage')?.files[0];
    
    if (!caption && !imgFile) {
        toast('Nhập caption hoặc chọn ảnh!', 'error');
        return;
    }
    
    let storyData = {
        uid: user.uid,
        caption: caption || '',
        timestamp: Date.now(),
        likes: [],
        comments: []
    };
    
    if (imgFile) {
        // Kiểm tra slot trước khi upload
        let canUpload = (user.r === 'admin');
        if (!canUpload && db.story_config && db.story_config[user.uid]) {
            canUpload = db.story_config[user.uid].imageSlots > 0;
        }
        if (!canUpload && user.r === 'hv' && (!db.story_config || !db.story_config[user.uid])) {
            canUpload = true; // slot mặc định
        }
        if (!canUpload) {
            toast('Bạn không còn slot đăng ảnh!', 'error');
            return;
        }
        
        showLoading();
        try {
            if (imgFile.size > 2 * 1024 * 1024) {
                toast('Ảnh quá lớn! Tối đa 2MB', 'error');
                hideLoading();
                return;
            }
            const fileName = 'stories/' + Date.now() + '_' + imgFile.name.replace(/[^a-zA-Z0-9.]/g, '_');
            const storageRef = fbStorage.ref(fileName);
            const uploadTask = await storageRef.put(imgFile);
            const url = await uploadTask.ref.getDownloadURL();
            storyData.imageUrl = url;
            
            // Giảm slot nếu không phải admin
            if (user.r !== 'admin' && db.story_config && db.story_config[user.uid]) {
                const currentSlots = db.story_config[user.uid].imageSlots || 0;
                db.story_config[user.uid].imageSlots = Math.max(0, currentSlots - 1);
                await fbDB.ref('story_config/' + user.uid).set(db.story_config[user.uid]);
            }
            hideLoading();
        } catch (e) {
            console.error('Upload error:', e);
            toast('Lỗi tải ảnh: ' + e.message, 'error');
            hideLoading();
            return;
        }
    }
    
    if (!db.stories) db.stories = [];
    db.stories.unshift(storyData);
    await saveDB('stories', db.stories);
    toast('Đã đăng story!');
    sv('story');
}

            const fileName = 'stories/' + Date.now() + '_' + imgFile.name.replace(/[^a-zA-Z0-9.]/g, '_');

            const uploadTask = await storageRef.put(imgFile);
            const url = await uploadTask.ref.getDownloadURL();
            storyData.imageUrl = url;
            hideLoading();
        } catch (e) {
            console.error('Upload error:', e);
            toast('Lỗi tải ảnh: ' + e.message, 'error');
            hideLoading();
            return;
        }
    }
    
    if (!db.stories) db.stories = [];
    db.stories.unshift(storyData);
    await saveDB('stories', db.stories);
    toast('Đã đăng story!');
    renderStoryAdminView();
}

async function addGiftItem() {
    const name = document.getElementById('gift_name')?.value.trim();
    const icon = document.getElementById('gift_icon')?.value.trim();
    const cost = parseInt(document.getElementById('gift_cost')?.value) || 0;

    });

async function deleteGiftItem(index) {

// ========== HÀM CỘNG TRỪ ĐIỂM MỚI ==========
// ========== SỬA LỖI CỘNG TRỪ ĐIỂM ==========
async function addGiftPointsFixed() {
    // Đảm bảo dữ liệu users luôn được tải
    if (Object.keys(db.users || {}).length === 0) {
        const snap = await fbDB.ref('users').once('value');
        db.users = snap.val() || {};
    }

    const selectEl = document.getElementById('gift_student_select');
    if (!selectEl) { toast('Không tìm thấy select!', 'error'); return; }
    const uid = selectEl.value;
    const pointsInput = document.getElementById('gift_points_input');
    let points = parseInt(pointsInput?.value);
    if (isNaN(points)) points = 0;
    const reason = document.getElementById('gift_reason_input')?.value.trim();
    
    if (!uid) { toast('Vui lòng chọn học viên!', 'error'); return; }
    const student = db.users[uid];
    if (!student) { toast(`Không tìm thấy học viên! ID: ${uid}`, 'error'); return; }
    if (points === 0) { toast('Số điểm không thể bằng 0!', 'error'); return; }
    if (!reason) { toast('Vui lòng nhập lý do!', 'error'); return; }

    const pointsRef = fbDB.ref('data/' + uid + '/points');
    try {
        await pointsRef.transaction(currentPoints => {
            return (currentPoints || 0) + points;
        }).then(async result => {
            if (result.committed) {
                if (!db.data[uid]) db.data[uid] = {};
                // Lấy điểm thực từ Firebase transaction result (chính xác tuyệt đối)
                db.data[uid].points = result.snapshot.val();
                
                if (!db.gift_history) db.gift_history = [];
                db.gift_history.unshift({ timestamp: Date.now(), studentName: student.n, uid: uid, points: points, reason: reason });
                if (db.gift_history.length > 500) db.gift_history = db.gift_history.slice(0, 500);
                await saveDB('gift_history', db.gift_history);
                
                const ptsNotifKey = 'pts-' + Date.now();
                const ptsNotifData = {
                    id: ptsNotifKey,
                    msg: `Bạn đã được ${points > 0 ? 'cộng +' + points : 'trừ ' + points} điểm. Lý do: ${reason}`,
                    msgHtml: `⭐ Bạn đã được <b>${points > 0 ? '+' + points : points} điểm</b>. Lý do: ${reason}`,
                    date: new Date().toLocaleString(),
                    target: uid
                };
                await fbDB.ref('private_notif/' + uid + '/' + ptsNotifKey).set(ptsNotifData);
                if (!db.private_notif) db.private_notif = {};
                if (!db.private_notif[uid]) db.private_notif[uid] = [];
                if (!Array.isArray(db.private_notif[uid])) db.private_notif[uid] = Object.values(db.private_notif[uid]);
                db.private_notif[uid].push(ptsNotifData);
                
                toast(`Đã ${points > 0 ? 'cộng' : 'trừ'} ${Math.abs(points)} điểm cho ${student.n}!`);
                op('gifts');
            } else { toast('Giao dịch thất bại!', 'error'); }
        });
    } catch (e) { toast('Lỗi: ' + e.message, 'error'); }
}

// ========== SỬA LỖI GÁN HUY HIỆU ==========
window.addBadgeToUserFixed = async function() {
    const uid = document.getElementById('badge_user_select').value;
    const type = document.getElementById('badge_type').value;

    if (!uid) { toast('Vui lòng chọn người dùng!', 'error'); return; }
    if (!type) { toast('Chọn loại huy hiệu!', 'error'); return; }

    const badgeNames = {
        '👑': 'Học viên xuất sắc', '🏅': 'Thành tích cao', '🥇': 'Điểm TB cao nhất',
        '🥈': 'Điểm TB cao nhì', '🥉': 'Điểm TB cao ba', '🏆': 'Thành tựu thi cử',
        '💯': 'Điểm tuyệt đối', '📖': 'Chăm học', '✏️': 'Hoạt động sôi nổi',
        '🎉': 'Sinh nhật', '✨': 'Giáo viên hiệu quả', '🔥': 'Giáo viên thành tựu'
    };

    // FIX: Dùng object thay mảng → tránh race condition khi 2 admin cấp cùng lúc
    const badgeKey = type.codePointAt(0).toString(16); // key an toàn từ emoji
    const badgeRef = fbDB.ref('users/' + uid + '/badges/' + badgeKey);
    const snap = await badgeRef.once('value');
    if (snap.exists()) { toast('Học viên đã có huy hiệu này!', 'info'); return; }

    await badgeRef.set({ icon: type, name: badgeNames[type] || type, grantedAt: Date.now(), grantedBy: user.n });

    // Cập nhật local cache
    if (!db.users[uid]) db.users[uid] = {};
    if (!db.users[uid].badges) db.users[uid].badges = {};
    db.users[uid].badges[badgeKey] = { icon: type, name: badgeNames[type] || type };

    // Thông báo qua push (atomic, không race condition)
    const notifId = 'badge-' + Date.now();
    await fbDB.ref('private_notif/' + uid + '/' + notifId).set({
        id: notifId,
        msg: `🎉 Bạn vừa nhận được huy hiệu: ${type} ${badgeNames[type] || ''}`,
        msgHtml: `🎉 Bạn vừa nhận được huy hiệu: <b>${type} ${badgeNames[type] || ''}</b>`,
        date: new Date().toLocaleString(),
        target: uid,
        read: false
    });

    const targetUserName = db.users[uid]?.n || uid;
    toast(`✅ Đã gán huy hiệu cho ${targetUserName}!`);
    op('badges');
};

// Hàm tải động danh sách huy hiệu hiện tại của học viên được chọn
async function loadUserCurrentBadges(uid) {
    if (!uid) {
        document.getElementById('user_badges_list').innerHTML = '💡 Vui lòng lựa chọn một học viên cụ thể ở mục trên...';
        return;
    }
    const snap = await fbDB.ref(`users/${uid}/badges`).once('value');
    const badges = snap.val() || {};
    
    let html = '';
    const keys = Object.keys(badges);
    if (keys.length === 0) {
        html = '<p style="font-size:13.5px; color:var(--text-secondary); italic">Hiện tại học viên này chưa được cấp huy hiệu nào.</p>';
    } else {
        keys.forEach(b => {
            const decodedBadgeName = escapeHtml(decodeURIComponent(b));
            html += `
                <div style="background:var(--bg-secondary); padding:8px 14px; border-radius:20px; display:flex; align-items:center; gap:10px; border:1px solid var(--border); font-size:13.5px; font-weight:500;">
                    <span>${decodedBadgeName}</span>
                    <button onclick="revokeBadge('${uid}', '${b}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; font-size:15px; padding:0 2px;" title="Thu hồi danh hiệu này">✕</button>
                </div>
            `;
        });
    }
    document.getElementById('user_badges_list').innerHTML = html;
}

// Hàm gửi lệnh cấp huy hiệu lên Firebase
async function submitGiveBadge() {
    const uid = document.getElementById('badge_uid').value;
    const name = document.getElementById('badge_name').value.trim();
    if (!uid || !name) { toast('⚠️ Vui lòng hoàn thành chọn học viên và nhập tên huy hiệu!', 'error'); return; }
    
    showLoading();
    try {
        await fbDB.ref(`users/${uid}/badges/${encodeURIComponent(name)}`).set(true);
        const notifId = 'badge-' + Date.now();
        await fbDB.ref(`private_notif/${uid}/${notifId}`).set({
            id: notifId,
            msg: `🎉 Bạn vừa nhận được huy hiệu vinh danh: ${name}`,
            date: new Date().toLocaleString()
        });
        toast('🎖️ Đã cấp phát và gửi thông báo tới học viên thành công!');
        loadUserCurrentBadges(uid);
    } catch(e) {
        toast('Gặp lỗi khi lưu danh hiệu!', 'error');
    } finally {
        hideLoading();
    }
}

// Hàm xóa/thu hồi huy hiệu đã cấp
async function revokeBadge(uid, badgeKey) {
    const friendlyName = decodeURIComponent(badgeKey);
    if (!confirm(`Xác nhận thu hồi huy hiệu [ ${friendlyName} ] khỏi tài khoản học viên này?`)) return;
    
    showLoading();
    try {
        await fbDB.ref(`users/${uid}/badges/${badgeKey}`).remove();
        toast('🗑️ Đã thu hồi huy hiệu thành công!');
        loadUserCurrentBadges(uid);
    } catch(e) {
        toast('Lỗi hệ thống khi thu hồi huy hiệu!', 'error');
    } finally {
        hideLoading();
    }
}
