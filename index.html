const MSG=(txt,type)=>{const el=$('login-msg');if(!el)return;el.className='msg '+(type==='err'?'msg-err':type==='ok'?'msg-ok':'msg-info');el.innerText=txt;};
const isMainAdmin=()=>U&&U.r==='admin'&&(!U.role||U.role==='main');
const isSubAdmin=()=>U&&U.r==='admin'&&U.role!=='main';
const checkPerm=feature=>{if(isSubAdmin()){const adm=(DB.admins||[]).find(a=>a.u===U.name);if(!(adm?.permissions||['schedule','notif','homework','exam','support','dashboard','backup']).includes(feature)){alert(t('permissionDenied'));return false;}}return true;};

// ===== MODALS =====
const showMod=(type,data)=>{
    const m=$('mod'),o=$('ovl');o.classList.add('active');m.classList.add('active');
    if(type==='forgot')m.innerHTML=`<h4>🔑 ${t('forgot')}</h4><input id="fp-n" placeholder="${t('fullName')}"><input id="fp-c" placeholder="${t('class_')}"><input id="fp-e" placeholder="Email"><button class="btn btn-blue" onclick="subFP()">GỬI</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;
    else if(type==='register'){const courses=DB.config?.courses||[];m.innerHTML=`<h4>📝 ${t('regForm')}</h4><input id="reg-name" placeholder="${t('regName')}"><input id="reg-phone" placeholder="${t('regPhone')}" type="tel"><input id="reg-email" placeholder="${t('regEmail')}" type="email"><select id="reg-course" onchange="$('reg-other').style.display=this.value==='__other__'?'block':'none'">${courses.map(c=>`<option>${c}</option>`).join('')}<option value="__other__">${t('regOther')}</option></select><input id="reg-other" placeholder="${t('regOther')}" style="display:none"><button class="btn btn-green" onclick="subReg()">${t('regSubmit')}</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;}
    else if(type==='support')m.innerHTML=`<h4>💬 ${t('support')}</h4><input id="sp-n" placeholder="${t('fullName')}"><input id="sp-c" placeholder="${t('class_')}"><textarea id="sp-m" placeholder="Nội dung..."></textarea><button class="btn btn-blue" onclick="subSP()">GỬI</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;
    else if(type==='pay'){const banks=[{id:'1',info:DB.config?.bankInfo,img:DB.config?.bankImg1},{id:'2',info:DB.config?.bankInfo2,img:DB.config?.bankImg2}].filter(b=>b.info);m.innerHTML=`<h4>${t('payTitle')}</h4>${banks.map(b=>`<div class="card"><h5>${t('bank'+b.id)}</h5><div style="white-space:pre-wrap;font-size:11px">${b.info}</div>${b.img?`<img src="${b.img}" style="max-width:100%;border-radius:8px">`:''}</div>`).join('')}<input id="pay-img" type="file" accept="image/*"><button class="btn btn-green" onclick="subPay()">GỬI XÁC NHẬN</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button><p style="font-size:9px;color:var(--sub);margin-top:4px">${t('payWait')}</p>`;}
    else if(type==='editSlot'){const s=DB.sked.slots[data.index];m.innerHTML=`<h4>✏️ Sửa slot</h4><input id="eds-n" value="${s.n}" placeholder="Tên môn"><select id="eds-d">${['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'].map(d=>`<option ${s.d===d?'selected':''}>${d}</option>`).join('')}</select><input id="eds-t" value="${s.ti}" placeholder="Giờ"><input id="eds-c" type="number" value="${s.c}" placeholder="Slot"><button class="btn btn-green" onclick="saveEditSlot(${data.index})">💾</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;}
    else if(type==='editPN'){const pn=DB.personal_notif[data.u][data.index];m.innerHTML=`<h4>✏️ Sửa TB</h4><textarea id="epn-msg">${pn.msg}</textarea><button class="btn btn-green" onclick="saveEditPN('${data.u}',${data.index})">💾</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;}
    else if(type==='assignHW'){const hw=DB.hw_list[data.index];m.innerHTML=`<h4>📝 ${t('assignHW')}: ${hw.n}</h4><select id="assign-sel" multiple style="min-height:150px">${(DB.hv||[]).map(h=>`<option value="${h.u}" ${(hw.assignedTo||[]).includes(h.u)?'selected':''}>${h.n} (${h.u})</option>`).join('')}</select><button class="btn btn-green" onclick="saveAssign(${data.index})">💾</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;}
    else if(type==='chat'){const hv=DB.hv.find(h=>h.u===data.u);if(!hv)return;const chat=DB.chats?.[data.u]||[];m.innerHTML=`<h4>💬 Chat với ${hv.n}</h4><div class="chat-box" id="chat-box">${chat.map(c=>`<div class="chat-msg ${c.from==='admin'?'chat-admin':'chat-hv'}"><small>${c.date}</small><br>${c.msg}</div>`).join('')}</div><div class="form-row"><input id="chat-msg" placeholder="Nhập tin nhắn..."><button class="btn btn-sm btn-blue" onclick="sendChat('${data.u}')">GỬI</button></div><button class="btn btn-sm btn-outline" onclick="clsMod()">ĐÓNG</button>`;setTimeout(()=>{const cb=$('chat-box');if(cb)cb.scrollTop=cb.scrollHeight;},100);}
};

const subReg=()=>{const n=$('reg-name').value.trim(),p=$('reg-phone').value.trim(),e=$('reg-email').value.trim(),c=$('reg-course').value,o=$('reg-other').value.trim();if(!n||!p||!e||(!c&&!o)){alert('Nhập đủ!');return;}if(!DB.registrations)DB.registrations=[];DB.registrations.push({name:n,phone:p,email:e,course:c==='__other__'?o:c,date:new Date().toLocaleString(),status:'pending'});save('/registrations',DB.registrations);clsMod();alert(t('regSuccess'));};
const subFP=()=>{const n=$('fp-n').value.trim(),c=$('fp-c').value.trim(),e=$('fp-e').value.trim();if(!n||!c||!e){alert('Nhập đủ!');return;}if(!DB.pw_requests)DB.pw_requests=[];DB.pw_requests.push({name:n,class:c,email:e,date:new Date().toLocaleString()});save('/pw_requests',DB.pw_requests);clsMod();alert('✅');};
const subSP=()=>{const n=$('sp-n').value.trim(),c=$('sp-c').value.trim(),m=$('sp-m').value.trim();if(!n||!m){alert('Nhập đủ!');return;}if(!DB.tickets)DB.tickets=[];DB.tickets.push({name:n,class:c,msg:m,date:new Date().toLocaleString(),status:'open'});save('/tickets',DB.tickets);clsMod();alert('✅');};
const subPay=()=>{if(!DB.payments)DB.payments=[];const file=$('pay-img').files[0];const pushPay=img=>{DB.payments.push({u:U.u,date:new Date().toLocaleString(),img:img||'',status:'pending',note:''});save('/payments',DB.payments);clsMod();alert('✅');};if(file){const r=new FileReader();r.onload=e=>pushPay(e.target.result);r.readAsDataURL(file);}else pushPay('');};
const sendChat=u=>{const msg=$('chat-msg').value.trim();if(!msg)return;if(!DB.chats)DB.chats={};if(!DB.chats[u])DB.chats[u]=[];DB.chats[u].push({from:'admin',msg,date:new Date().toLocaleString()});save('/chats/'+u,DB.chats[u]);showMod('chat',{u});};

// ===== INIT DB =====
const initDB=()=>{if(prompt('🔐 Mã xác nhận:')!=='RESET123'){alert('❌ Sai!');return;}if(!confirm('⚠️ XÓA TẤT CẢ DỮ LIỆU?'))return;DB={admins:[{u:"ADMIN1",p:H("portalnow1"),pin:"1111",role:"main",permissions:['schedule','notif','homework','exam','students','progress','fee','results','support','settings','dashboard','backup']},{u:"ADMIN2",p:H("portalnow2"),pin:"2468",role:"sub",permissions:['schedule','notif','homework','exam','support']}],hv:[],sked:{t:"Tuần 1",slots:[],isOpen:true,openTime:'',closeTime:'',history:[]},exams:[],hw_list:[],submissions:[],data:{},notif_history:[],personal_notif:{},tickets:[],pw_requests:[],registrations:[],payments:[],chats:{},config:{adminPin:"2468",resetCode:"RESET123",bankInfo:"",bankInfo2:"",bankImg1:"",bankImg2:"",courses:[],lang:'vi',theme:'dark'},shortcuts:[]};dbRef.ref('/').set(DB).then(()=>{currentLang='vi';applyLang();MSG('✅ Sẵn sàng!','ok');});};
const loadDB=()=>{dbRef.ref('/').once('value').then(s=>{if(s.val()){DB=s.val();['pw_requests','tickets','registrations','payments','shortcuts'].forEach(k=>{if(!DB[k])DB[k]=[];});if(!DB.personal_notif)DB.personal_notif={};if(!DB.chats)DB.chats={};if(!DB.config)DB.config={adminPin:"2468",resetCode:"RESET123",bankInfo:"",bankInfo2:"",bankImg1:"",bankImg2:"",courses:[],lang:'vi',theme:'dark'};if(!DB.config.courses)DB.config.courses=[];if(!DB.sked)DB.sked={t:"Tuần 1",slots:[],isOpen:true,openTime:'',closeTime:'',history:[]};if(!DB.sked.history)DB.sked.history=[];if(!DB.admins)DB.admins=[{u:"ADMIN1",p:H("portalnow1"),pin:"1111",role:"main"},{u:"ADMIN2",p:H("portalnow2"),pin:"2468",role:"sub"}];DB.admins.forEach(a=>{if(!a.role)a.role=a.u==='ADMIN1'?'main':'sub';if(!a.permissions)a.permissions=a.role==='main'?['schedule','notif','homework','exam','students','progress','fee','results','support','settings','dashboard','backup']:['schedule','notif','homework','exam','support'];});(DB.hw_list||[]).forEach(h=>{if(!h.assignedTo)h.assignedTo=[];});currentLang=DB.config.lang||'vi';currentTheme=DB.config.theme||'dark';document.body.classList.toggle('light-mode',currentTheme==='light');const tbh=$('theme-btn-header');if(tbh)tbh.textContent=currentTheme==='dark'?'🌓':'☀️';applyLang();buildAdminMenu();MSG('✅ Sẵn sàng!','ok');}else initDB();}).catch(()=>MSG('❌ Lỗi kết nối!','err'));};

// ===== LOGIN =====
let pendingAdmin=null;
const doLogin=()=>{const un=$('un').value.trim(),pw=$('pw').value.trim();if(!un||!pw){MSG('Nhập đủ!','err');return;}const adm=(DB.admins||[]).find(a=>a.u===un);if(adm&&(adm.p===H(pw)||adm.p===pw)){pendingAdmin=adm;$('pin-wrap').style.display='block';$('pin').focus();MSG('','info');return;}const st=(DB.hv||[]).find(h=>h.u===un);if(st&&(st.p===H(pw)||st.p===pw)){U={r:'hv',...st};if(!U.avatar)U.avatar='👤';U.loginCount=(U.loginCount||0)+1;$('hv-title').innerText=U.n;SHOW('pg-hv');navSt('home');return;}MSG('❌ Sai!','err');};
const verifyPin=()=>{const pin=$('pin').value,cp=pendingAdmin?.pin||DB.config?.adminPin||'2468';if(pin===cp){U={r:'admin',name:pendingAdmin.u,role:pendingAdmin.role||'sub'};pendingAdmin=null;$('pin-wrap').style.display='none';$('pin').value='';SHOW('pg-admin');buildAdminMenu();navAd('dashboard');}else{MSG('❌ Sai PIN!','err');$('pin').value='';}};
$('pin').addEventListener('keyup',function(){if(this.value.length>=4)verifyPin();});
$('pin').addEventListener('keydown',function(e){if(e.key==='Enter'&&this.value.length>=4)verifyPin();});

// ===== ADMIN MENU =====
const buildAdminMenu=()=>{
    const allItems=[{id:'dashboard',icon:'📈',label:'Thống kê'},{id:'schedule',icon:'📅',label:'Lịch học'},{id:'notif',icon:'📢',label:'Thông báo'},{id:'homework',icon:'📝',label:'Bài tập'},{id:'exam',icon:'📄',label:'Thi cử'},{id:'students',icon:'👥',label:'Học viên'},{id:'progress',icon:'📋',label:'Chương trình'},{id:'fee',icon:'💰',label:'Học phí'},{id:'results',icon:'📊',label:'Kết quả'},{id:'support',icon:'🆘',label:'Hỗ trợ'},{id:'settings',icon:'🔧',label:'Cài đặt'},{id:'backup',icon:'💾',label:'Backup'}];
    const adm=(DB.admins||[]).find(a=>a.u===U?.name);
    const perms=adm?.permissions||['schedule','notif','homework','exam','support'];
    $('ad-menu').innerHTML=allItems.filter(m=>perms.includes(m.id)).map(m=>`<div class="menu-card fade-in" onclick="navAd('${m.id}')"><span class="icon">${m.icon}</span>${m.label}${m.id==='support'?' <span id="sup-badge" style="display:none;color:red">●</span>':''}</div>`).join('');
};

const navAd=pg=>{if(!checkPerm(pg))return;const pages={dashboard:adDashboard,schedule:adSchedule,notif:adNotif,homework:adHW,exam:adExam,students:adStudents,progress:adProgress,fee:adFee,results:adResults,support:adSupport,settings:adSettings,backup:adBackup};if(pages[pg])pages[pg]($('ad-content'));const badge=$('sup-badge');if(badge)badge.style.display=(DB.payments||[]).some(p=>p.status==='pending')||(DB.tickets||[]).some(t=>t.status==='open')||(DB.pw_requests||[]).length||(DB.registrations||[]).some(r=>r.status==='pending')?'inline':'none';};

// ===== AD: DASHBOARD =====
const adDashboard=c=>{
    const totalStudents=(DB.hv||[]).length;
    let totalFee=0,paidFee=0;
    (DB.hv||[]).forEach(h=>{const f=DB.data?.[h.u]?.fee||{slots:0,rate:0,paid:0,extra:0};totalFee+=f.slots*f.rate+f.extra;paidFee+=f.paid;});
    const totalHW=(DB.submissions||[]).filter(s=>s.type==='hw').length;
    c.innerHTML=`<h4>📈 ${t('dashboard')}</h4>
    <div class="dashboard-grid">
        <div class="card dashboard-card"><div class="big-number">${totalStudents}</div><div class="label">${t('totalStudents')}</div></div>
        <div class="card dashboard-card"><div class="big-number">${totalFee.toLocaleString()}đ</div><div class="label">${t('totalFee')}</div></div>
        <div class="card dashboard-card"><div class="big-number" style="color:var(--green)">${paidFee.toLocaleString()}đ</div><div class="label">${t('paidFee')}</div></div>
        <div class="card dashboard-card"><div class="big-number" style="color:var(--red)">${(totalFee-paidFee).toLocaleString()}đ</div><div class="label">${t('debtFee')}</div></div>
        <div class="card dashboard-card"><div class="big-number" style="color:var(--blue)">${(DB.hw_list||[]).length}</div><div class="label">${t('totalHW')}</div></div>
        <div class="card dashboard-card"><div class="big-number" style="color:var(--gold)">${totalHW}</div><div class="label">${t('submittedHW')}</div></div>
    </div>`;
};

// ===== AD: SCHEDULE =====
const adSchedule=c=>{const sk=DB.sked||{};c.innerHTML=`<div class="card fade-in"><h4>📅 ${sk.t}</h4><div class="form-row"><input id="skt" value="${sk.t}" placeholder="Tên tuần"><button class="btn btn-sm btn-gold" onclick="svWeek()">💾</button></div><div class="form-row"><input id="skot" type="datetime-local" value="${sk.openTime||''}" placeholder="Mở ĐK"><input id="skct" type="datetime-local" value="${sk.closeTime||''}" placeholder="Đóng ĐK"></div><span class="tag ${sk.isOpen?'tag-on':'tag-off'}">${sk.isOpen?'MỞ':'KHÓA'}</span> <button class="btn btn-sm btn-outline" onclick="tgSked()">${sk.isOpen?'Khóa':'Mở'}</button><hr style="border-color:var(--border);margin:8px 0"><div class="form-row"><input id="sln" placeholder="Môn"><select id="sld">${['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'].map(d=>`<option>${d}</option>`).join('')}</select><input id="slt" placeholder="Giờ"><input id="slc" type="number" value="10" placeholder="Slot"></div><button class="btn btn-sm btn-green" onclick="addSl()">+ THÊM</button> <button class="btn btn-sm btn-red" onclick="resetSl()">🔄 RESET</button> <button class="btn btn-sm btn-outline" onclick="saveHist()">📥 Lưu LS</button></div>${(sk.slots||[]).map((s,i)=>`<div class="card fade-in flex-between"><div><b>${s.n}</b> | ${s.d}-${s.ti} | ${(s.r||[]).length}/${s.c}</div><div><button class="btn btn-xs btn-gold" onclick="showMod('editSlot',{index:${i}})">✏️</button><button class="btn btn-xs btn-red" onclick="delSl(${i})">🗑️</button></div></div><div style="font-size:9px;color:var(--sub)">HV: ${(s.r||[]).join(', ')||'Chưa có'}</div><button class="btn btn-xs btn-outline" onclick="editStReg(${i})">✏️ Sửa ĐK</button>`).join('')}${sk.history?.length?`<h4>📜 Lịch sử</h4>${sk.history.map((h,i)=>`<div class="card fade-in flex-between"><div><b>${h.t}</b> <small>${h.date}</small></div><button class="btn btn-xs btn-red" onclick="delHist(${i})">🗑️</button></div>`).join('')}`:''}`;};
const svWeek=()=>{DB.sked.t=$('skt').value;DB.sked.openTime=$('skot').value;DB.sked.closeTime=$('skct').value;save('/sked',DB.sked);navAd('schedule');};
const tgSked=()=>{DB.sked.isOpen=!DB.sked.isOpen;save('/sked',DB.sked);navAd('schedule');};
const addSl=()=>{if(!DB.sked.slots)DB.sked.slots=[];DB.sked.slots.push({n:$('sln').value||'Môn',d:$('sld').value,ti:$('slt').value||'?',c:+$('slc').value||10,r:[]});save('/sked/slots',DB.sked.slots);navAd('schedule');};
const delSl=i=>{if(confirm('Xóa?')){DB.sked.slots.splice(i,1);save('/sked/slots',DB.sked.slots);navAd('schedule');}};
const resetSl=()=>{if(!confirm('Reset?'))return;if(!DB.sked.history)DB.sked.history=[];DB.sked.history.unshift({t:DB.sked.t,slots:JSON.parse(JSON.stringify(DB.sked.slots)),date:new Date().toLocaleString()});DB.sked.t='Tuần '+((+DB.sked.t.replace(/\D/g,'')||1)+1);DB.sked.slots=[];save('/sked',DB.sked);navAd('schedule');};
const saveHist=()=>{if(!DB.sked.history)DB.sked.history=[];DB.sked.history.unshift({t:DB.sked.t,slots:JSON.parse(JSON.stringify(DB.sked.slots)),date:new Date().toLocaleString()});save('/sked/history',DB.sked.history);navAd('schedule');};
const delHist=i=>{if(confirm('Xóa?')){DB.sked.history.splice(i,1);save('/sked/history',DB.sked.history);navAd('schedule');}};
const saveEditSlot=i=>{const s=DB.sked.slots[i];s.n=$('eds-n').value;s.d=$('eds-d').value;s.ti=$('eds-t').value;s.c=+$('eds-c').value||10;save('/sked/slots',DB.sked.slots);clsMod();navAd('schedule');};
const editStReg=i=>{const s=DB.sked.slots[i];$('ad-content').innerHTML=`<div class="card fade-in"><h4>✏️ Sửa ĐK: ${s.n}</h4><select id="reg-sel" multiple style="min-height:150px">${(DB.hv||[]).map(h=>`<option ${(s.r||[]).includes(h.u)?'selected':''} value="${h.u}">${h.n} (${h.u})</option>`).join('')}</select><button class="btn btn-sm btn-green" onclick="svStReg(${i})">💾</button><button class="btn btn-sm btn-outline" onclick="navAd('schedule')">←</button></div>`;};
const svStReg=i=>{const r=[];for(let o of $('reg-sel').options)if(o.selected)r.push(o.value);DB.sked.slots[i].r=r;save('/sked/slots',DB.sked.slots);navAd('schedule');};

// ===== AD: NOTIF =====
const adNotif=c=>{c.innerHTML=`<div class="card fade-in"><h4>📢 Thông báo chung</h4><div class="rich-toolbar"><button onclick="wrapTag('b')"><b>B</b></button><button onclick="wrapTag('i')"><i>I</i></button><button onclick="wrapTag('span style=color:red')">🔴</button><button onclick="wrapTag('span style=color:blue')">🔵</button><button onclick="wrapTag('span style=color:green')">🟢</button></div><textarea id="nfg" onkeyup="applyShortcuts('nfg')"></textarea><button class="btn btn-sm btn-blue" onclick="sendGN()">GỬI</button></div><div class="card fade-in"><h4>📨 Riêng</h4><select id="nft"><option value="">Chọn HV</option>${(DB.hv||[]).map(h=>`<option value="${h.u}">${h.n}</option>`).join('')}</select><textarea id="nfp"></textarea><button class="btn btn-sm btn-gold" onclick="sendPN()">GỬI</button></div><div class="card fade-in"><h4>⚡ Phím tắt</h4><div class="form-row"><input id="sc-key" placeholder="Kí tự"><textarea id="sc-val" placeholder="Nội dung"></textarea></div><button class="btn btn-sm btn-green" onclick="addSC()">+</button>${(DB.shortcuts||[]).map((s,i)=>`<div class="card flex-between"><div><b>${s.key}</b> → ${s.val}</div><button class="btn btn-xs btn-red" onclick="delSC(${i})">X</button></div>`).join('')}</div><h4>Lịch sử</h4>${(DB.notif_history||[]).map((n,i)=>`<div class="card fade-in flex-between"><div><small>${n.date}</small><br>${n.msg}</div><button class="btn btn-xs btn-red" onclick="delNf(${i})">🗑️</button></div>`).join('')}`;};
const wrapTag=tag=>{const ta=$('nfg'),s=ta.selectionStart,e=ta.selectionEnd,ot=tag.includes('=')?tag.split(' ')[0]+' '+tag.split(' ')[1]:tag;ta.value=ta.value.substring(0,s)+`<${tag}>${ta.value.substring(s,e)||'text'}</${ot.split(' ')[0].replace('<','')}>`+ta.value.substring(e);};
const applyShortcuts=id=>{const ta=$(id);let v=ta.value;(DB.shortcuts||[]).forEach(s=>{v=v.replace(new RegExp(s.key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),s.val);});if(v!==ta.value)ta.value=v;};
const addSC=()=>{const k=$('sc-key').value.trim(),v=$('sc-val').value.trim();if(!k||!v)return;if(!DB.shortcuts)DB.shortcuts=[];DB.shortcuts.push({key:k,val:v});save('/shortcuts',DB.shortcuts);navAd('notif');};
const delSC=i=>{DB.shortcuts.splice(i,1);save('/shortcuts',DB.shortcuts);navAd('notif');};
const sendGN=()=>{applyShortcuts('nfg');const m=$('nfg').value.trim();if(!m)return;if(!DB.notif_history)DB.notif_history=[];DB.notif_history.unshift({msg:m,date:new Date().toLocaleString()});(DB.hv||[]).forEach(h=>{if(!DB.data[h.u])DB.data[h.u]={};DB.data[h.u]['2b_new']=true;});save('/notif_history',DB.notif_history);navAd('notif');};
const sendPN=()=>{const t=$('nft').value,m=$('nfp').value.trim();if(!t||!m)return;if(!DB.personal_notif)DB.personal_notif={};if(!DB.personal_notif[t])DB.personal_notif[t]=[];DB.personal_notif[t].unshift({msg:m,date:new Date().toLocaleString(),read:false});save('/personal_notif',DB.personal_notif);navAd('notif');};

const adStudents=c=>{c.innerHTML=`<div class="card fade-in"><h4>👥 Thêm HV</h4><input id="stn" placeholder="Họ tên"><input id="stl" placeholder="Lớp"><input id="stu" placeholder="Username"><input id="ste" placeholder="Email"><input id="stp" type="password" placeholder="Mật khẩu"><button class="btn btn-sm btn-green" onclick="addSt()">THÊM</button></div><div class="card fade-in"><h4>🔍 ${t('search')}</h4><div class="search-box"><span class="search-icon">🔍</span><input id="search-hv" placeholder="${t('searchPlaceholder')}" onkeyup="filterStudents()"></div><div class="form-row" style="margin-top:4px"><button class="btn btn-xs btn-outline" onclick="filterStudents('all')">${t('filterAll')}</button><button class="btn btn-xs btn-green" onclick="filterStudents('paid')">${t('filterPaid')}</button><button class="btn btn-xs btn-red" onclick="filterStudents('debt')">${t('filterDebt')}</button></div></div><h4>DS (<span id="hv-count">${(DB.hv||[]).length}</span>)</h4><div id="hv-list"></div>`;renderStudentList(DB.hv||[]);};
const renderStudentList=list=>{$('hv-list').innerHTML=list.map((h,i)=>{const f=DB.data?.[h.u]?.fee||{slots:0,rate:0,paid:0,extra:0};const total=f.slots*f.rate+f.extra,debt=total-f.paid,pct=total>0?Math.round((f.paid/total)*100):0;const color=pct>=100?'progress-green':pct>0?'progress-yellow':'progress-red';return`<div class="card fade-in flex-between"><div style="flex:1"><b>${h.n}</b> | ${h.l} | ${h.u}<br><small>${h.email||''}</small><div class="progress-bar"><div class="progress-fill ${color}" style="width:${pct}%"></div></div><small>${f.paid.toLocaleString()}/${total.toLocaleString()}đ (${pct}%)</small></div><div><button class="btn btn-xs btn-gold" onclick="edSt(${i})">✏️</button><button class="btn btn-xs btn-blue" onclick="showMod('chat',{u:h.u})">💬</button><button class="btn btn-xs btn-red" onclick="delSt(${i})">🗑️</button></div></div>`;}).join('')||`<p>${t('noResults')}</p>`;$('hv-count').innerText=list.length;};
const filterStudents=type=>{const search=$('search-hv')?.value?.toLowerCase()||'';let list=DB.hv||[];if(search)list=list.filter(h=>h.n.toLowerCase().includes(search)||h.l.toLowerCase().includes(search)||h.u.toLowerCase().includes(search));if(type==='paid')list=list.filter(h=>{const f=DB.data?.[h.u]?.fee||{slots:0,rate:0,paid:0,extra:0};return f.paid>=f.slots*f.rate+f.extra;});else if(type==='debt')list=list.filter(h=>{const f=DB.data?.[h.u]?.fee||{slots:0,rate:0,paid:0,extra:0};return f.paid<f.slots*f.rate+f.extra;});renderStudentList(list);};
const addSt=()=>{const un=($('stu').value.trim()||'user')+'.portalnow';if((DB.hv||[]).find(h=>h.u===un))return alert('Tồn tại!');if(!DB.hv)DB.hv=[];DB.hv.push({n:$('stn').value,l:$('stl').value,u:un,email:$('ste').value,p:H($('stp').value),avatar:'👤',loginCount:0});save('/hv',DB.hv);navAd('students');};

const adFee=c=>{c.innerHTML='<h4>💰 Học phí</h4>';(DB.hv||[]).forEach(h=>{const f=DB.data?.[h.u]?.fee||{slots:0,rate:0,paid:0,extra:0,logs:[],bank:''};const banks=[{id:'1',info:DB.config?.bankInfo},{id:'2',info:DB.config?.bankInfo2}].filter(b=>b.info);const total=f.slots*f.rate+f.extra,debt=total-f.paid;c.innerHTML+=`<div class="card fade-in"><div class="flex-between"><b>${h.n}</b><span style="font-size:10px">Tổng:${total.toLocaleString()}đ | Nộp:${f.paid.toLocaleString()}đ | Nợ:<b style="color:${debt<=0?'var(--green)':'var(--red)'}">${debt.toLocaleString()}đ</b></span></div><div class="form-row"><input id="fs-${h.u}" type="number" value="${f.slots}" placeholder="Tiết"><input id="fr-${h.u}" type="number" value="${f.rate}" placeholder="Đơn giá"><input id="fe-${h.u}" type="number" value="${f.extra}" placeholder="Phí PS"><input id="fa-${h.u}" type="number" value="0" placeholder="Nộp thêm"></div><div class="form-row"><select id="fb-${h.u}"><option value="">${t('selectBank')}</option>${banks.map(b=>`<option value="${b.id}" ${f.bank===b.id?'selected':''}>${t('bank'+b.id)}</option>`).join('')}</select></div><div class="flex-between"><button class="btn btn-sm btn-green" onclick="svFee('${h.u}')">💾</button><button class="btn btn-xs btn-blue" onclick="sendPayNotif('${h.u}','success')">✅ TT thành công</button><button class="btn btn-xs btn-red" onclick="sendPayNotif('${h.u}','failed')">❌ TT thất bại</button></div><h5>LS đóng</h5>${(f.logs||[]).map(l=>`<div class="flex-between"><small>${l}</small><button class="btn btn-xs btn-red" onclick="delFeeLog('${h.u}','${l}')">🗑️</button></div>`).join('')||'<small>Chưa có</small>'}</div>`;});c.innerHTML+=`<div class="card fade-in"><h4>🏦 ${t('bank1')}</h4><textarea id="cfg-bank">${DB.config?.bankInfo||''}</textarea><input id="cfg-bankimg1" type="file" accept="image/*"><button class="btn btn-sm btn-green" onclick="saveBank(1)">💾</button></div><div class="card fade-in"><h4>🏦 ${t('bank2')}</h4><textarea id="cfg-bank2">${DB.config?.bankInfo2||''}</textarea><input id="cfg-bankimg2" type="file" accept="image/*"><button class="btn btn-sm btn-green" onclick="saveBank(2)">💾</button></div>`;};
const svFee=u=>{if(!DB.data)DB.data={};if(!DB.data[u])DB.data[u]={};const f=DB.data[u].fee||{slots:0,rate:0,paid:0,extra:0,logs:[],bank:''};f.slots=+$('fs-'+u).value||0;f.rate=+$('fr-'+u).value||0;f.extra=+$('fe-'+u).value||0;f.bank=$('fb-'+u)?.value||'';const a=+$('fa-'+u).value||0;if(a>0){f.paid+=a;f.logs.unshift(new Date().toLocaleDateString()+': <span style=color:red>+'+a.toLocaleString()+'đ</span>');}DB.data[u].fee=f;save(`/data/${u}`,DB.data[u]);navAd('fee');};

const adSupport=c=>{c.innerHTML=`<h4>🆘 Hỗ trợ</h4><h5>📝 Đăng ký mới</h5>${(DB.registrations||[]).map((r,i)=>`<div class="card fade-in flex-between"><div><b>${r.name}</b> | ${r.phone} | ${r.email}<br>Khoá: ${r.course}<br><small>${r.date} (${r.status||'pending'})</small></div><button class="btn btn-xs btn-green" onclick="confirmReg(${i})">✅</button><button class="btn btn-xs btn-red" onclick="delReg(${i})">🗑️</button></div>`).join('')}<h5>🔑 Quên MK</h5>${(DB.pw_requests||[]).map((r,i)=>`<div class="card fade-in flex-between"><b>${r.name}</b> | ${r.class} | ${r.email}<small>${r.date}</small><button class="btn btn-xs btn-red" onclick="delPWR(${i})">🗑️</button></div>`).join('')}<h5>💬 Khiếu nại</h5>${(DB.tickets||[]).map((t,i)=>`<div class="card fade-in flex-between"><div><b>${t.name}</b> | ${t.class}<br>${t.msg}<br><small>${t.date}</small></div><div><button class="btn btn-xs btn-green" onclick="resT(${i})">✅</button><button class="btn btn-xs btn-red" onclick="delT(${i})">🗑️</button></div></div>`).join('')}<h5>💳 Thanh toán</h5>${(DB.payments||[]).map((p,i)=>`<div class="card fade-in flex-between"><div><b>${p.u}</b><br>${p.img?`<img src="${p.img}" style="max-width:150px;max-height:150px;border-radius:8px">`:''}<br><small>${p.date} (${p.status})</small></div><div><textarea id="paynote-${i}" placeholder="Ghi chú" style="min-height:40px">${p.note||''}</textarea><button class="btn btn-xs btn-green" onclick="confirmPay(${i})">✅</button><button class="btn btn-xs btn-red" onclick="delPay(${i})">🗑️</button></div></div>`).join('')}`;};

const adBackup=c=>{c.innerHTML=`<div class="card fade-in"><h4>💾 ${t('backup')}</h4><button class="btn btn-blue" onclick="downloadDB()">${t('downloadDB')}</button><button class="btn btn-gold" onclick="$('restore-file').click()">${t('uploadDB')}</button><input id="restore-file" type="file" accept=".json" style="display:none" onchange="restoreDB(this)"><p style="font-size:9px;color:var(--sub);margin-top:8px">⚠️ Khôi phục sẽ ghi đè toàn bộ dữ liệu hiện tại!</p></div>`;};

const restoreDB=input=>{if(!confirm('⚠️ Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu. Tiếp tục?')){input.value='';return;}const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.admins||!data.hv){alert('❌ File không hợp lệ!');return;}dbRef.ref('/').set(data).then(()=>{alert('✅ Khôi phục thành công! Đang tải lại...');location.reload();});}catch(err){alert('❌ Lỗi đọc file: '+err.message);}};reader.readAsText(file);};

const adSettings=c=>{const admins=DB.admins||[];c.innerHTML=`<div class="card fade-in"><h4>🔧 Cài đặt chung</h4><input id="cfg-pin" value="${DB.config?.adminPin||'2468'}" type="password" maxlength="4" placeholder="PIN Admin"><input id="cfg-reset" value="${DB.config?.resetCode||'RESET123'}" placeholder="Mã Reset"><button class="btn btn-sm btn-green" onclick="svCfg()">💾</button></div><div class="card fade-in"><h4>👑 Quản lý Admin</h4>${admins.map((a,i)=>`<div class="card flex-between"><div><b>${a.u}</b> <span class="tag ${a.role==='main'?'tag-on':'tag-off'}">${a.role==='main'?'Chính':'Phụ'}</span>${isMainAdmin()&&a.role==='sub'?`<br><small>Quyền: ${(a.permissions||['schedule','notif','homework','exam','support']).join(', ')}</small>`:''}</div><div>${isMainAdmin()&&a.role==='sub'?`<button class="btn btn-xs btn-blue" onclick="editSubPerm(${i})">🔧</button>`:''}${isMainAdmin()?`<button class="btn btn-xs btn-red" onclick="delAdmin(${i})">🗑️</button>`:''}</div></div>`).join('')}${isMainAdmin()?`<div class="form-row"><input id="new-adm-u" placeholder="Username"><input id="new-adm-p" type="password" placeholder="MK"><select id="new-adm-role"><option value="sub">Phụ</option><option value="main">Chính</option></select></div><button class="btn btn-sm btn-blue" onclick="addAdmin()">+ Thêm</button>`:''}</div><div class="card fade-in"><h4>✏️ Sửa HV</h4><select id="edhv-sel" onchange="loadHVEdit()"><option value="">Chọn HV</option>${(DB.hv||[]).map(h=>`<option value="${h.u}">${h.n} (${h.u})</option>`).join('')}</select><div id="edhv-form" style="display:none"><input id="edhv-name" placeholder="Họ tên"><input id="edhv-class" placeholder="Lớp"><input id="edhv-email" placeholder="Email"><input id="edhv-pw" type="password" placeholder="MK mới"><button class="btn btn-sm btn-green" onclick="saveHVEdit()">💾</button></div></div><div class="card fade-in"><h4>📚 Khoá học</h4>${(DB.config?.courses||[]).map((co,i)=>`<div class="flex-between"><span>${co}</span><button class="btn btn-xs btn-red" onclick="delCourse(${i})">🗑️</button></div>`).join('')}<input id="new-course" placeholder="Tên khoá học"><button class="btn btn-sm btn-green" onclick="addCourse()">+ ${t('addCourse')}</button></div>`;};
const svCfg=()=>{DB.config.adminPin=$('cfg-pin').value;DB.config.resetCode=$('cfg-reset').value;save('/config',DB.config);};
const addAdmin=()=>{if(!isMainAdmin())return alert(t('permissionDenied'));const u=$('new-adm-u').value.trim(),p=$('new-adm-p').value.trim(),role=$('new-adm-role').value;if(!u||!p)return alert('Nhập đủ!');if((DB.admins||[]).find(a=>a.u===u))return alert(t('usernameTaken'));if(!DB.admins)DB.admins=[];DB.admins.push({u,p:H(p),pin:role==='main'?'1111':'2468',role,permissions:role==='main'?['schedule','notif','homework','exam','students','progress','fee','results','support','settings','dashboard','backup']:['schedule','notif','homework','exam','support']});save('/admins',DB.admins);navAd('settings');};

const addCourse=()=>{const c=$('new-course').value.trim();if(!c)return;if(!DB.config.courses)DB.config.courses=[];DB.config.courses.push(c);save('/config/courses',DB.config.courses);navAd('settings');};

const navSt=pg=>{
    document.querySelectorAll('#bnav .ni').forEach(el=>el.classList.remove('ac'));
    const idx={home:0,schedule:1,me:2,homework:3,exam:4};
    if(document.querySelectorAll('#bnav .ni')[idx[pg]])document.querySelectorAll('#bnav .ni')[idx[pg]].classList.add('ac');
    const m=$('hv-main');if(!DB.data)DB.data={};const d=DB.data[U.u]||{};
    if(pg==='home'){
        m.innerHTML=`<div class="card fade-in" style="text-align:center"><h3>${U.loginCount<=1?t('welcome1',U.n):t('welcome2',U.n)}</h3></div><h4>📢 Thông báo</h4>`;
        (DB.notif_history||[]).slice(0,5).forEach(n=>m.innerHTML+=`<div class="card fade-in"><small>${n.date}</small><br>${n.msg}</div>`);
        (DB.personal_notif?.[U.u]||[]).slice(0,5).forEach((n,i)=>{const isNew=n.read===false;m.innerHTML+=`<div class="card fade-in" style="${isNew?'border-left:3px solid var(--accent);background:rgba(255,107,107,0.05)':''}"><div class="flex-between"><small>${n.date}</small>${isNew?'<span class="badge" style="position:static;display:inline-flex;font-size:8px;padding:2px 6px">MỚI</span>':''}</div>${n.msg}</div>`;if(isNew){n.read=true;save('/personal_notif/'+U.u,DB.personal_notif[U.u]);}});
        if(d['2b_new']){d['2b_new']=false;save(`/data/${U.u}/2b_new`,false);}
        const chats=DB.chats?.[U.u]||[];

    } else if(pg==='schedule'){

        if(canReg)m.innerHTML+=`<p style="font-size:10px;color:var(--sub)">⚠️ Cần đăng ký ít nhất 2 tiết</p><div class="grid3">${(sk.slots||[]).map((s,i)=>`<div class="menu-card"><label style="cursor:pointer"><input type="checkbox" id="chk-${i}" ${(s.r||[]).includes(U.u)?'checked':''}><br><b>${s.n}</b><br>${s.d}<br>${s.ti}</label></div>`).join('')}</div><button class="btn btn-sm btn-green" onclick="regMultiple()">${t('regMany')}</button>`;
        else m.innerHTML+=`<p>⛔ Không trong thời gian đăng ký</p>`;
        m.innerHTML+=`<h5>📌 Đã ĐK:</h5>${(sk.slots||[]).filter(s=>(s.r||[]).includes(U.u)).map(s=>`<div class="card"><span>✅ ${s.n} - ${s.d} ${s.ti}</span></div>`).join('')||`<p>${t('noReg')}</p>`}<button class="btn btn-sm btn-outline" onclick="viewRegHistory()">${t('viewHistory')}</button>`;
    } else if(pg==='homework'){
        m.innerHTML=`<h4>📝 Bài tập</h4>`;const now=new Date();
        (DB.hw_list||[]).filter(h=>!h.assignedTo||h.assignedTo.length===0||h.assignedTo.includes(U.u)).forEach((h,i)=>{let canDo=true,status='';if(h.start&&now<new Date(h.start)){status='<br><span style="color:#e8b730">⏳ Chưa đến hạn</span>';canDo=false;}if(h.end&&now>new Date(h.end)){status='<br><span style="color:#e84545">⛔ Đã hết hạn</span>';canDo=false;}const subs=(DB.submissions||[]).filter(s=>s.u===U.u&&s.n===h.n&&s.type==='hw');if(subs.length>=(h.slot||1)){status=`<br><span style="color:#e84545">⚠️ ${t('slotLimit',h.slot||1)}</span>`;canDo=false;}m.innerHTML+=`<div class="card fade-in"><b>${h.n}</b><br><small>${h.start||'?'}→${h.end||'?'} | ${h.t||30}ph | Slot:${h.slot||1} (${subs.length}/${h.slot||1})</small>${status}<br>${canDo?`<button class="btn btn-sm btn-blue" onclick="stHW(${i})">LÀM</button>`:''}<button class="btn btn-sm btn-outline" onclick="vwMySub('${h.n}')">📋 Đã nộp (${subs.length})</button></div>`;});
    } else if(pg==='exam'){
        m.innerHTML=`<h4>📄 Thi cử</h4>${(DB.exams||[]).filter(x=>x.st=='1').map((x,i)=>{const subs=(DB.submissions||[]).filter(s=>s.u===U.u&&s.n===x.n&&s.type==='exam'),s=x.slot||1;return`<div class="card fade-in"><b>${x.n}</b> <small>(${x.t}ph - Slot:${s}) (${subs.length}/${s})</small>${subs.length<s?`<button class="btn btn-sm btn-gold" onclick="stEx(${i})">VÀO THI</button>`:`<br><span style="color:#e84545">⚠️ ${t('slotLimit',s)}</span>`}</div>`;}).join('')}<h5>Đã thi:</h5>${(DB.submissions||[]).filter(s=>s.u===U.u&&s.type==='exam').map(s=>{const ex=(DB.exams||[]).find(x=>x.n===s.n);return`<div class="card fade-in"><b>${s.n}</b> - ${s.date}<br>${s.scored?`TN: ${s.mcqScore||'?'} | TL: ${s.essayScore||'?'}`:'Chờ chấm'}${ex&&ex.st=='0'&&s.scored?`<br><button class="btn btn-xs btn-outline" onclick="vwExRes('${s.n}')">👁 Xem</button>`:''}</div>`;}).join('')}`;
    } else if(pg==='me'){
        const avs=['👤','👨‍🎓','👩‍🎓','🧑‍🎓','👨‍💻','👩‍💻','🧑‍💻','🦊','🐱','🐶','🐼','🐨','🦁','🐯','🐸','🐵','🐔','🦄','🐙','🦋'];

        m.innerHTML=`<div class="avatar-section"><div class="avatar-img" onclick="$('avp').style.display='flex'">${U.avatar||'👤'}</div><div id="avp" style="display:none" class="icon-picker">${avs.map(a=>`<span onclick="selAv('${a}')" class="${U.avatar===a?'sel':''}">${a}</span>`).join('')}</div><button class="btn btn-sm btn-outline" onclick="saveAv()">${t('saveAv')}</button><div style="margin-top:8px"><b>${t('fullName')}:</b> ${U.n}<br><b>${t('class_')}:</b> ${U.l||'Chưa có'}<br><b>${t('language')}:</b> <select onchange="setLang(this.value)" style="width:auto;display:inline"><option value="vi" ${currentLang==='vi'?'selected':''}>Tiếng Việt</option><option value="en" ${currentLang==='en'?'selected':''}>English</option></select></div></div><div class="card fade-in" onclick="vwScore()"><h5>📊 Kết quả</h5></div><div class="card fade-in" onclick="vwProg()"><h5>📋 Chương trình</h5></div><div class="card fade-in" onclick="vwFee()"><h5>💰 Học phí ${debt<=0?'✅':'⚠️'}</h5></div><div class="card fade-in" onclick="showMod('support')"><h5>💬 ${t('support')}</h5></div><button class="btn btn-red" onclick="logout()">🚪 ${t('logout')}</button>`;
    }
};

const vwScore=()=>{const d=DB.data[U.u]||{};$('hv-main').innerHTML=`<h4>📊 Bảng điểm</h4><h5>Tích lũy</h5><table>${(d.pts_tl||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table><h5>Kiểm tra</h5><table>${(d.pts_kt||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table><button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;};
const vwProg=()=>{$('hv-main').innerHTML=`<h4>📋 Chương trình</h4><div class="card" style="white-space:pre-wrap">${DB.data?.[U.u]?.prog||'Chưa có'}</div><button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;};
const vwFee=()=>{const f=DB.data?.[U.u]?.fee||{slots:0,rate:0,paid:0,extra:0};$('hv-main').innerHTML=`<h4>💰 Học phí</h4><div class="card"><b>Tổng: ${(f.slots*f.rate+f.extra).toLocaleString()}đ</b><br>Đã nộp: ${f.paid.toLocaleString()}đ<br>Nợ: <b style="color:${(f.slots*f.rate+f.extra-f.paid)<=0?'var(--green)':'var(--red)'}">${(f.slots*f.rate+f.extra-f.paid).toLocaleString()}đ</b><hr>${['1','2'].map(n=>{const fi=DB.config?.['bankInfo'+(n==='1'?'':'2')]||'';return fi?`<div class="card"><h5>${t('bank'+n)}</h5><div style="white-space:pre-wrap;font-size:11px">${fi}</div>${DB.config?.['bankImg'+n]?`<img src="${DB.config['bankImg'+n]}" style="max-width:100%;border-radius:8px">`:''}</div>`:'';}).join('')}<button class="btn btn-sm btn-gold" onclick="showMod('pay')">💳 ĐÓNG TIỀN</button></div><h5>LS đóng</h5>${(f.logs||[]).map(l=>`<div class="card"><small>${l}</small></div>`).join('')||'<p>Chưa có</p>'}<button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;};
const regMultiple=()=>{const slots=DB.sked.slots,selected=[];slots.forEach((s,i)=>{if($('chk-'+i)?.checked)selected.push(i);});if(selected.length<2)return alert('⚠️ Cần đăng ký ít nhất 2 tiết!');slots.forEach(s=>{s.r=(s.r||[]).filter(u=>u!==U.u);});selected.forEach(i=>slots[i].r.push(U.u));save('/sked/slots',DB.sked.slots);navSt('schedule');};
const viewRegHistory=()=>{const hist=DB.sked?.history||[],m=$('hv-main');if(!hist.length){m.innerHTML=`<h4>${t('history')}</h4><p>Không có.</p><button class="btn btn-sm btn-outline" onclick="navSt('schedule')">←</button>`;return;}m.innerHTML=`<h4>📜 ${t('history')}</h4>${hist.map((h,i)=>`<div class="card" onclick="viewHistoryWeek(${i})" style="cursor:pointer"><b>${h.t}</b> - ${h.date}<br><small>Đã ĐK: ${(h.slots||[]).filter(s=>(s.r||[]).includes(U.u)).length} tiết</small></div>`).join('')}<button class="btn btn-sm btn-outline" onclick="navSt('schedule')">←</button>`;};
const viewHistoryWeek=idx=>{const h=DB.sked.history[idx],m=$('hv-main');m.innerHTML=`<h4>📅 ${h.t} (${h.date})</h4>${(h.slots||[]).map(s=>`<div class="card"><b>${(s.r||[]).includes(U.u)?'✅':'⬜'} ${s.n}</b> | ${s.d} ${s.ti}</div>`).join('')||'<p>Không có.</p>'}<button class="btn btn-sm btn-outline" onclick="viewRegHistory()">←</button>`;};

// ===== HOMEWORK/EXAM + AUTO-SAVE =====
const stHW=i=>{const h=DB.hw_list[i];stm=new Date();timeLeft=(h.t||30)*60;startTimer();renderHWExam('hw',h);startAutoSave('hw',h.n);};
const stEx=i=>{const x=DB.exams[i];if(prompt('🔒 MK đề:')!==x.p)return alert('❌ Sai!');stm=new Date();timeLeft=(x.t||45)*60;startTimer();renderHWExam('exam',x);startAutoSave('exam',x.n);};
const startTimer=()=>{clearInterval(timerInterval);timerInterval=setInterval(()=>{timeLeft--;const el=$('timer');if(el){el.innerText=`⏱ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;if(timeLeft<60)el.classList.add('warning');if(timeLeft<=0){clearInterval(timerInterval);clearInterval(autoSaveInterval);autoSubmit();}}},1000);};
const startAutoSave=(type,n)=>{clearInterval(autoSaveInterval);autoSaveInterval=setInterval(()=>{let ans={mcq:[],essay:[]};if(type==='hw'){const h=DB.hw_list.find(hw=>hw.n===n);if(h?.mcq)h.mcq.forEach((_,i)=>{ans.mcq.push((document.querySelector(`input[name="mq${i}"]:checked`)||{}).value||'');});if(h?.essay)h.essay.forEach((_,i)=>{ans.essay.push($('es'+i)?.value||'');});}else{const x=DB.exams.find(e=>e.n===n);if(x?.mcq)x.mcq.forEach((_,i)=>{ans.mcq.push((document.querySelector(`input[name="mq${i}"]:checked`)||{}).value||'');});if(x?.essay)x.essay.forEach((_,i)=>{ans.essay.push($('es'+i)?.value||'');});}localStorage.setItem('autosave_'+U.u+'_'+n,JSON.stringify({type,ans,time:new Date().toISOString()}));},30000);};
const autoSubmit=()=>{alert(t('autoSubmit'));clearInterval(autoSaveInterval);localStorage.removeItem('autosave_'+U.u+'_'+($('exam-form')?(DB.exams.find(e=>$('exam-form'))||{}).n:(DB.hw_list.find(hw=>$('exam-form'))||{}).n));$('exam-form')?doSubmitEx():doSubmitHW();};
const renderHWExam=(type,data)=>{const total=(data.mcq||[]).length+(data.essay||[]).length;let h=`<div class="timer" id="timer">⏱ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}</div><h4>${type==='hw'?'📝':'📄'} ${data.n}</h4>`;if(total>0){h+=`<div class="question-nav" id="q-nav">`;for(let j=0;j<total;j++)h+=`<span onclick="goToQ(${j})" id="qbtn-${j}">${j+1}</span>`;h+=`</div>`;}h+=`<form id="exam-form">`;let qIdx=0;if(data.mcq)data.mcq.forEach((m,j)=>{h+=`<div class="exam-block" id="q-${qIdx}"><b>Câu ${j+1} (${m.pt}đ):</b> ${m.q}<br><label><input type="radio" name="mq${j}" value="A" onchange="markQ(${qIdx})"> A.${m.a}</label><br><label><input type="radio" name="mq${j}" value="B" onchange="markQ(${qIdx})"> B.${m.b}</label><br><label><input type="radio" name="mq${j}" value="C" onchange="markQ(${qIdx})"> C.${m.c}</label><br><label><input type="radio" name="mq${j}" value="D" onchange="markQ(${qIdx})"> D.${m.d}</label><br><button type="button" class="btn btn-xs btn-outline" onclick="flagQ(${qIdx})">🚩</button></div>`;qIdx++;});if(data.essay)data.essay.forEach((e,j)=>{h+=`<div class="exam-block" id="q-${qIdx}"><b>Câu ${j+1} (${e.pt}đ):</b> ${e.q||''}<br><textarea id="es${j}" oninput="markQ(${qIdx})"></textarea><button type="button" class="btn btn-xs btn-outline" onclick="flagQ(${qIdx})">🚩</button></div>`;qIdx++;});h+=`</form><button class="btn btn-green" onclick="confirmSubmit('${type}','${data.n}')">📤 NỘP</button>`;$('hv-main').innerHTML=h;
    const saved=localStorage.getItem('autosave_'+U.u+'_'+data.n);
    if(saved){try{const a=JSON.parse(saved);if(a.type===type){if(a.ans.mcq)data.mcq?.forEach((_,i)=>{const radio=document.querySelector(`input[name="mq${i}"][value="${a.ans.mcq[i]||''}"]`);if(radio)radio.checked=true;});if(a.ans.essay)data.essay?.forEach((_,i)=>{const ta=$('es'+i);if(ta)ta.value=a.ans.essay[i]||'';});}}catch(e){}}};
const markQ=idx=>{$('qbtn-'+idx)?.classList.add('done');};
const flagQ=idx=>{$('qbtn-'+idx)?.classList.toggle('flagged');};
const goToQ=idx=>{$('q-'+idx)?.scrollIntoView({behavior:'smooth'});};
const confirmSubmit=(type,n)=>{const data=type==='hw'?DB.hw_list.find(h=>h.n===n):DB.exams.find(e=>e.n===n);let unanswered=[],qIdx=0;if(data.mcq)data.mcq.forEach((_,i)=>{if(!document.querySelector(`input[name="mq${i}"]:checked`))unanswered.push(qIdx+1);qIdx++;});if(data.essay)data.essay.forEach((_,i)=>{if(!$('es'+i)?.value.trim())unanswered.push(qIdx+1);qIdx++;});if(unanswered.length>0){if(!confirm(t('checkUnanswered')+'\n'+unanswered.join(', ')+'\n\n'+t('sureSubmit')))return;}else if(!confirm(t('sureSubmit')))return;clearInterval(timerInterval);clearInterval(autoSaveInterval);localStorage.removeItem('autosave_'+U.u+'_'+n);type==='hw'?doSubmitHW():doSubmitEx();};
const doSubmitHW=()=>{const h=DB.hw_list.find(hw=>$('exam-form'));if(!h)return;let ans={mcq:[],essay:[]};if(h.mcq)h.mcq.forEach((_,i)=>{ans.mcq.push((document.querySelector(`input[name="mq${i}"]:checked`)||{}).value||'');});if(h.essay)h.essay.forEach((_,i)=>{ans.essay.push($('es'+i)?.value||'');});const d=Math.floor((new Date()-stm)/1000);if(!DB.submissions)DB.submissions=[];DB.submissions.push({u:U.u,type:'hw',n:h.n,con:JSON.stringify(ans),date:new Date().toLocaleString(),dur:Math.floor(d/60)+'p'+d%60+'s'});save('/submissions',DB.submissions);navSt('homework');};
const doSubmitEx=()=>{const x=DB.exams.find(e=>$('exam-form'));if(!x)return;let ans={mcq:[],essay:[]},mcqScore=0;if(x.mcq)x.mcq.forEach((m,i)=>{const v=(document.querySelector(`input[name="mq${i}"]:checked`)||{}).value||'';ans.mcq.push(v);if(v===m.ans)mcqScore+=m.pt;});if(x.essay)x.essay.forEach((_,i)=>{ans.essay.push($('es'+i)?.value||'');});const d=Math.floor((new Date()-stm)/1000);if(!DB.submissions)DB.submissions=[];DB.submissions.push({u:U.u,type:'exam',n:x.n,con:JSON.stringify(ans),date:new Date().toLocaleString(),dur:Math.floor(d/60)+'p'+d%60+'s',mcqScore,essayScore:0,scored:false});save('/submissions',DB.submissions);navSt('exam');};
const vwMySub=n=>{const ms=(DB.submissions||[]).filter(s=>s.u===U.u&&s.n===n&&s.type==='hw');$('hv-main').innerHTML=`<h4>📋 ${n} (${ms.length})</h4>${ms.map(s=>{let ans='';try{const a=JSON.parse(s.con);if(a.mcq)ans+='TN: '+a.mcq.map((v,i)=>`C${i+1}:${v||'-'}`).join(', ')+'\n';if(a.essay)ans+='TL: '+a.essay.map((v,i)=>`C${i+1}: ${v||'-'}`).join('\n');}catch(e){ans=s.con;}return`<div class="card fade-in"><small>${s.date}</small><pre style="white-space:pre-wrap">${ans}</pre></div>`;}).join('')}<button class="btn btn-outline" onclick="navSt('homework')">←</button>`;};
const vwExRes=n=>{const sub=(DB.submissions||[]).find(s=>s.u===U.u&&s.n===n&&s.type==='exam');if(!sub)return;let ans='';try{const a=JSON.parse(sub.con);if(a.mcq)ans+='TN: '+a.mcq.map((v,i)=>`C${i+1}:${v||'-'}`).join(', ')+'\n';if(a.essay)ans+='TL: '+a.essay.map((v,i)=>`C${i+1}: ${v||'-'}`).join('\n');}catch(e){ans=sub.con;}$('hv-main').innerHTML=`<h4>📄 ${n}</h4><div class="card fade-in"><pre style="white-space:pre-wrap">${ans}</pre><small>${sub.date} | TN:${sub.mcqScore||'?'}đ | TL:${sub.essayScore||'?'}đ</small></div><button class="btn btn-outline" onclick="navSt('exam')">←</button>`;};

// ===== INIT =====
loadDB();
</script>
</body>
</html>
