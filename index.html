    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --font: 'Inter', sans-serif;
            --primary: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f8fafc; --surface: #ffffff; --surface-alt: #f1f5f9;
            --text: #0f172a; --text-secondary: #475569; --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12); --radius: 20px; --radius-sm: 14px;
            --transition: 0.25s cubic-bezier(0.2, 0.0, 0, 1.0); --bottom-nav-height: 70px;
        }
        .dark {
            --primary: #0f172a; --bg: #0b1120; --surface: #1e293b; --surface-alt: #334155;
            --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; overflow-x: hidden; max-width: 100vw; overscroll-behavior: none; touch-action: pan-x pan-y; }
        .hidden { display: none !important; }
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; }
        .toast { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 40px; box-shadow: var(--shadow-lg); font-weight: 500; font-size: 15px; color: var(--text); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); border-radius: var(--radius); padding: 30px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); text-align: center; }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin: 20px 0; }
        .bento-card { background: var(--surface); border-radius: var(--radius); padding: 24px 18px; box-shadow: var(--shadow); text-align: center; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
        .bento-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .bento-card.selected { background: #d1fae5; border-color: var(--success); }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; font-family: var(--font); cursor: pointer; }
        button:hover { background: var(--accent-hover); }
        button.danger { background: var(--danger); }
        button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 40px; font-family: var(--font); font-size: 15px; background: var(--surface); color: var(--text); margin: 6px 0; }
        .header { background: var(--surface); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
        .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px 20px; box-sizing: border-box; }
        .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); width: 100%; word-wrap: break-word; box-sizing: border-box; max-width: 100%; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 8px 16px; }
        .nav-item.active { color: var(--accent); font-weight: 600; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; border: 3px solid var(--accent); cursor: pointer; }
        .profile-menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; }
        .logout-btn { background: var(--danger); color: white; text-align: center; padding: 16px; border-radius: 40px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .question-block { background: var(--surface-alt); border-radius: var(--radius-sm); padding: 15px; margin-bottom: 15px; position: relative; }
        .question-block .remove-question { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; }
        .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-option { font-size: 30px; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
        .avatar-option.selected { border-color: var(--accent); background: var(--surface-alt); }
        .cheat-warning { background: var(--danger); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 10px; }
        .timer { font-size: 2rem; font-weight: 700; text-align: center; padding: 10px; background: var(--surface-alt); border-radius: 40px; margin: 10px 0; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--surface-alt); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .pagination button { padding: 8px 14px; background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; }
        .pagination button.active { background: var(--accent); color: white; }
        @media (max-width: 640px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>

<script>

// ========== CẤU HÌNH FIREBASE ==========

<script>
// ========== TRẠNG THÁI TOÀN CỤC ==========
let db = {};
let user = null;
let isTakingExam = false;
let examTimer = null;
let examEndTime = null;
let currentWorkType = null;
let currentWorkName = null;
let startTime = null;
let cheatCount = 0;
const MAX_CHEATS = 3;
const avatarIcons = ['👤','😺','🐶','🦊','🐨','🐼','🐸','🐵','🦁','🐯','🐮','🐷','🐭','🐰','🐔'];
let studentPage = 1;
const PAGE_SIZE = 10;

// ========== TIỆN ÍCH ==========
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
    c.appendChild(el); setTimeout(() => el.remove(), 3000);
}
function modal(msg, onConfirm, onCancel) {
    const container = document.getElementById('modal-container');
    container.innerHTML = `<div class="modal-overlay"><div class="modal-box"><p>${msg}</p><button id="modal-confirm" class="danger">Xác nhận</button><button id="modal-cancel" class="ghost">Hủy</button></div></div>`;
    document.getElementById('modal-confirm').onclick = () => { container.innerHTML = ''; if(onConfirm) onConfirm(); };
    document.getElementById('modal-cancel').onclick = () => { container.innerHTML = ''; if(onCancel) onCancel(); };
}
function showLoading() { document.getElementById('loadingSpinner')?.classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingSpinner')?.classList.add('hidden'); }

// ========== DATABASE ==========
const dbRef = fbDB.ref('/');
async function loadDB() {
    showLoading();
    try { const snap = await dbRef.once('value'); db = snap.val() || {}; } catch(e) { db = {}; }
    if(db.notif_history) db.notif_history.forEach(n => { if(!n.id) n.id = 'legacy-'+Date.now()+Math.random(); });
    if(db.private_notif) Object.values(db.private_notif).forEach(arr => arr.forEach(n => { if(!n.id) n.id = 'legacy-'+Date.now()+Math.random(); }));
    hideLoading(); initDB(); updateStats();
}
function initDB() {
    const schema = { users:{}, parents:{}, sked:{ t:"Tuần mới", slots:[], isOpen:true, regOpen:'', regClose:'' }, exams:[], hw_list:[], submissions:[], data:{}, notif_history:[], private_notif:{}, forgot_pwd:[], bank_info:{}, sked_history:[], question_bank:{ subjects:{} }, audit_log:[], question_stats:{} };
    Object.keys(schema).forEach(k => { if(!db[k]) db[k] = schema[k]; });
    if(!db.users || Object.keys(db.users).length===0) {
        const uid = 'admin-'+Date.now();
        db.users = {}; db.users[uid] = { n:'Admin chính', u:'ADMIN.pn', p:CryptoJS.SHA256('portalnow1').toString(), r:'admin', email:'admin@portal.now', avatar:'👤', phone:'' };
    }
    if(!db.parents) db.parents = {};
    if(!db.question_bank) db.question_bank = { subjects:{} };
    if(!db.audit_log) db.audit_log = [];
}
async function saveDB(path=null, data=null) {
    try {
        if(path && data) await fbDB.ref(path).update(data);
        else await dbRef.set(db);
        updateStats();
    } catch(e) { console.error(e); toast('Lỗi đồng bộ dữ liệu!', 'error'); }
}
function addAudit(action, target='', details='') {
    if(!db.audit_log) db.audit_log = [];
    db.audit_log.unshift({ uid: user?user.uid:'system', name: user?user.n:'Hệ thống', action, target, details, timestamp: new Date().toISOString() });
    if(db.audit_log.length>500) db.audit_log.length=500;
}

// ========== VAI TRÒ ==========
const isTeacher = () => user && (user.r==='admin'||user.r==='teacher'||user.r==='subadmin');
const isMainAdmin = () => user && user.r==='admin';
const isSubAdmin = () => user && user.r==='subadmin';

// ========== ĐIỀU HƯỚNG ==========
function show(id) { ['pg-login','pg-admin','pg-hv','pg-parent','pg-det'].forEach(x => document.getElementById(x)?.classList.add('hidden')); document.getElementById(id)?.classList.remove('hidden'); }
function cl() { if(!user){ locOut(); return; } if(isTeacher()) show('pg-admin'); else if(user.r==='hv') show('pg-hv'); else if(user.r==='parent') show('pg-parent'); }
function locOut() { user=null; clearInterval(examTimer); show('pg-login'); }
function updateStats() {
    const u = db.users||{};
    document.getElementById('stat-hv').innerText = Object.values(u).filter(x=>x.r==='hv').length;
    document.getElementById('stat-teach').innerText = Object.values(u).filter(x=>x.r==='teacher').length;
    document.getElementById('stat-parent').innerText = Object.keys(db.parents||{}).length;
    document.getElementById('stat-hw').innerText = (db.hw_list||[]).length;
    document.getElementById('stat-sub').innerText = (db.submissions||[]).length;

    // Tính tổng học phí & nợ
    let totalFee = 0, totalDebt = 0;
    Object.entries(u).filter(([uid, user]) => user.r === 'hv').forEach(([uid, user]) => {
        const fee = (db.data[uid] && db.data[uid].fee) || {slots:0, rate:0, paid:0};
        const amount = fee.slots * fee.rate;
        totalFee += amount;
        totalDebt += (amount - (fee.paid || 0));
    });
    document.getElementById('stat-fee').innerText = totalFee.toLocaleString() + 'đ';
    document.getElementById('stat-debt').innerText = totalDebt.toLocaleString() + 'đ';
}
function setActiveNav(id) { ['home','reg','2c','2f','profile'].forEach(k => { const el = document.getElementById('nav-'+k); if(el) el.classList.toggle('active', k===id); }); }

// ========== ĐĂNG NHẬP ==========
window.doLogin = async function() {
    const username = document.getElementById('u').value.trim(), password = document.getElementById('p').value.trim();
    if(!username||!password){ toast('Nhập đủ thông tin','error'); return; }
    showLoading(); await loadDB();
    const hashed = CryptoJS.SHA256(password).toString();
    let found = Object.values(db.users||{}).find(u=>u.u===username && u.p===hashed);
    if(found) { user = { uid: Object.keys(db.users).find(k=>db.users[k]===found), ...found }; afterLogin(); return; }
    const pEntry = Object.entries(db.parents||{}).find(([id,p])=>p.phone===username && p.childUsername===password);
    if(pEntry) { const child = Object.values(db.users||{}).find(u=>u.u===pEntry[1].childUsername); user = { uid:pEntry[0], r:'parent', ...pEntry[1], child: child||null }; afterLogin(); return; }
    toast('Sai tài khoản hoặc mật khẩu','error'); hideLoading();
};
function afterLogin() {
    hideLoading();
    if(isTeacher()){ show('pg-admin'); renderAdminMenu(); updateStats(); toast(`Chào mừng ${user.n}!`); }
    else if(user.r==='hv'){ document.getElementById('hv-info').innerText=user.n; show('pg-hv'); setActiveNav('home'); sv('home'); }
    else if(user.r==='parent'){ document.getElementById('parent-info').innerText=user.name||'Phụ huynh'; show('pg-parent'); parentDashboard('home'); }
}
window.showForgotPwd = ()=> toast('Liên hệ admin');
window.toggleTheme = ()=> { document.body.classList.toggle('dark'); localStorage.setItem('portal_theme', document.body.classList.contains('dark')?'dark':'light'); };
if(localStorage.getItem('portal_theme')==='dark') document.body.classList.add('dark');

// ========== MENU ADMIN ==========
function renderAdminMenu() {
    const d = document.getElementById('admin-menu');
    let h = `<div class="bento-card" onclick="window.op('2a')">📅 Xếp lịch học</div>`;
    h += `<div class="bento-card" onclick="window.op('2b')">📢 Thông báo</div>`;
    h += `<div class="bento-card" onclick="window.op('2c')">📝 Bài tập</div>`;
    h += `<div class="bento-card" onclick="window.op('2e')">👥 Học viên</div>`;
    h += `<div class="bento-card" onclick="window.op('2f')">📋 Kiểm tra/Thi</div>`;
    h += `<div class="bento-card" onclick="window.op('res')">📊 Kết quả</div>`;
    if(isMainAdmin()||(isSubAdmin()&&user.permissions&&user.permissions.includes('finance'))) h += `<div class="bento-card" onclick="window.op('2g')">💰 Học phí</div>`;
    if(isMainAdmin()) {
        h += `<div class="bento-card" onclick="window.op('admins')">👑 Quản trị viên</div>`;
        h += `<div class="bento-card" onclick="window.op('support')">🛠️ Hỗ trợ</div>`;
        h += `<div class="bento-card" onclick="window.op('audit')">📋 Lịch sử hoạt động</div>`;
        h += `<div class="bento-card" onclick="window.op('hard_questions')">📉 Câu hỏi hay sai</div>`;
    }
    if(isTeacher()) {
        h += `<div class="bento-card" onclick="window.op('teachers')">🍎 Giáo viên</div>`;
        h += `<div class="bento-card" onclick="window.op('parents')">👪 Phụ huynh</div>`;
        h += `<div class="bento-card" onclick="window.op('question_bank')">📚 Ngân hàng câu hỏi</div>`;
    }
    d.innerHTML = `<div class="card" style="margin-bottom:16px;">👋 Chào mừng ${user.n}!</div>` + h;
}

// ========== ROUTER ==========
window.op = async function(id) {
    if(!user||!isTeacher()){ locOut(); return; }
    if(isSubAdmin() && user.permissions && !user.permissions.includes(id)){ toast('Bạn không có quyền','error'); return; }
    show('pg-det');
    const c = document.getElementById('det-content');
    const renderers = {
        '2a':render2a,'2b':render2b,'2c':render2c,'2e':render2e,'2f':render2f,'2g':render2g,'res':renderRes,'admins':renderAdmins,'support':renderSupport,'teachers':renderTeachers,'parents':renderParents,'audit':renderAudit,'hard_questions':renderHardQuestions,'question_bank':renderQuestionBank
    };
    if(renderers[id]) renderers[id](c);
    else c.innerHTML = '<p>Tính năng đang phát triển</p>';
};

// ========== LỊCH HỌC (2a) ==========
function render2a(c) {
    console.log('render2a called');
    const days = ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'];
    const slots = db.sked?.slots || [];
    
    let html = `<h3>📅 Lịch học - ${db.sked.t||'Tuần mới'}</h3>
    <div class="card">
        <label>Tên tuần: <input id="weekName" value="${db.sked.t||''}"></label>
        <button onclick="window.saveWeekName()">💾 Lưu tên tuần</button>
        <hr>
        <label>Mở đăng ký: <input type="datetime-local" id="regOpen" value="${db.sked.regOpen||''}"></label>
        <label>Đóng đăng ký: <input type="datetime-local" id="regClose" value="${db.sked.regClose||''}"></label>
        <button onclick="window.saveRegTime()">💾 Lưu thời gian</button>
        <div style="margin-top:10px">
            <label style="display:flex; align-items:center; gap:10px">
                <span>🔛 Cho phép đăng ký:</span>
                <input type="checkbox" id="scheduleToggle" ${db.sked.isOpen ? 'checked' : ''} onchange="window.toggleScheduleOpen(this.checked)">
            </label>

// Lưu slot mới (phiên bản debug)
window.addSlotFromForm = async function() {
    console.log('addSlotFromForm called');
    try {
        const d = document.getElementById('newSlotDay')?.value;
        const ati = document.getElementById('newSlotTime')?.value?.trim();
        const n = document.getElementById('newSlotSubject')?.value?.trim();
        const c = parseInt(document.getElementById('newSlotCapacity')?.value) || 10;
        const online = document.getElementById('newSlotType')?.value === 'online';
        const room = online ? '' : document.getElementById('newSlotRoom')?.value?.trim();
        const url = online ? document.getElementById('newSlotUrl')?.value?.trim() : '';

        console.log({d, ati, n, c, online, room, url});

        if (!ati || !n) {
            toast('Vui lòng nhập đầy đủ: Giờ học và Môn học', 'error');
            return;
        }
        if (online && !url) {
            toast('Vui lòng nhập Link học online', 'error');
            return;
        }
        if (!online && !room) {
            toast('Vui lòng nhập Phòng học', 'error');
            return;
        }

        // 👉 Đảm bảo db.sked.slots luôn là mảng
        if (!db.sked) db.sked = {};
        if (!db.sked.slots) db.sked.slots = [];

        db.sked.slots.push({ n, d, ati, c, online, room, url, r: [] });
        console.log('Current slots:', db.sked.slots);
        
        await saveDB();
        console.log('saveDB successful');
        toast('✅ Đã thêm tiết học thành công!');
        document.getElementById('addSlotFormContainer').style.display = 'none';
        op('2a');
    } catch(e) {
        console.error('Error in addSlotFromForm:', e);
        toast('Lỗi khi lưu: ' + e.message, 'error');
    }
};

window.renderNotifList = function(filter) {
    const container = document.getElementById('notifList');
    let all = [...(db.notif_history||[])];
    if(db.private_notif) Object.values(db.private_notif).forEach(arr=>{ if(Array.isArray(arr)) all=all.concat(arr); });
    let list = all;
    if(filter==='public') list=all.filter(n=>!n.target);
    else if(filter==='private') list=all.filter(n=>n.target);
    list.sort((a,b)=>new Date(b.date)-new Date(a.date));
    container.innerHTML = list.map(n=>`<div class="card"><small>${n.date} ${n.target?'(Riêng: '+n.target+')':'(Chung)'}</small><div>${n.msg}</div><button class="ghost" onclick="window.editNotif('${n.id}')">✏️</button> <button class="danger" onclick="window.deleteNotif('${n.id}')">🗑️</button></div>`).join('');
};
window.editNotif = async (id)=>{
    let n = (db.notif_history||[]).find(x=>x.id===id);
    if(!n) for(let k in db.private_notif){ n=(db.private_notif[k]||[]).find(x=>x.id===id); if(n) break; }
    if(!n) return;
    const newMsg = prompt("Sửa:", n.msg); if(newMsg){ n.msg=newMsg; await saveDB(); window.renderNotifList('all'); }
};
window.deleteNotif = async (id)=>{
    let idx = (db.notif_history||[]).findIndex(x=>x.id===id);
    if(idx>-1){ db.notif_history.splice(idx,1); await saveDB(); op('2b'); return; }
    for(let k in db.private_notif){ const arr=db.private_notif[k]||[]; idx=arr.findIndex(x=>x.id===id); if(idx>-1){ arr.splice(idx,1); await saveDB(); op('2b'); return; } }
};

window.importWordToQuestions = function(type) {
    const inputId = type==='hw'?'importWord':'importWordExam';

    const reader = new FileReader();
    reader.onload = function(e) {
        mammoth.extractRawText({arrayBuffer:e.target.result}).then(result=>{
            const lines = result.value.split('\n').filter(l=>l.trim());
            const container = document.getElementById(type==='hw'?'hw-questions-container':'exam-questions-container');
            lines.forEach(line=>{
                const block=document.createElement('div'); block.className='question-block';
                if(line.includes('|')){
                    const parts=line.split('|').map(s=>s.trim());
                    block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                      <input class="q-text" value="${parts[0]||''}"><div class="mcq-options"><input class="opt-a" value="${parts[1]||''}"><input class="opt-b" value="${parts[2]||''}"><input class="opt-c" value="${parts[3]||''}"><input class="opt-d" value="${parts[4]||''}"></div>
                      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><span>Đáp án đúng:</span><select class="q-ans" style="width:auto;padding:8px 12px;"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
                      <input type="number" class="q-point" value="${parts[5]||1}">`;
                } else {
                    block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button><input class="q-text" value="${line}"><textarea class="essay-answer" disabled></textarea><input type="number" class="q-point" value="1">`;
                }
                container.appendChild(block);
            });
            toast('Đã import câu hỏi từ Word');
        }).catch(err=>toast('Lỗi import Word: '+err.message,'error'));
    };
    reader.readAsArrayBuffer(file);
};

window.tglReg = async function(i){
    const s=db.sked.slots[i]; if(!s.r) s.r=[];

    else {

    startTime=new Date(); currentWorkType='hw'; currentWorkName=h.n;
    let html=`<h3>${h.n}</h3>`; if(h.time){ examEndTime=new Date(startTime.getTime()+h.time*60000); clearInterval(examTimer); examTimer=setInterval(()=>{ const diff=examEndTime-new Date(); if(diff<=0){ clearInterval(examTimer); window.sub('hw',h.n); } const min=Math.floor(diff/60000),sec=Math.floor((diff%60000)/1000); const el=document.getElementById('hwTimer'); if(el) el.innerText=`${min}:${sec.toString().padStart(2,'0')}`; },1000); html+=`<div class="timer" id="hwTimer"></div>`; }
    h.questions.forEach((q,qi)=>{ if(q.type==='mcq'){ html+=`<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><label><input type="radio" name="q${qi}" value="A"> A. ${q.a}</label><br><label><input type="radio" name="q${qi}" value="B"> B. ${q.b}</label><br><label><input type="radio" name="q${qi}" value="C"> C. ${q.c}</label><br><label><input type="radio" name="q${qi}" value="D"> D. ${q.d}</label></div>`; } else { html+=`<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><textarea id="essay${qi}" placeholder="Trả lời..."></textarea></div>`; } });
    html+=`<button onclick="window.sub('hw','${h.n}')">NỘP BÀI</button>`; document.getElementById('hv-main').innerHTML=html;
};
window.stX = function(i){
    const assignedExams=(db.exams||[]).filter(x=>x.assignedTo&&x.assignedTo.includes(user.uid)&&x.st=='1'); const x=assignedExams[i]; if(!x) return;
    const p=prompt("Mật khẩu đề thi:"); if(p!==x.p){ toast('Sai mật khẩu','error'); return; }
    const submitted=(db.submissions||[]).filter(s=>s.u===user.uid&&s.n===x.n).length; if(x.slot&&submitted>=parseInt(x.slot)){ toast('Hết lượt','error'); return; }
    startTime=new Date(); currentWorkType='exam'; currentWorkName=x.n; isTakingExam=true; activateAntiCheat();
    let html=`<h3>${x.n}</h3><div class="cheat-warning" id="cheatWarning" style="display:none"></div>`; if(x.time){ examEndTime=new Date(startTime.getTime()+x.time*60000); clearInterval(examTimer); examTimer=setInterval(()=>{ const diff=examEndTime-new Date(); if(diff<=0){ clearInterval(examTimer); window.sub('exam',x.n); } const min=Math.floor(diff/60000),sec=Math.floor((diff%60000)/1000); const el=document.getElementById('examTimer'); if(el) el.innerText=`${min}:${sec.toString().padStart(2,'0')}`; },1000); html+=`<div class="timer" id="examTimer"></div>`; }
    x.questions.forEach((q,qi)=>{ if(q.type==='mcq'){ html+=`<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><label><input type="radio" name="q${qi}" value="A"> A. ${q.a}</label><br><label><input type="radio" name="q${qi}" value="B"> B. ${q.b}</label><br><label><input type="radio" name="q${qi}" value="C"> C. ${q.c}</label><br><label><input type="radio" name="q${qi}" value="D"> D. ${q.d}</label></div>`; } else { html+=`<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}<br><textarea id="essay${qi}" placeholder="Trả lời..."></textarea></div>`; } });
    html+=`<button onclick="window.sub('exam','${x.n}')">NỘP BÀI</button>`; document.getElementById('hv-main').innerHTML=html;
};
window.sub = async function(type, name){
    const work = type==='hw'? (db.hw_list||[]).find(h=>h.assignedTo&&h.assignedTo.includes(user.uid)&&h.n===name) : (db.exams||[]).find(x=>x.assignedTo&&x.assignedTo.includes(user.uid)&&x.n===name);
    if(!work) return;
    let answers=[];
    work.questions.forEach((q,qi)=>{
        if(q.type==='mcq'){ const selected=document.querySelector(`input[name="q${qi}"]:checked`); answers.push({ q:q.q, selected:selected?selected.value:'', correct:q.ans, point:q.point||1 }); }
        else { answers.push({ q:q.q, ans:document.getElementById(`essay${qi}`)?.value||'', point:q.point||1 }); }
    });
    const diff=Math.floor((new Date()-startTime)/1000), dur=Math.floor(diff/60)+"p "+(diff%60)+"s";
    const sub = { u:user.uid, type, n:name, date:new Date().toLocaleString(), dur, answers };
    if(type==='exam'){ const mcq=answers.filter(a=>a.selected!==undefined); sub.score=`${mcq.filter(a=>a.selected===a.correct).length}/${mcq.length}`; isTakingExam=false; deactivateAntiCheat(); }
    db.submissions.push(sub); updateQuestionStats(work, answers); clearInterval(examTimer);
    await saveDB(); toast('Nộp bài thành công!'); sv(type==='hw'?'2c':'2f');
};
function updateQuestionStats(work, answers) {
    if(!db.question_stats) db.question_stats={};
    work.questions.forEach((q,qi)=>{ if(q.type==='mcq'){ const id=q.q.substring(0,50); if(!db.question_stats[id]) db.question_stats[id]={total:0,wrong:0,q:q.q}; db.question_stats[id].total++; if(answers[qi]?.selected && answers[qi].selected!==q.ans) db.question_stats[id].wrong++; } });
}
window.previewWork = function(type, index) {
    const work = type==='hw'? db.hw_list[index] : db.exams[index];
    if(!work) return;
    let html = `<h3>👁 Xem trước: ${work.n}</h3>`;
    work.questions.forEach((q,qi)=>{
        if(q.type==='mcq') html += `<div class="card"><b>Câu ${qi+1}:</b> ${q.q}<br>A. ${q.a} | B. ${q.b} | C. ${q.c} | D. ${q.d}<br><small>Đáp án đúng: ${q.ans||'Chưa có'}</small></div>`;
        else html += `<div class="card"><b>Câu ${qi+1}:</b> ${q.q}<br><textarea disabled placeholder="Học viên sẽ trả lời ở đây"></textarea></div>`;
    });
    html += `<button onclick="window.op('${type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
};
window.viewSubmission = (name, date) => {
    const subs = db.submissions || [];
    const sub = subs.find(s=>s.u===user.uid && s.n===name && s.date===date);
    if(!sub){ toast('Không tìm thấy bài làm','error'); return; }
    const work = sub.type==='hw'? db.hw_list.find(h=>h.n===sub.n) : db.exams.find(x=>x.n===sub.n);
    if(!work){ toast('Bài tập/thi không còn tồn tại','error'); return; }
    let html = `<h3>Bài làm: ${sub.n}</h3><p>Ngày nộp: ${sub.date} (${sub.dur})</p>`;
    sub.answers.forEach((a,i)=>{
        if(a.selected!==undefined){
            const correctClass = a.selected===a.correct ? 'color:var(--success)' : 'color:var(--danger)';
            html += `<div class="card"><b>Câu ${i+1}:</b> ${a.q}<br>Bạn chọn: ${a.selected||'Chưa chọn'} | Đúng: ${a.correct} <span style="${correctClass}">${a.selected===a.correct?'✅':'❌'}</span></div>`;
        } else {
            html += `<div class="card"><b>Câu ${i+1}:</b> ${a.q}<br><b>Trả lời:</b> ${a.ans||'Không trả lời'}</div>`;
        }
    });
    if(sub.score) html += `<div class="card"><b>Điểm: ${sub.score}</b></div>`;
    html += `<button onclick="window.sv('${sub.type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('hv-main').innerHTML = html;
};

// ========== CHẤM TỰ LUẬN ==========
window.currentSubType = 'hw';
window.subFilterStudent = null;
window.renderSubs = function(type) {
    window.currentSubType = type;
    let allSubs = db.submissions||[];
    if(window.subFilterStudent) allSubs = allSubs.filter(s=>s.u===window.subFilterStudent);
    const subs = allSubs.filter(s=>s.type===type);
    const students = Object.entries(db.users||{}).filter(([uid, u]) => u.r === 'hv');
    let html = `<h3>📋 Danh sách bài nộp (${type==='hw'?'Bài tập':'Đề thi'})</h3>
      <div class="card"><select id="subFilterStudentSel" onchange="window.filterSubs(this.value)"><option value="">Tất cả học viên</option>${students.map(([uid, u]) => `<option value="${uid}" ${window.subFilterStudent===uid?'selected':''}>${u.n}</option>`).join('')}</select></div>`;
    if(subs.length===0) html+='<p>Chưa có bài nộp.</p>';
    else subs.forEach((s,idx)=>{ const student=db.users[s.u]; const name=student?student.n:'Không rõ'; html+=`<div class="card"><b>${s.n}</b> – ${name} – ${s.date} (⏱ ${s.dur||'N/A'}) ${s.score!==undefined?'- Điểm: '+s.score:''} <button onclick="window.gradeSubmission(${idx})">📝 Chấm</button></div>`; });
    html+=`<br><button class="ghost" onclick="window.op('${type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
};
window.filterSubs = function(uid) { window.subFilterStudent = uid||null; window.renderSubs(window.currentSubType); };
window.gradeSubmission = function(subIndex) {
    const sub = db.submissions[subIndex]; if(!sub) return;
    let html = `<h3>Chấm bài: ${sub.n} (${sub.u})</h3>`;
    sub.answers.forEach((a,i)=>{
        if(a.selected!==undefined) html += `<div class="card">Câu ${i+1} (trắc nghiệm): ${a.q}<br>Chọn: ${a.selected} | Đúng: ${a.correct} | Điểm: ${a.selected===a.correct?a.point:0}</div>`;
        else html += `<div class="card">Câu ${i+1} (tự luận): ${a.q}<br>Trả lời: <textarea disabled>${a.ans||''}</textarea><br>Điểm: <input type="number" id="score${i}" value="${a.userScore||''}" max="${a.point}" step="0.5"> /${a.point}</div>`;
    });
    html += `<button onclick="window.saveGrade(${subIndex})">Lưu điểm</button> <button onclick="window.renderSubs('${sub.type}')">Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
};
window.saveGrade = async function(subIndex) {
    const sub = db.submissions[subIndex]; let essayTotal=0;
    sub.answers.forEach((a,i)=>{ if(a.selected===undefined){ const score=parseFloat(document.getElementById(`score${i}`).value)||0; a.userScore=score; essayTotal+=score; } });
    const mcqTotal = sub.answers.filter(a=>a.selected!==undefined).reduce((sum,a)=>sum+(a.selected===a.correct?a.point:0),0);
    sub.totalScore = mcqTotal+essayTotal; sub.essayScored=true;
    await saveDB(); toast('Đã lưu điểm'); window.renderSubs(sub.type);
};

// ========== PHỤ HUYNH ==========
window.parentDashboard = function(id) {
    if(!user||user.r!=='parent'){ locOut(); return; }
    const m=document.getElementById('parent-main'); const child=Object.values(db.users||{}).find(u=>u.u===user.childUsername);
    if(!child){ m.innerHTML='<p>Không tìm thấy học viên liên kết.</p>'; return; }
    const cData=db.data[child.uid]||{};
    if(id==='home') m.innerHTML=`<h3>👪 Trang chủ</h3>`+(user.notif||[]).slice(0,5).map(n=>`<div class="card"><small>${n.date}</small><br>${n.msg}</div>`).join('')||'<p>Không có thông báo.</p>';
    else if(id==='results') m.innerHTML=`<h3>📊 Kết quả của ${child.n}</h3><h5>Tích lũy</h5><table>${(cData.pts_tl||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table><h5>Kiểm tra/Thi</h5><table>${(cData.pts_kt||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table>`;
    else if(id==='fee'){ const f=cData.fee||{slots:0,rate:0,paid:0}; m.innerHTML=`<h3>💰 Học phí ${child.n}</h3><div class="card">Nợ: ${(f.slots*f.rate-f.paid).toLocaleString()}đ</div>`; }
};

// ========== ANTI-CHEAT ==========
function activateAntiCheat(){ cheatCount=0; document.addEventListener('visibilitychange',handleVisibilityChange); window.addEventListener('blur',handleWindowBlur); }
function deactivateAntiCheat(){ document.removeEventListener('visibilitychange',handleVisibilityChange); window.removeEventListener('blur',handleWindowBlur); }
function handleVisibilityChange(){ if(document.hidden&&isTakingExam){ cheatCount++; if(cheatCount>=MAX_CHEATS){ toast('Quá số lần rời màn hình, bài thi tự nộp','error'); window.sub('exam',currentWorkName); } } }
function handleWindowBlur(){ if(isTakingExam){ cheatCount++; if(cheatCount>=MAX_CHEATS){ window.sub('exam',currentWorkName); } } }

// ========== AVATAR & TOGGLE PASSWORD ==========
window.showAvatarPicker = ()=>{ const m=document.getElementById('hv-main'); m.innerHTML=`<h3>Chọn avatar</h3><div class="avatar-grid">${avatarIcons.map(ic=>`<div class="avatar-option ${user.avatar===ic?'selected':''}" onclick="window.setAvatar('${ic}')">${ic}</div>`).join('')}</div><button onclick="window.sv('profile')">← Quay lại</button>`; };
window.setAvatar = async (icon)=>{ user.avatar=icon; if(user.r==='hv') db.users[user.uid].avatar=icon; else if(user.r==='parent') db.parents[user.uid].avatar=icon; await saveDB(); sv('profile'); };
window.togglePassword = (e)=>{ const pw=document.getElementById('p'); const icon=document.getElementById('eyeIcon'); if(pw.type==='password'){ pw.type='text'; icon.textContent='🙈'; } else { pw.type='password'; icon.textContent='👁️'; } };

// ========== DELETE CONFIRM ==========
window.confirmDeleteStudent = (uid)=>modal(`Xóa học viên ${db.users[uid]?.n}?`,()=>window.deleteStudent(uid));
window.confirmDeleteTeacher = (uid)=>modal(`Xóa giáo viên ${db.users[uid]?.n}?`,()=>window.deleteUser(uid));
window.confirmDeleteUser = (uid)=>modal(`Xóa người dùng ${db.users[uid]?.n}?`,()=>window.deleteUser(uid));
window.confirmDeleteParent = (pid)=>modal(`Xóa phụ huynh ${db.parents[pid]?.name}?`,()=>window.deleteParent(pid));
window.deleteParent = async (pid)=>{ if(!db.parents||!db.parents[pid]) return; const t=db.parents[pid]; delete db.parents[pid]; await saveDB(); toast('Đã xóa phụ huynh'); if(document.getElementById('det-content').innerHTML.includes('Phụ huynh')) op('parents'); };

// ========== ĐIỂM SỐ ==========
window.edScr = function(uid) {
    show('pg-det'); // bắt buộc phải có dòng này
    const d = db.data[uid] || (db.data[uid] = {});
    if (!d.pts_tl) d.pts_tl = [];
    if (!d.pts_kt) d.pts_kt = [];
    const row = (p, i, t) => `<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td><td><button class="danger" onclick="window.deletePoint('${uid}','${t}',${i})">X</button></td></tr>`;
    document.getElementById('det-content').innerHTML = `
        <h4>Điểm: ${db.users[uid]?.n || uid}</h4>
        <div class="card">
          <input id="p_n" placeholder="Tên bài"><input id="p_s" placeholder="Điểm"><input id="p_cm" placeholder="Nhận xét">
          <select id="p_t"><option value="tl">Tích lũy</option><option value="kt">Kiểm tra/Thi</option></select>
          <button onclick="window.adPt('${uid}')">THÊM</button>
        </div>
        <table>${d.pts_tl.map((p, i) => row(p, i, 'tl')).join('')}${d.pts_kt.map((p, i) => row(p, i, 'kt')).join('')}</table>`;
};

window.adPt = async function(uid) {
    const t = document.getElementById('p_t').value;
    const item = { n: document.getElementById('p_n').value, s: document.getElementById('p_s').value, cm: document.getElementById('p_cm').value };
    if (t === 'tl') db.data[uid].pts_tl.push(item);
    else db.data[uid].pts_kt.push(item);
    await saveDB(); window.edScr(uid);
};

window.deletePoint = async function(uid, t, i) {
    if (t === 'tl') db.data[uid].pts_tl.splice(i, 1);
    else db.data[uid].pts_kt.splice(i, 1);
    await saveDB(); window.edScr(uid);
};

// ========== TÀI CHÍNH (Admin) ==========
window.edFee = function(uid) {
    show('pg-det'); // bắt buộc phải có dòng này
    let d = db.data[uid] || (db.data[uid] = {});
    if (!d.fee) d.fee = { slots: 0, rate: 0, paid: 0, logs: [], receipts: [] };
    const bi = db.bank_info || {};
    document.getElementById('det-content').innerHTML = `
        <h4>💰 Học phí: ${db.users[uid]?.n || uid}</h4>
        <div class="card">
          <label>Số tiết: <input id="f_s" type="number" value="${d.fee.slots}"></label>
          <label>Đơn giá: <input id="f_r" type="number" value="${d.fee.rate}"></label>
          <label>Nộp thêm: <input id="f_a" type="number" value="0"></label>
          <button onclick="window.svFee('${uid}')">💾 LƯU</button>
        </div>
        <div class="card">💰 Nợ: <b>${(d.fee.slots * d.fee.rate - d.fee.paid).toLocaleString()}đ</b></div>
        <div class="card">
          <h5>🏦 Thông tin ngân hàng</h5>
          <input id="bankName" placeholder="Tên ngân hàng" value="${bi.bankName||''}">
          <input id="bankNumber" placeholder="Số tài khoản" value="${bi.accountNumber||''}">
          <label>Mã QR (URL hoặc upload):</label>
          <input id="qrCodeInput" value="${bi.qrCode||''}">
          <input type="file" id="qrFile" accept="image/*">
          <button onclick="window.saveBankInfo()">💾 Lưu thông tin chung</button>
        </div>
        <div class="card">
          <h5>📎 Danh sách biên lai chờ duyệt</h5>
          ${(d.fee.receipts || []).map((r, i) => `<div style="margin-bottom:10px"><b>${r.date}</b> - ${r.amount}đ - ${r.note} (${r.method||'CK'})<br>${r.imageUrl ? `<img src="${r.imageUrl}" style="max-width:100px; border-radius:8px;">` : (r.image ? `<img src="${r.image}" style="max-width:100px; border-radius:8px;">` : '')}
            <button onclick="window.approveReceipt('${uid}',${i})">✅ Duyệt</button>
            <button class="danger" onclick="window.rejectReceipt('${uid}',${i})">❌ Từ chối</button></div>`).join('') || '<p>Không có biên lai nào.</p>'}
        </div>
        <hr><h5>Lịch sử thanh toán</h5>${(d.fee.logs || []).map(l => `<div>${l}</div>`).join('')}`;
};

window.saveBankInfo = async function() {
    const bankName = document.getElementById('bankName').value;
    const accountNumber = document.getElementById('bankNumber').value;
    const qrCodeInput = document.getElementById('qrCodeInput').value;
    const qrFile = document.getElementById('qrFile').files[0];
    let qrUrl = qrCodeInput;
    if (qrFile) {
        showLoading();
        const storageRef = fbStorage.ref('bank_qr/' + Date.now() + '_' + qrFile.name);
        try {
            const uploadTask = await storageRef.put(qrFile);
            qrUrl = await uploadTask.ref.getDownloadURL();
        } catch(e) { toast('Lỗi upload QR','error'); hideLoading(); return; }
        hideLoading();
    }
    db.bank_info = { bankName, accountNumber, qrCode: qrUrl };
    await saveDB(); toast('Đã lưu thông tin ngân hàng'); op('2g');
};

window.approveReceipt = async function(uid, i) {
    const r = db.data[uid].fee.receipts[i];
    db.data[uid].fee.paid += r.amount;
    db.data[uid].fee.logs.unshift(`✅ ${r.date}: +${r.amount}đ (${r.note})`);
    db.data[uid].fee.receipts.splice(i, 1);
    await saveDB(); window.edFee(uid);
};

window.rejectReceipt = async function(uid, i) {
    db.data[uid].fee.receipts.splice(i, 1);
    await saveDB(); window.edFee(uid);
};

window.svFee = async function(uid) {
    let d = db.data[uid].fee;
    const a = parseInt(document.getElementById('f_a').value) || 0;
    d.slots = parseInt(document.getElementById('f_s').value) || 0;
    d.rate = parseInt(document.getElementById('f_r').value) || 0;
    if (a > 0) { d.paid += a; d.logs.unshift(new Date().toLocaleDateString() + ": +" + a); }
    await saveDB(); op('2g');
};
// ========== KHỞI ĐỘNG ==========
(async function init(){
    await loadDB();
    updateStats();
})();
</script>

<!-- Chatbot (có thể bỏ) -->
<div id="chatbot-toggle" style="position:fixed; bottom:80px; right:20px; width:50px; height:50px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1000; font-size:24px;" onclick="toggleChat()">💬</div>
<div id="chatbot-window" class="hidden" style="position:fixed; bottom:140px; right:20px; width:300px; height:400px; background:var(--surface); border:1px solid var(--border); border-radius:20px; box-shadow:var(--shadow-lg); z-index:1000; display:flex; flex-direction:column;">
  <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;"><b>🤖 Trợ lý ảo</b><button class="ghost" onclick="toggleChat()">✕</button></div>
  <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
  <div style="padding:10px; border-top:1px solid var(--border); display:flex;"><input id="chat-input" placeholder="Nhập câu hỏi..." style="flex:1;"><button onclick="sendChat()">▶</button></div>
</div>
<script>
let chatVisible = false;
window.toggleChat = ()=>{ chatVisible=!chatVisible; document.getElementById('chatbot-window').classList.toggle('hidden',!chatVisible); };
window.sendChat = async ()=>{
    const input=document.getElementById('chat-input'); const msg=input.value.trim(); if(!msg) return;
    const messages=document.getElementById('chat-messages'); messages.innerHTML+=`<div><b>Bạn:</b> ${msg}</div>`; input.value='';
    try {
        const API_KEY='YOUR_GEMINI_API_KEY';
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:"Bạn là trợ lý PORTAL NOW. Học viên hỏi: "+msg}]}]})});
        const data=await res.json(); const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Xin lỗi, tôi chưa hiểu.';
        messages.innerHTML+=`<div style="color:var(--accent)"><b>AI:</b> ${reply}</div>`;
    } catch(e){ messages.innerHTML+=`<div style="color:var(--danger)">Lỗi kết nối AI.</div>`; }
    messages.scrollTop=messages.scrollHeight;
};
</script>
