    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
        --font: 'Inter', sans-serif;
        --primary: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
        --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        --bg: #f8fafc; --surface: #ffffff; --surface-alt: #f1f5f9;
        --text: #0f172a; --text-secondary: #475569; --border: #e2e8f0;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 12px rgba(0,0,0,0.06);
        --shadow-lg: 0 20px 40px rgba(0,0,0,0.12); --radius: 20px; --radius-sm: 14px;
        --transition: 0.25s cubic-bezier(0.2, 0.0, 0, 1.0); --bottom-nav-height: 70px;
    }
    .dark {
        --primary: #0f172a; --bg: #0b1120; --surface: #1e293b; --surface-alt: #334155;
        --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
    }
    body {
        font-family: var(--font); background: var(--bg); color: var(--text);
        line-height: 1.5; min-height: 100vh; overflow-x: hidden; max-width: 100vw;
        overscroll-behavior: none; touch-action: manipulation;
        -webkit-overflow-scrolling: touch;
    }
    .hidden { display: none !important; }
    .toast-container { position: fixed; top: 24px; right: 24px; z-index: 99999; }
    .toast { background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 40px; box-shadow: var(--shadow-lg); font-weight: 500; font-size: 15px; color: var(--text); margin-bottom: 8px; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 99998; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: var(--surface); border-radius: var(--radius); padding: 30px; max-width: 420px; width: 90%; box-shadow: var(--shadow-lg); text-align: center; }
    .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin: 20px 0; }
    .bento-card { background: var(--surface); border-radius: var(--radius); padding: 24px 18px; box-shadow: var(--shadow); text-align: center; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
    .bento-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
    .bento-card.selected { background: #d1fae5; border-color: var(--success); }
    button { 
        background: var(--accent); color: white; border: none; padding: 12px 24px; 
        border-radius: 40px; font-weight: 600; font-family: var(--font); 
        cursor: pointer; -webkit-tap-highlight-color: transparent;
        touch-action: manipulation; position: relative; z-index: 10;
        -webkit-appearance: none; -moz-appearance: none; appearance: none;
        outline: none; -webkit-user-select: none; user-select: none;
        min-height: 44px; min-width: 44px;
    }
    button:hover { background: var(--accent-hover); }
    button.danger { background: var(--danger); z-index: 10; }
    button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    button:active { opacity: 0.7; transform: scale(0.97); }
    input, textarea, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 40px; font-family: var(--font); font-size: 15px; background: var(--surface); color: var(--text); margin: 6px 0; -webkit-appearance: none; }
    .header { background: var(--surface); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
    .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px 20px; box-sizing: border-box; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); width: 100%; word-wrap: break-word; box-sizing: border-box; max-width: 100%; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height); background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 8px 16px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .nav-item.active { color: var(--accent); font-weight: 600; }
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--surface-alt); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; border: 3px solid var(--accent); cursor: pointer; }
    .profile-menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; }
    .logout-btn { background: var(--danger); color: white; text-align: center; padding: 16px; border-radius: 40px; font-weight: 700; margin-top: 20px; cursor: pointer; }
    .question-block { background: var(--surface-alt); border-radius: var(--radius-sm); padding: 15px; margin-bottom: 15px; position: relative; }
    .question-block .remove-question { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; z-index: 10; }
    .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
    .avatar-option { font-size: 30px; padding: 10px; text-align: center; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
    .avatar-option.selected { border-color: var(--accent); background: var(--surface-alt); }
    .cheat-warning { background: var(--danger); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 10px; }
    .timer { font-size: 2rem; font-weight: 700; text-align: center; padding: 10px; background: var(--surface-alt); border-radius: 40px; margin: 10px 0; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 99999; display: flex; align-items: center; justify-content: center; }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--surface-alt); border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge { background: var(--danger); color: white; border-radius: 20px; padding: 2px 8px; font-size: 12px; margin-left: 6px; }
    .schedule-slot { display: flex; justify-content: space-between; align-items: center; background: var(--surface-alt); border-radius: var(--radius-sm); padding: 12px; margin: 8px 0; }
    .schedule-slot .slot-info { font-size: 14px; }
    .schedule-slot button { font-size: 13px; padding: 6px 12px; z-index: 10; }
    .notif-editor-toolbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; align-items: center; }
    .notif-editor-toolbar button, .notif-editor-toolbar select, .notif-editor-toolbar input { width: auto; padding: 6px 10px; font-size: 14px; }
    .notif-editor { min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; background: var(--surface); }
    @media (max-width: 640px) {
        .bento-grid { grid-template-columns: repeat(2, 1fr); }
        button { padding: 14px 20px; font-size: 15px; min-height: 48px; }
    }
    
    /* FIX TOUCH EVENTS */
button, .bento-card, .nav-item, .profile-menu-item {
    cursor: pointer;
    pointer-events: auto !important;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 10;
}
button:active, .bento-card:active, .nav-item:active {
    opacity: 0.7;
    transform: scale(0.97);
}
.card button, .card .danger, .card .ghost {
    pointer-events: auto !important;
    z-index: 50 !important;
    position: relative !important;
    overflow: visible !important;
    min-height: 48px;
}
.bottom-nav {
    z-index: 9999 !important;
    pointer-events: auto !important;
}
.nav-item {
    z-index: 10000 !important;
    min-width: 60px;
    min-height: 50px;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    pointer-events: auto !important;
}
#hv-main {
    padding-bottom: 90px; /* đảm bảo không bị bottom-nav che */
}
</style>
</head>

<script>
// ========== SERVER TIME ==========
async function getServerTime() {
    try {
        const snap = await fbDB.ref('.info/serverTimeOffset').once('value');
        const offset = snap.val() || 0;
        return new Date(Date.now() + offset);
    } catch (e) {
        console.warn('Không lấy được server time, dùng giờ máy');
        return new Date();
    }
}

// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
    apiKey: "AIzaSyCcMieJE1oiohUh79DHVqZFkjTwSAF4Fws",
    authDomain: "portalnowpn.firebaseapp.com",
    databaseURL: "https://portalnowpn-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "portalnowpn",
    storageBucket: "portalnowpn.firebasestorage.app",
    messagingSenderId: "343490919452",
    appId: "1:343490919452:web:1bb511a68070c06dd3b3d9"
};
firebase.initializeApp(firebaseConfig);
const fbDB = firebase.database();
const fbAuth = firebase.auth();
const fbStorage = firebase.storage();

// ========== FLASHCARD DATA ==========
const HSK_VOCAB = [];
let currentFlashcardIndex = 0;
let isFlipped = false;

// ========== FCM PUSH NOTIFICATIONS ==========
let messaging = null;
if (firebase.messaging && firebase.messaging.isSupported()) {
    try {
        messaging = firebase.messaging();
        messaging.usePublicVapidKey('BOGXq9J2Vxnh-3qN7Y6YlBrmWsd2XPFVLZPW5VPMhMRnAJyAf4AMHXNfGPfKnGSVZgSMhbY5MK4N5PTHJH8kS4o');
        
        messaging.onMessage((payload) => {
            const notificationTitle = payload.notification.title;
            const notificationOptions = { body: payload.notification.body, icon: '/icon.png' };
            if (Notification.permission === 'granted') {
                new Notification(notificationTitle, notificationOptions);
            }
            playNotificationSound();
        });
    } catch (e) { console.log('FCM not supported'); }
}

async function requestFcmTokenForUser(uid) {
    if (!messaging || !uid) return;
    try {
        const currentToken = await messaging.getToken({ vapidKey: 'BOGXq9J2Vxnh-3qN7Y6YlBrmWsd2XPFVLZPW5VPMhMRnAJyAf4AMHXNfGPfKnGSVZgSMhbY5MK4N5PTHJH8kS4o' });
        if (currentToken) {
            if (!db.fcm_tokens) db.fcm_tokens = {};
            db.fcm_tokens[uid] = { token: currentToken, updatedAt: new Date().toISOString() };
            await saveDB('fcm_tokens', db.fcm_tokens);
        }
    } catch (err) { console.log('FCM token error:', err); }
}

// ========== GLOBAL STATE ==========
let db = {};
let user = null;
let isTakingExam = false;
let examTimer = null;
let examEndTime = null;
let currentWorkType = null;
let currentWorkName = null;
let startTime = null;
let cheatCount = 0;
const MAX_CHEATS = 3;
const avatarIcons = ['👤','😺','🐶','🦊','🐨','🐼','🐸','🐵','🦁','🐯','🐮','🐷','🐭','🐰','🐔'];
const realtimeRefs = {};

// ========== UTILS ==========
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function modal(msg, onConfirm, onCancel) {
    const container = document.getElementById('modal-container');
    container.innerHTML = '';
    
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    
    const box = document.createElement('div');
    box.className = 'modal-box';
    
    const p = document.createElement('p');
    p.innerHTML = msg;
    
    const btnConfirm = document.createElement('button');
    btnConfirm.id = 'modal-confirm';
    btnConfirm.className = 'danger';
    btnConfirm.textContent = 'Xác nhận';
    btnConfirm.style.marginRight = '10px';
    btnConfirm.onclick = () => {
        container.innerHTML = '';
        if (onConfirm) onConfirm();
    };
    
    const btnCancel = document.createElement('button');
    btnCancel.id = 'modal-cancel';
    btnCancel.className = 'ghost';
    btnCancel.textContent = 'Hủy';
    btnCancel.onclick = () => {
        container.innerHTML = '';
        if (onCancel) onCancel();
    };
    
    box.appendChild(p);
    box.appendChild(btnConfirm);
    box.appendChild(btnCancel);
    overlay.appendChild(box);
    container.appendChild(overlay);
}

function showLoading() { document.getElementById('loadingSpinner').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loadingSpinner').classList.add('hidden'); }

// ========== DATABASE HELPERS (OPTIMIZED) ==========
async function loadDB() {
    showLoading();
    try {
        const [usersSnap, configSnap, skedSnap] = await Promise.all([
            fbDB.ref('users').once('value'),
            fbDB.ref('config').once('value'),
            fbDB.ref('sked').once('value')
        ]);
        db.users = usersSnap.val() || {};
        db.config = configSnap.val() || { adminPinHash: CryptoJS.SHA256("1234").toString(), subAdminPinHash: CryptoJS.SHA256("5678").toString() };
        let skedData = skedSnap.val() || {};
db.sked = {
    t: skedData.t || "Tuần mới",
    slots: Array.isArray(skedData.slots) ? skedData.slots : Object.values(skedData.slots || {}),
    isOpen: skedData.isOpen !== undefined ? skedData.isOpen : true,
    regOpen: skedData.regOpen || '',
    regClose: skedData.regClose || ''
};
    } catch (e) { toast('Không thể tải dữ liệu cốt lõi', 'error'); }
    initDB();

    hideLoading();
    updateStats();
}

function initDB() {
    const schema = {
        users: {}, parents: {},
        sked: { t: "Tuần mới", slots: [], isOpen: true, regOpen: '', regClose: '' },
        exams: [], hw_list: [], submissions: [],
        data: {}, notif_history: [], private_notif: {}, forgot_pwd: [],
        bank_info: {}, sked_history: [], vouchers: [], voucher_history: [], custom_flashcards: [],
        question_bank: { subjects: {} }, audit_log: [],
        config: { adminPinHash: CryptoJS.SHA256("1234").toString(), subAdminPinHash: CryptoJS.SHA256("5678").toString() },
        question_stats: {}, fcm_tokens: {}
    };
    Object.keys(schema).forEach(k => { if (!db[k]) db[k] = schema[k]; });
    if (!db.users || Object.keys(db.users).length === 0) {
        const adminUid = 'admin-' + Date.now();
        db.users = {};
        db.users[adminUid] = { n: 'Admin chính', u: 'ADMIN.pn', p: CryptoJS.SHA256('portalnow1').toString(), r: 'admin', email: 'admin@portal.now', avatar: '👤', phone: '' };
    }
}

async function saveDB(path = null, data = null) {
    try {
        if (path && data) await fbDB.ref(path).update(data);
        else await fbDB.ref('/').set(db);
        updateStats();
    } catch (e) { console.error('Firebase save error:', e); toast('Lỗi đồng bộ dữ liệu!', 'error'); }
}

async function loadNotifications() {
    try {
        const [notifSnap, privateSnap] = await Promise.all([
            fbDB.ref('notif_history').once('value'),
            user ? fbDB.ref(`private_notif/${user.uid}`).once('value') : Promise.resolve({ val: () => [] })
        ]);
        db.notif_history = notifSnap.val() || [];
        if (user) {
            if (!db.private_notif) db.private_notif = {};
            db.private_notif[user.uid] = privateSnap.val() || [];
        }
        db.notif_history.forEach(n => { if (!n.id) n.id = 'legacy-' + Date.now() + Math.random(); });
        if (db.private_notif[user?.uid]) {
            db.private_notif[user.uid].forEach(n => { if (!n.id) n.id = 'legacy-' + Date.now() + Math.random(); });
        }
    } catch (e) { console.warn('Không tải được thông báo'); }
}

async function loadHomeworkAndExams() {
    try {
        const [hwSnap, examSnap, subSnap] = await Promise.all([
            fbDB.ref('hw_list').once('value'),
            fbDB.ref('exams').once('value'),
            fbDB.ref('submissions').once('value')
        ]);
        db.hw_list = hwSnap.val() || [];
        db.exams = examSnap.val() || [];
        db.submissions = subSnap.val() || [];
    } catch (e) { console.warn('Không tải được bài tập/thi'); }
}

async function loadParents() {
    try {
        const snap = await fbDB.ref('parents').once('value');
        db.parents = snap.val() || {};
    } catch (e) { console.warn('Không tải được phụ huynh'); }
}

async function loadStudentData(uid) {
    try {
        const [dataSnap, bankSnap] = await Promise.all([
            fbDB.ref(`data/${uid}`).once('value'),
            fbDB.ref('bank_info').once('value')

// ========== LOGIN ==========
async function doLogin() {
    const username = document.getElementById('u').value.trim();
    const password = document.getElementById('p').value.trim();
    if (!username || !password) { toast('Nhập đầy đủ thông tin', 'error'); return; }
    showLoading();
    await loadDB();
    
    const hashed = CryptoJS.SHA256(password).toString();
    let foundUser = Object.values(db.users || {}).find(u => u.u === username && u.p === hashed);
    
    if (foundUser) {
        const email = username + '@portal.now';
        try {
            await fbAuth.signInWithEmailAndPassword(email, password).catch(async (err) => {
                if (err.code === 'auth/user-not-found') {
                    await fbAuth.createUserWithEmailAndPassword(email, password);
                } else throw err;
            });
        } catch (e) {
            console.warn('Firebase Auth fallback:', e.message);
        }
        user = { uid: Object.keys(db.users).find(k => db.users[k] === foundUser), ...foundUser };
        afterLogin();
        return;
    }
    
    // Đăng nhập phụ huynh với mật khẩu riêng (đã hash)
    const parentEntry = Object.entries(db.parents || {}).find(([id, p]) => p.phone === username && p.p === hashed);
    if (parentEntry) {
        const emailP = username + '@parent.portal.now';
        try {
            await fbAuth.signInWithEmailAndPassword(emailP, password).catch(async (err) => {
                if (err.code === 'auth/user-not-found') {
                    await fbAuth.createUserWithEmailAndPassword(emailP, password);
                } else throw err;
            });
        } catch (e) { console.warn('Parent auth fallback:', e.message); }
        const child = Object.values(db.users || {}).find(u => u.u === parentEntry[1].childUsername);
        user = { uid: parentEntry[0], r: 'parent', ...parentEntry[1], child: child || null };
        afterLogin();
        return;
    }
    toast('Sai tài khoản hoặc mật khẩu', 'error');
    hideLoading();
}

async function afterLogin() {
    hideLoading();
    await Promise.all([loadNotifications(), loadHomeworkAndExams(), loadParents()]);
    if (user.r === 'hv') {
        await loadStudentData(user.uid);
    }
    if (isTeacher()) {
        show('pg-admin');
        renderAdminMenu();
        updateStats();
        toast(`Chào mừng ${user.n}!`);
    } else if (user.r === 'hv') {
        document.getElementById('hv-info').innerText = user.n;
        show('pg-hv');
        setActiveNav('home');
        attachStudentRealtime(user.uid);
        sv('home');
        toast(`Xin chào, ${user.n}!`);
    } else if (user.r === 'parent') {
        document.getElementById('parent-info').innerText = user.name || 'Phụ huynh';
        show('pg-parent');
        parentDashboard('home');
        toast(`Xin chào, ${user.name || 'Phụ huynh'}!`);
    }
    // Đăng ký FCM token sau khi đã có user
    if (user && user.uid) {
        requestFcmTokenForUser(user.uid);
    }
}

function attachStudentRealtime(uid) {
    if (realtimeRefs.notifGlobal) fbDB.ref('notif_history').off('value');
    realtimeRefs.notifGlobal = fbDB.ref('notif_history').on('value', (snap) => {

        'audit': renderAudit, 'config': renderConfig, 'cleanup': renderCleanup, 'voucher': renderVoucher,

    }
}

function playNotificationSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.3);
    } catch (e) {}
}

    const fileInput = document.getElementById('notif-attachment');
    let attachmentInfo = null;
    if (fileInput && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        showLoading();
        try {
            const storageRef = fbStorage.ref('attachments/' + Date.now() + '_' + file.name);
            const uploadTask = await storageRef.put(file);
            const downloadURL = await uploadTask.ref.getDownloadURL();
            attachmentInfo = { name: file.name, url: downloadURL, type: file.type };
        } catch (e) { toast('Lỗi tải file đính kèm', 'error'); hideLoading(); return; }
        hideLoading();
    }
    const entry = { id: 'msg-' + Date.now(), msg: msgText, msgHtml, date: new Date().toLocaleString(), target: null, attachment: attachmentInfo };
    if (type === 'private') {
        entry.target = document.getElementById('notifStudent').value;
        if (!db.private_notif) db.private_notif = {};
        if (!db.private_notif[entry.target]) db.private_notif[entry.target] = [];
        db.private_notif[entry.target].push(entry);
        toast('Đã gửi thông báo riêng');
    } else {
        if (!db.notif_history) db.notif_history = [];
        db.notif_history.unshift(entry);
        Object.values(db.users||{}).filter(u => u.r==='hv').forEach(h => {
            if (!db.data[h.uid]) db.data[h.uid] = {};
            db.data[h.uid]['2b_new'] = true;
        });
        toast('Đã gửi thông báo chung');
    }
    playNotificationSound();
    await saveDB();
    renderNotifList('all');
    editor.innerHTML = '';
    if (fileInput) fileInput.value = '';
}

function editNotif(id) {
    let n = (db.notif_history || []).find(x => x.id === id) || Object.values(db.private_notif||{}).flat().find(x => x.id === id);
    if (!n) return;
    const newContent = prompt("Sửa nội dung (HTML):", n.msgHtml || n.msg);
    if (newContent) { n.msgHtml = newContent; n.msg = newContent.replace(/<[^>]*>/g, ''); saveDB(); renderNotifList('all'); }
}

async function deleteNotif(id) {
    let idx = (db.notif_history || []).findIndex(x => x.id === id);
    if (idx > -1) { db.notif_history.splice(idx, 1); await saveDB(); op('2b'); return; }
    for (let key in db.private_notif) {
        idx = (db.private_notif[key] || []).findIndex(x => x.id === id);
        if (idx > -1) { db.private_notif[key].splice(idx, 1); await saveDB(); op('2b'); return; }
    }
}

function importWordToQuestions(type) {
    const inputId = type === 'hw' ? 'importWordHw' : 'importWordExam';
    const file = document.getElementById(inputId).files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(event) {
        const result = await mammoth.extractRawText({ arrayBuffer: event.target.result });
        const lines = result.value.split('\n').filter(line => line.trim());
        const container = document.getElementById(type === 'hw' ? 'hw-questions-container' : 'exam-questions-container');
        lines.forEach(line => {
            const block = document.createElement('div');
            block.className = 'question-block';
            if (line.includes('|')) {
                const parts = line.split('|').map(s => s.trim());
                block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                  <input class="q-text" value="${parts[0]||''}">
                  <div class="mcq-options">
                    <input class="opt-a" value="${parts[1]||''}"><input class="opt-b" value="${parts[2]||''}">
                    <input class="opt-c" value="${parts[3]||''}"><input class="opt-d" value="${parts[4]||''}">
                  </div>
                  <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
                    <span>Đáp án:</span><select class="q-ans"><option value="A" ${parts[5]==='A'?'selected':''}>A</option><option value="B" ${parts[5]==='B'?'selected':''}>B</option><option value="C" ${parts[5]==='C'?'selected':''}>C</option><option value="D" ${parts[5]==='D'?'selected':''}>D</option></select>
                  </div>
                  <input type="number" class="q-point" value="${parts[6]||1}">`;
            } else {
                block.innerHTML = `<button class="remove-question" onclick="this.parentElement.remove()">✕</button>
                  <input class="q-text" value="${line}">
                  <textarea class="essay-answer" disabled></textarea>
                  <input type="number" class="q-point" value="1">`;
            }
            container.appendChild(block);
        });
        toast('Đã import câu hỏi từ Word');
    };
    reader.readAsArrayBuffer(file);
}

async function saveHomework() {
    const n = document.getElementById('h_n').value;
    if (!n) { toast('Nhập tên bài tập', 'error'); return; }
    const container = document.getElementById('hw-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    showLoading();
    for (const b of blocks) {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        const audioFile = b.querySelector('.q-audio')?.files[0];
        let audioUrl = '';
        if (audioFile) {
            const storageRef = fbStorage.ref('audio_questions/' + Date.now() + '_' + audioFile.name);
            try {
                const uploadTask = await storageRef.put(audioFile);
                audioUrl = await uploadTask.ref.getDownloadURL();
            } catch (e) { toast('Lỗi tải file âm thanh', 'error'); hideLoading(); return; }
        }
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText, audioUrl,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, audioUrl, point });
        }
    }
    db.hw_list.push({
        n, start: document.getElementById('h_start').value, end: document.getElementById('h_end').value,
        time: document.getElementById('h_time').value, slot: document.getElementById('h_slot').value,
        questions, assignedTo: [], assigned: false
    });
    hideLoading();
    await saveDB(); op('2c'); toast('Bài tập đã lưu');
}

function viewRegHistory(uid) {
    const student = db.users[uid];
    if (!student) { toast('Không tìm thấy học viên', 'error'); return; }
    
    const allHistory = db.sked_history || [];
    const currentSlots = db.sked.slots || [];
    const allWeeks = [
        { t: db.sked.t || 'Tuần hiện tại', date: new Date().toLocaleDateString(), slots: currentSlots, isCurrent: true },
        ...allHistory.map(w => ({ ...w, isCurrent: false }))
    ];
    
    let html = `<h3>📋 Lịch sử đăng ký: ${student.n}</h3>`;
    let foundAny = false;
    
    allWeeks.forEach(week => {
        const registeredSlots = week.slots.filter(s => (s.r || []).includes(uid));
        if (registeredSlots.length > 0) {
            foundAny = true;
            html += `<div class="card"><b>📅 ${week.t}</b> <small>(${week.date || 'N/A'})</small><ul>`;
            registeredSlots.forEach(s => {
                const slotId = s.id || '';
                html += `<li style="display:flex; justify-content:space-between; align-items:center;">
                    ${s.n} (${s.d} - ${s.ati})
                    <button class="danger" onclick="adminRemoveRegistration('${uid}', '${slotId}', '${week.isCurrent ? 'current' : 'history'}')" style="font-size:12px; padding:4px 8px;">🗑️ Hủy ĐK</button>
                </li>`;
            });
            html += `</ul></div>`;
        }
    });
    
    if (!foundAny) {
        html += '<p>Học viên này chưa từng đăng ký tiết nào.</p>';
    }
    
    html += `<br><button onclick="op('2e')">← Quay lại danh sách học viên</button>`;
    document.getElementById('det-content').innerHTML = html;
}

async function adminRemoveRegistration(studentUid, slotId, weekType) {
    if (!isTeacher()) { toast('Không có quyền', 'error'); return; }
    let slot;
    if (weekType === 'current') {
        slot = db.sked.slots.find(s => s.id === slotId);
    } else {
        toast('Không thể sửa lịch sử cũ, chỉ có thể hủy đăng ký ở tuần hiện tại.', 'error');
        return;
    }
    if (!slot) return;
    if (!slot.r) slot.r = [];
    const idx = slot.r.indexOf(studentUid);
    if (idx > -1) {
        slot.r.splice(idx, 1);
        await saveDB();
        // Gửi thông báo riêng cho học viên
        const student = db.users[studentUid];
        const msg = `Lịch học của bạn đã bị thay đổi bởi quản trị viên. Tiết "${slot.n}" (${slot.d} - ${slot.ati}) đã bị hủy. Vui lòng kiểm tra lại lịch học.`;
        if (!db.private_notif) db.private_notif = {};
        if (!db.private_notif[studentUid]) db.private_notif[studentUid] = [];
        db.private_notif[studentUid].push({
            id: 'msg-' + Date.now(),
            msg: msg,
            msgHtml: msg,
            date: new Date().toLocaleString(),
            target: studentUid
        });
        await saveDB();
        toast('Đã hủy đăng ký và thông báo cho học viên.');
        viewRegHistory(studentUid);
    }
}

async function saveExam() {
    const n = document.getElementById('x_n').value;
    if (!n) { toast('Nhập tên đề thi', 'error'); return; }
    const container = document.getElementById('exam-questions-container');
    const blocks = container.querySelectorAll('.question-block');
    const questions = [];
    showLoading();
    for (const b of blocks) {
        const qText = b.querySelector('.q-text')?.value || '';
        const point = parseInt(b.querySelector('.q-point')?.value) || 1;
        const audioFile = b.querySelector('.q-audio')?.files[0];
        let audioUrl = '';
        if (audioFile) {
            const storageRef = fbStorage.ref('audio_questions/' + Date.now() + '_' + audioFile.name);
            try {
                const uploadTask = await storageRef.put(audioFile);
                audioUrl = await uploadTask.ref.getDownloadURL();
            } catch (e) { toast('Lỗi tải file âm thanh', 'error'); hideLoading(); return; }
        }
        if (b.querySelector('.mcq-options')) {
            questions.push({
                type: 'mcq', q: qText, audioUrl,
                a: b.querySelector('.opt-a')?.value || '',
                b: b.querySelector('.opt-b')?.value || '',
                c: b.querySelector('.opt-c')?.value || '',
                d: b.querySelector('.opt-d')?.value || '',
                ans: b.querySelector('.q-ans')?.value || 'A',
                point
            });
        } else {
            questions.push({ type: 'essay', q: qText, audioUrl, point });
        }
    }
    db.exams.push({
        n, start: document.getElementById('x_start').value, end: document.getElementById('x_end').value,
        time: document.getElementById('x_time').value, slot: document.getElementById('x_slot').value,
        p: document.getElementById('x_p').value, st: document.getElementById('x_s').value,
        questions, assignedTo: [], assigned: false
    });
    hideLoading();
    await saveDB(); op('2f'); toast('Đề thi đã lưu');
}

async function svFee(uid) {

async function saveBankInfo() {
    const bankName = document.getElementById('bankName').value;

async function approveReceipt(uid, i) {
    if (!isMainAdmin() && !(isSubAdmin() && user.permissions?.includes('finance'))) { toast('Không có quyền', 'error'); op('2g'); return; }
    const d = db.data[uid].fee;
    d.receipts = d.receipts || [];
    if (!d.receipts[i]) return;
    const r = d.receipts[i];
    d.paid = (d.paid || 0) + r.amount;
    d.logs = d.logs || [];
    d.logs.unshift(`✅ ${r.date}: +${r.amount}đ (${r.note})`);
    d.receipts.splice(i, 1);
    await saveDB(); edFee(uid);
}

async function rejectReceipt(uid, i) {
    if (!isMainAdmin() && !(isSubAdmin() && user.permissions?.includes('finance'))) { toast('Không có quyền', 'error'); op('2g'); return; }
    const d = db.data[uid].fee;
    d.receipts = d.receipts || [];
    d.receipts.splice(i, 1);
    await saveDB(); edFee(uid);
}

async function clearVoucherHistory() {
    modal('Xóa toàn bộ lịch sử sử dụng voucher?', async () => {
        db.voucher_history = [];
        await saveDB();
        op('voucher');
        toast('Đã xóa lịch sử voucher');
    });
}

async function addVoucher() {
    const code = document.getElementById('v_code').value.trim();
    const amount = parseInt(document.getElementById('v_amount').value) || 0;
    const maxUses = parseInt(document.getElementById('v_uses').value) || 1;
    
    if (!code || code.length !== 12) { toast('Mã voucher phải đúng 12 ký tự!', 'error'); return; }
    if (!/[a-zA-Z]/.test(code) || !/[0-9]/.test(code)) { toast('Mã voucher phải có cả chữ và số!', 'error'); return; }
    if (amount <= 0) { toast('Số tiền khấu trừ phải > 0', 'error'); return; }
    if ((db.vouchers || []).some(v => v.code === code)) { toast('Mã voucher đã tồn tại!', 'error'); return; }
    
    if (!db.vouchers) db.vouchers = [];
    db.vouchers.push({ code, amount, maxUses, remaining: maxUses, active: true, createdBy: user.n, createdAt: new Date().toLocaleString() });
    await saveDB();
    op('voucher');
    toast('Đã tạo voucher');
}

function copyVoucherCode(code) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(code);
        toast('Đã sao chép mã: ' + code);
    } else {
        const ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Đã sao chép mã: ' + code);
    }
}

async function cancelVoucher(i) {
    modal('Hủy voucher này? Học viên sẽ không dùng được nữa.', async () => {
        db.vouchers[i].active = false;
        await saveDB();
        op('voucher');
        toast('Đã hủy voucher');
    });
}

async function deleteVoucher(i) {
    modal('Xóa vĩnh viễn voucher này?', async () => {
        db.vouchers.splice(i, 1);
        await saveDB();
        op('voucher');
        toast('Đã xóa voucher');
    });
}

function editPermissions(uid) {
    if (!isMainAdmin()) { toast('Không có quyền', 'error'); return; }
    const target = db.users[uid];
    if (!target || target.r !== 'subadmin') return;
    
    const allPerms = ['2a','2b','2c','2e','2f','res','2g','teachers','parents','flashcards_admin','voucher','support','audit','config','cleanup'];
    const currentPerms = target.permissions || [];
    
    let html = `<h3>🔧 Phân quyền cho: ${target.n}</h3>`;
    html += `<div class="card" style="display:flex; flex-wrap:wrap; gap:8px;">`;
    allPerms.forEach(p => {
        const checked = currentPerms.includes(p) ? 'checked' : '';
        const labels = {
            '2a':'Lịch học', '2b':'Thông báo', '2c':'Bài tập', '2e':'Học viên', 
            '2f':'Thi cử', 'res':'Kết quả', '2g':'Học phí', 'teachers':'Giáo viên', 
            'parents':'Phụ huynh', 'flashcards_admin':'Flashcard', 'voucher':'Voucher',
            'support':'Hỗ trợ', 'audit':'Lịch sử HĐ', 'config':'Cài đặt', 'cleanup':'Dọn dẹp'
        };
        html += `<label style="display:flex; align-items:center; gap:4px; margin:4px; padding:4px 8px; background:var(--surface-alt); border-radius:8px;">
            <input type="checkbox" id="perm_${p}" ${checked}> ${p} - ${labels[p] || p}
        </label>`;
    });
    html += `</div>
        <button onclick="savePermissions('${uid}')">💾 Lưu quyền</button>
        <button onclick="op('admins')">← Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
}

async function savePermissions(uid) {
    if (!isMainAdmin()) return;
    const target = db.users[uid];
    if (!target || target.r !== 'subadmin') return;
    
    const allPerms = ['2a','2b','2c','2e','2f','res','2g','teachers','parents','flashcards_admin','voucher','support','audit','config','cleanup'];
    const selected = [];
    allPerms.forEach(p => {
        const checkbox = document.getElementById('perm_'+p);
        if (checkbox && checkbox.checked) selected.push(p);
    });
    target.permissions = selected;
    await saveDB();
    toast('Đã lưu quyền cho ' + target.n);
    op('admins');
}

async function addAdmin() {

async function deleteFlashcardCategory() {

    const cardsInCategory = (db.custom_flashcards || []).filter(fc => fc.category === catToDelete);

        db.flashcard_categories = db.flashcard_categories.filter(c => c !== catToDelete);

function flipCard() {
    isFlipped = !isFlipped;
    document.getElementById('flashcard-inner').style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
}

function nextCard() {
    const arr = window._fc_current || db.custom_flashcards || [];
    currentFlashcardIndex = (currentFlashcardIndex + 1) % arr.length;
    updateFlashcardDisplay(arr);
}

function prevCard() {
    const arr = window._fc_current || db.custom_flashcards || [];
    currentFlashcardIndex = (currentFlashcardIndex - 1 + arr.length) % arr.length;
    updateFlashcardDisplay(arr);
}

function updateFlashcardDisplay(arr) {
    const v = arr[currentFlashcardIndex];
    document.getElementById('fc-cn').innerText = v.cn;
    document.getElementById('fc-py').innerText = v.py;
    document.getElementById('fc-vn').innerText = v.vn;
    document.getElementById('fc-progress').innerText = `${currentFlashcardIndex + 1} / ${arr.length}`;
    document.getElementById('flashcard-inner').style.transform = 'rotateY(0deg)';
    isFlipped = false;
}

function shuffleCards() {
    const arr = window._fc_current || db.custom_flashcards || [];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    currentFlashcardIndex = 0;
    updateFlashcardDisplay(arr);
    toast('Đã xáo trộn thẻ');
}

let writingCanvas, writingCtx, isDrawing = false;
let canvasHistory = [];

function renderWritingPad(parentEl) {
    const allCards = db.custom_flashcards || [];
    const card = allCards.length > 0 ? allCards[currentFlashcardIndex % allCards.length] : null;
    const cn = card ? card.cn : '爱';
    const py = card ? card.py : 'ài';
    const vn = card ? card.vn : 'yêu';
    
    parentEl.innerHTML = `
      <h3>✍️ Tập viết chữ Hán</h3>
      <div class="card" style="text-align:center;">
        <div style="font-size:80px; margin:10px 0; color:var(--text);">${cn}</div>
        <small style="color:var(--text-secondary);">${py} - ${vn}</small>
      </div>
      <div class="card" style="padding:10px;">
        <canvas id="writingCanvas" width="300" height="300" style="border:2px dashed var(--border); border-radius:12px; width:100%; max-width:300px; touch-action:none; cursor:crosshair; background:white;"></canvas>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px; flex-wrap:wrap;">
          <button onclick="clearCanvas()">🧹 Xóa</button>
          <button onclick="undoCanvas()">↩ Lùi</button>
          <button onclick="saveCanvasImage()">💾 Lưu ảnh</button>
          <button onclick="changeWritingWord()">🔄 Đổi chữ</button>
        </div>
      </div>
      <button onclick="sv('profile')" style="margin-top:10px;">← Quay lại</button>`;
    
    setTimeout(() => {
        writingCanvas = document.getElementById('writingCanvas');
        if (!writingCanvas) return;
        writingCtx = writingCanvas.getContext('2d');
        writingCtx.lineWidth = 8;
        writingCtx.lineCap = 'round';
        writingCtx.strokeStyle = '#1e293b';
        
        writingCanvas.addEventListener('mousedown', startDrawing);
        writingCanvas.addEventListener('mousemove', draw);
        writingCanvas.addEventListener('mouseup', stopDrawing);
        writingCanvas.addEventListener('mouseleave', stopDrawing);
        writingCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        writingCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
        writingCanvas.addEventListener('touchend', stopDrawing);
    }, 100);
}

function startDrawing(e) {
    isDrawing = true;
    const rect = writingCanvas.getBoundingClientRect();
    const scaleX = writingCanvas.width / rect.width;
    const scaleY = writingCanvas.height / rect.height;
    writingCtx.beginPath();
    writingCtx.moveTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
}

function draw(e) {
    if (!isDrawing) return;
    const rect = writingCanvas.getBoundingClientRect();
    const scaleX = writingCanvas.width / rect.width;
    const scaleY = writingCanvas.height / rect.height;
    writingCtx.lineTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
    writingCtx.stroke();
}

function stopDrawing() { isDrawing = false; }

function clearCanvas() {
    writingCtx.clearRect(0, 0, writingCanvas.width, writingCanvas.height);
    canvasHistory = [];
}

function undoCanvas() {
    // Simple undo: clear and redraw from history is complex; just clear for now
    clearCanvas();
    toast('Đã xóa canvas');
}

function saveCanvasImage() {
    const dataUrl = writingCanvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.href = dataUrl;
    link.download = 'chu_han_' + Date.now() + '.png';
    link.click();
    toast('Đã tải ảnh xuống');
}

function changeWritingWord() {
    const allCards = db.custom_flashcards || [];
    if (allCards.length === 0) return;
    currentFlashcardIndex = (currentFlashcardIndex + 1) % allCards.length;
    renderWritingPad(document.getElementById('hv-main'));
}

// ========== ĐĂNG KÝ / HỦY SLOT (DÙNG ID AN TOÀN) ==========
async function tglRegById(slotId) {
    if (!db.sked || !Array.isArray(db.sked.slots)) return;
    const s = db.sked.slots.find(s => s.id === slotId);
    if (!s) return;
    if (!s.r) s.r = [];
    const idx = s.r.indexOf(user.uid);
    if (idx > -1) {
        s.r.splice(idx, 1);
    } else {
        const totalRegistered = db.sked.slots.reduce((sum, sl) => sum + (sl.r || []).filter(uid => uid === user.uid).length, 0);
        if (totalRegistered >= 8) { toast('Bạn đã đăng ký đạt đến giới hạn. Không thể đăng ký thêm.', 'error'); return; }
        if (s.r.length >= s.c) { toast('Slot đã đầy!', 'error'); return; }
        s.r.push(user.uid);
    }
    await saveDB();
    sv('reg');
}

// Giữ lại hàm tglRegByIndex và tglReg cũ (fallback)
async function tglRegByIndex(i) {
    if (!db.sked || !Array.isArray(db.sked.slots) || i < 0 || i >= db.sked.slots.length) return;
    const s = db.sked.slots[i];
    if (!s.id) s.id = 'slot-' + i + '-' + Date.now();
    await tglRegById(s.id);
}
async function tglReg(i) {
    await tglRegByIndex(i);
}

// ========== LÀM BÀI TẬP ==========
async function stH(index) {
    const assignedHw = (db.hw_list || []).filter(h => h.assignedTo && h.assignedTo.includes(user.uid));
    const h = assignedHw[index];
    if (!h) return;
    const serverNow = await getServerTime();
    startTime = serverNow;
    currentWorkType = 'hw'; currentWorkName = h.n;
    let html = `<h3>${h.n}</h3>`;
    if (h.time) {
        examEndTime = new Date(serverNow.getTime() + h.time * 60000);
        clearInterval(examTimer);
        examTimer = setInterval(async () => {
            const nowServer = await getServerTime();
            const diff = examEndTime - nowServer;
            if (diff <= 0) { clearInterval(examTimer); toast('Hết giờ! Bài sẽ được nộp.', 'error'); sub('hw', h.n); }
            const min = Math.floor(diff / 60000);
            const sec = Math.floor((diff % 60000) / 1000);
            const el = document.getElementById('hwTimer');
            if (el) el.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
        html += `<div class="timer" id="hwTimer"></div>`;
    }
    h.questions.forEach((q, qi) => {

async function stX(index) {

    const x = assignedExams[index];
    if (!x) return;
    const p = prompt("Mật khẩu đề thi:");
    if (p !== x.p) { toast('Sai mật khẩu!', 'error'); return; }
    const submitted = (db.submissions || []).filter(s => s.u === user.uid && s.n === x.n).length;
    if (x.slot && submitted >= parseInt(x.slot)) { toast('Bạn đã hết lượt thi', 'error'); return; }
    const serverNow = await getServerTime();
    startTime = serverNow;
    currentWorkType = 'exam'; currentWorkName = x.n;
    isTakingExam = true;
    activateAntiCheat();
    let html = `<h3>${x.n}</h3><div class="cheat-warning" id="cheatWarning" style="display:none"></div>`;
    if (x.time) {
        examEndTime = new Date(serverNow.getTime() + x.time * 60000);
        clearInterval(examTimer);
        examTimer = setInterval(async () => {
            const nowServer = await getServerTime();
            const diff = examEndTime - nowServer;
            if (diff <= 0) { clearInterval(examTimer); toast('Hết giờ! Bài thi đã được nộp.', 'error'); sub('exam', x.n); }
            const min = Math.floor(diff / 60000);
            const sec = Math.floor((diff % 60000) / 1000);
            const el = document.getElementById('examTimer');
            if (el) el.innerText = `${min}:${sec.toString().padStart(2, '0')}`;
        }, 1000);
        html += `<div class="timer" id="examTimer"></div>`;
    }
    const safeQuestions = x.questions.map(q => {
        const { ans, ...rest } = q;
        return rest;
    });
    safeQuestions.forEach((q, qi) => {
        let audioHtml = '';
        if (q.audioUrl) {
            audioHtml = `<div style="margin:8px 0;"><audio controls style="width:100%;"><source src="${q.audioUrl}" type="audio/mpeg"></audio></div>`;
        }
        if (q.type === 'mcq') {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}${audioHtml}<br>
              <label><input type="radio" name="q${qi}" value="A"> A. ${q.a}</label><br>
              <label><input type="radio" name="q${qi}" value="B"> B. ${q.b}</label><br>
              <label><input type="radio" name="q${qi}" value="C"> C. ${q.c}</label><br>
              <label><input type="radio" name="q${qi}" value="D"> D. ${q.d}</label></div>`;
        } else {
            html += `<div class="card"><b>Câu ${qi+1} (${q.point||1}đ):</b> ${q.q}${audioHtml}<br><textarea id="essay${qi}" placeholder="Trả lời..."></textarea></div>`;
        }
    });
    html += `<button onclick="sub('exam','${x.n}')">NỘP BÀI</button>`;
    document.getElementById('hv-main').innerHTML = html;
}

// ========== NỘP BÀI ==========
async function sub(type, name) {
    const work = type === 'hw'
        ? (db.hw_list || []).find(h => h.assignedTo && h.assignedTo.includes(user.uid) && h.n === name)
        : (db.exams || []).find(x => x.assignedTo && x.assignedTo.includes(user.uid) && x.n === name);
    if (!work) return;
    let answers = [];
    if (work.questions) {
        work.questions.forEach((q, qi) => {
            if (q.type === 'mcq') {
                const selected = document.querySelector(`input[name="q${qi}"]:checked`);
                answers.push({ q: q.q, selected: selected ? selected.value : '', correct: q.ans, point: q.point||1 });
            } else {
                const ans = document.getElementById(`essay${qi}`)?.value || '';
                answers.push({ q: q.q, ans, point: q.point||1 });
            }
        });
    }
    const nowServer = await getServerTime();
    const diff = Math.floor((nowServer - startTime) / 1000), dur = Math.floor(diff / 60) + "p " + (diff % 60) + "s";
    const subObj = { u: user.uid, type, n: name, date: nowServer.toLocaleString(), dur, answers };
    if (type === 'exam') {
        const mcqAnswers = answers.filter(a => a.selected !== undefined);
        const correctCount = mcqAnswers.filter(a => a.selected === a.correct).length;
        subObj.score = `${correctCount}/${mcqAnswers.length}`;
        isTakingExam = false;
        deactivateAntiCheat();
    }
    db.submissions.push(subObj);
    updateQuestionStats(work, answers);
    if (type === 'hw' && work.questions) {
        const allCorrect = work.questions.every((q, qi) => {
            if (q.type === 'mcq') return answers[qi] && answers[qi].selected === q.ans;
            return true;
        });
        if (allCorrect) addBadge(user.uid, '🏆 Hoàn thành xuất sắc: ' + work.n);
    }
    clearInterval(examTimer);
    await saveDB();
    toast('Nộp bài thành công!');
    sv(type === 'hw' ? '2c' : '2f');
}

function addBadge(uid, badgeName) {
    if (!db.users[uid].badges) db.users[uid].badges = [];
    if (!db.users[uid].badges.includes(badgeName)) {
        db.users[uid].badges.push(badgeName);
        toast('🎖 Bạn nhận được huy hiệu: ' + badgeName);
    }
}

function updateQuestionStats(work, answers) {
    if (!db.question_stats) db.question_stats = {};
    if (!work.questions) return;
    work.questions.forEach((q, qi) => {
        if (q.type === 'mcq') {
            const questionId = q.q.substring(0, 50);
            if (!db.question_stats[questionId]) db.question_stats[questionId] = { total: 0, wrong: 0, q: q.q };
            db.question_stats[questionId].total++;
            const studentAnswer = answers[qi]?.selected;
            if (studentAnswer && studentAnswer !== q.ans) db.question_stats[questionId].wrong++;
        }
    });
}

async function applyVoucher(uid) {
    const code = document.getElementById('voucherCode')?.value?.trim();
    const msgEl = document.getElementById('voucherMsg');
    if (!code) { toast('Nhập mã voucher', 'error'); return; }
    
    const vouchersSnap = await fbDB.ref('vouchers').once('value');
    const vouchers = vouchersSnap.val() || [];
    const voucherIndex = vouchers.findIndex(v => v.code === code && v.active && v.remaining > 0);
    
    if (voucherIndex === -1) { 
        if (msgEl) msgEl.innerText = '❌ Voucher không hợp lệ hoặc đã hết lượt'; 
        return; 
    }
    
    const d = db.data[uid] || {};
    if (!d.fee) d.fee = { slots: 0, rate: 0, paid: 0, logs: [], receipts: [] };
    
    vouchers[voucherIndex].remaining--;
    d.fee.paid += vouchers[voucherIndex].amount;
    d.fee.logs.unshift(`🎟 ${new Date().toLocaleDateString()}: +${vouchers[voucherIndex].amount}đ (Voucher: ${code})`);
    
    // Lưu lịch sử voucher
    if (!db.voucher_history) db.voucher_history = [];
    db.voucher_history.unshift({
        code: code,
        uid: uid,
        userName: user.n,
        amount: vouchers[voucherIndex].amount,
        date: new Date().toLocaleString()
    });
    
    db.vouchers = vouchers;
    await saveDB();
    if (msgEl) msgEl.innerText = `✅ Đã áp dụng voucher, giảm ${vouchers[voucherIndex].amount.toLocaleString()}đ`;
    toast('Voucher đã được áp dụng!');
    sv('2g');
}

// ========== ANTI-CHEAT ==========
function activateAntiCheat() {
    cheatCount = 0;
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('blur', handleWindowBlur);
    document.addEventListener('contextmenu', preventContextMenu);
    document.addEventListener('copy', preventCopy);
    updateCheatWarning();
}

function deactivateAntiCheat() {
    document.removeEventListener('visibilitychange', handleVisibilityChange);
    window.removeEventListener('blur', handleWindowBlur);
    document.removeEventListener('contextmenu', preventContextMenu);
    document.removeEventListener('copy', preventCopy);
    const warning = document.getElementById('cheatWarning');
    if (warning) warning.style.display = 'none';
}

function handleVisibilityChange() {
    if (document.hidden && isTakingExam) { cheatCount++; updateCheatWarning(); if (cheatCount >= MAX_CHEATS) { toast('Bạn đã rời màn hình quá nhiều. Bài thi sẽ tự động nộp.', 'error'); sub('exam', currentWorkName); } }
}

function handleWindowBlur() {
    if (isTakingExam) { cheatCount++; updateCheatWarning(); if (cheatCount >= MAX_CHEATS) { toast('Bạn đã rời màn hình quá nhiều. Bài thi sẽ tự động nộp.', 'error'); sub('exam', currentWorkName); } }
}

function preventContextMenu(e) { e.preventDefault(); }
function preventCopy(e) { e.preventDefault(); }

function updateCheatWarning() {
    const warning = document.getElementById('cheatWarning');
    if (warning) {
        warning.style.display = cheatCount > 0 ? 'block' : 'none';
        warning.innerText = `Cảnh báo: bạn đã rời màn hình ${cheatCount}/${MAX_CHEATS} lần. Nếu vượt quá, bài thi sẽ tự động nộp!`;
    }
}

// ========== CHẤM BÀI CHI TIẾT (ADMIN) ==========
function viewSubmissionDetail(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) { toast('Bài tập/thi không còn tồn tại', 'error'); return; }
    let html = `<h3>📄 Bài làm: ${sub.n}</h3>
      <p><b>Học viên:</b> ${db.users[sub.u]?.n || sub.u} | <b>Ngày nộp:</b> ${sub.date} | <b>Thời gian:</b> ${sub.dur}</p>`;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        html += `<div class="card" style="margin-bottom:12px;">
          <b>Câu ${qi+1} (${question.point||1}đ):</b> ${question.q}`;
        if (question.type === 'mcq') {
            const correctAns = question.ans || '?';
            const userAns = ans.selected || 'Chưa chọn';
            const isCorrect = userAns === correctAns;
            html += `<br><b>Đáp án đúng:</b> ${correctAns}<br>
              <b>Học viên chọn:</b> ${userAns} <span style="color:${isCorrect?'var(--success)':'var(--danger)'}">${isCorrect?'✅':'❌'}</span>`;
        } else {
            html += `<br><b>Bài làm:</b> <div style="white-space:pre-wrap; background:var(--surface-alt); padding:8px; border-radius:8px;">${ans.ans || 'Không trả lời'}</div>`;
            html += `<div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
              <label>Điểm (0-${question.point||10}): </label>
              <input type="number" id="grade-${qi}" value="${ans.grade !== undefined ? ans.grade : ''}" min="0" max="${question.point||10}" step="0.5" style="width:80px;">
              <label>Nhận xét: </label>
              <input type="text" id="comment-${qi}" value="${ans.comment || ''}" style="flex:1;">
              <button onclick="aiGrade(${submissionIndex}, ${qi})" type="button">🤖 Chấm AI</button>
              <span id="score-${qi}" style="font-weight:bold; margin-left:8px;">${ans.aiScore !== undefined ? `AI: ${ans.aiScore}/${question.point}` : ''}</span>
            </div>`;
        }
        html += `</div>`;
    });
    html += addAudioFeedbackUI(sub);
    html += `<div class="card"><b>Tổng điểm:</b> <span id="total-score">Đang tính...</span>
      <button onclick="saveManualGrades(${submissionIndex})">💾 Lưu điểm & nhận xét</button>
      <button onclick="calculateTotal(${submissionIndex})">🔄 Tính tổng</button></div>
      <button onclick="renderSubs('${sub.type}')">← Quay lại danh sách</button>`;
    document.getElementById('det-content').innerHTML = html;
    setTimeout(() => calculateTotal(submissionIndex), 100);
}

function calculateTotal(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const question = work.questions[qi];
        if (!question) return;
        const point = question.point || 1;
        maxTotal += point;
        if (ans.selected !== undefined) { if (ans.selected === question.ans) total += point; }
        else { const input = document.getElementById(`grade-${qi}`); const grade = input ? parseFloat(input.value) : (ans.grade || 0); if (!isNaN(grade)) total += grade; }
    });
    const totalSpan = document.getElementById('total-score');
    if (totalSpan) totalSpan.innerText = `${total.toFixed(1)} / ${maxTotal}`;
}

async function saveManualGrades(submissionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) return;
    const work = sub.type === 'hw' ? db.hw_list.find(h => h.n === sub.n) : db.exams.find(x => x.n === sub.n);
    if (!work) return;
    sub.answers.forEach((ans, qi) => {
        if (ans.selected === undefined) {
            const gradeInput = document.getElementById(`grade-${qi}`);
            const commentInput = document.getElementById(`comment-${qi}`);
            if (gradeInput) { const val = parseFloat(gradeInput.value); if (!isNaN(val) && val >= 0 && val <= (work.questions[qi]?.point || 10)) ans.grade = val; }
            if (commentInput) ans.comment = commentInput.value.trim();
        }
    });
    let total = 0, maxTotal = 0;
    sub.answers.forEach((ans, qi) => {
        const q = work.questions[qi];
        if (!q) return;
        maxTotal += q.point || 1;
        if (ans.selected !== undefined) { if (ans.selected === q.ans) total += q.point || 1; }
        else { total += ans.grade || 0; }
    });
    sub.score = `${total.toFixed(1)}/${maxTotal}`;
    await saveDB();
    toast('Đã lưu điểm');
    viewSubmissionDetail(submissionIndex);
}

// ========== GHI ÂM PHẢN HỒI ==========
let mediaRecorder, audioChunks = [];
let recordingSubmissionIndex = null;

async function startAudioFeedback(submissionIndex) {
    recordingSubmissionIndex = submissionIndex;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const sub = db.submissions[submissionIndex];
            if (!sub) return;
            showLoading();
            const storageRef = fbStorage.ref('audio_feedback/' + sub.u + '_' + Date.now() + '.webm');
            const uploadTask = await storageRef.put(audioBlob);
            const downloadURL = await uploadTask.ref.getDownloadURL();
            sub.audioFeedback = downloadURL;
            sub.audioFeedbackDate = new Date().toLocaleString();
            await saveDB();
            hideLoading();
            toast('Đã lưu phản hồi âm thanh');
            viewSubmissionDetail(submissionIndex);
        };
        mediaRecorder.start();
        document.getElementById('recordingStatus').innerText = '🔴 Đang ghi âm...';
        document.getElementById('startRecordBtn').disabled = true;
        document.getElementById('stopRecordBtn').disabled = false;
    } catch (e) { toast('Không thể truy cập microphone', 'error'); }
}

function stopAudioFeedback() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        document.getElementById('recordingStatus').innerText = '✅ Đã lưu';
        document.getElementById('startRecordBtn').disabled = false;
        document.getElementById('stopRecordBtn').disabled = true;
    }
}

function addAudioFeedbackUI(sub) {
    let html = '';
    if (sub.audioFeedback) {
        html += `<div style="margin-top:10px;"><b>🎙 Phản hồi âm thanh (${sub.audioFeedbackDate || 'N/A'}):</b><br>
          <audio controls src="${sub.audioFeedback}" style="width:100%; margin-top:5px;"></audio></div>`;
    }
    html += `<div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
      <button id="startRecordBtn" onclick="startAudioFeedback(${db.submissions.indexOf(sub)})">🎙 Ghi âm phản hồi</button>
      <button id="stopRecordBtn" onclick="stopAudioFeedback()" disabled>⏹ Dừng</button>
      <span id="recordingStatus" style="font-size:14px;"></span>
    </div>`;
    return html;
}

        });
    }
    html += `<br><button class="ghost" onclick="op('${type==='hw'?'2c':'2f'}')">← Quay lại</button>`;
    document.getElementById('det-content').innerHTML = html;
}

// ========== AI CHATBOT ==========
const DEFAULT_GEMINI_KEY = 'AIzaSyAkZ5mFveBNKrguL2ecCDPIj9R0AHviR0E';
function getGeminiKey() { return (db.config && db.config.geminiApiKey) || DEFAULT_GEMINI_KEY; }

function toggleChat() { document.getElementById('chatbot-window').classList.toggle('hidden'); }

async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    const messagesDiv = document.getElementById('chat-messages');
    messagesDiv.innerHTML += `<div style="margin-bottom:6px;"><b>🧑 Bạn:</b> ${msg}</div>`;
    input.value = '';
    const apiKey = getGeminiKey();
    if (!apiKey || apiKey === 'YOUR_GEMINI_API_KEY') {
        setTimeout(() => {
            messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--accent);"><b>🤖 AI:</b> (Chưa cấu hình API key) Tính năng chatbot cần API Gemini. Hãy liên hệ quản trị viên.</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }, 500);
        return;
    }
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Bạn là trợ lý ảo của hệ thống học tập PORTAL NOW.

NGUYÊN TẮC TRẢ LỜI:
1. Trả lời NGẮN GỌN, trực tiếp vào vấn đề
2. Nếu được hỏi về cách dùng hệ thống → hướng dẫn từng bước cụ thể
3. Nếu được hỏi về bài tập, kiến thức → giải thích rõ ràng, có ví dụ
4. Nếu câu hỏi không rõ → hỏi lại để làm rõ
5. TUYỆT ĐỐI KHÔNG nói "xin lỗi" hay "tôi không thể" nếu câu hỏi hợp lệ

CÂU HỎI CỦA HỌC VIÊN: ${msg}` }] }],
                generationConfig: { temperature: 0.7, maxOutputTokens: 300 }
            })
        });
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Xin lỗi, tôi chưa hiểu câu hỏi.';
        messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--accent);"><b>🤖 AI:</b> ${reply}</div>`;
    } catch (e) {
        messagesDiv.innerHTML += `<div style="margin-bottom:6px;color:var(--danger);"><b>🤖 AI:</b> Lỗi kết nối đến máy chủ AI.</div>`;
    }
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ========== AI CHẤM TỰ LUẬN ==========
async function aiGrade(submissionIndex, questionIndex) {
    const sub = db.submissions[submissionIndex];
    if (!sub) { toast('Không tìm thấy bài nộp', 'error'); return; }
    const answer = sub.answers[questionIndex];
    if (!answer || answer.selected !== undefined) { toast('Chỉ áp dụng cho câu tự luận', 'error'); return; }
    const questionText = answer.q || '';
    const studentResponse = answer.ans || '';
    const maxScore = answer.point || 10;
    const apiKey = getGeminiKey();
    if (!apiKey || apiKey === 'YOUR_GEMINI_API_KEY') { toast('Chưa cấu hình API key', 'error'); return; }
    showLoading();
    try {
        const prompt = `Bạn là giáo viên chấm bài tự luận nghiêm khắc nhưng công bằng.

CÂU HỎI: "${questionText}"
BÀI LÀM CỦA HỌC SINH: "${studentResponse}"
ĐIỂM TỐI ĐA: ${maxScore}

YÊU CẦU:
1. Cho điểm chính xác từ 0 đến ${maxScore} (có thể là số thập phân như 7.5)
2. Nhận xét cụ thể: chỉ ra điểm mạnh, điểm yếu, chỗ cần cải thiện
3. So sánh với đáp án mong đợi (nếu có thể)

TRẢ VỀ ĐÚNG ĐỊNH DẠNG SAU (không thêm gì khác):
ĐIỂM: <số điểm>
NHẬN XÉT: <nội dung nhận xét>`;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.3, maxOutputTokens: 100 }
            })
        });
        const data = await res.json();
        const generated = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const scoreMatch = generated.match(/ĐIỂM:\s*([\d.]+)/i);
        const commentMatch = generated.match(/NHẬN XÉT:\s*(.+)/i);
        const aiScore = scoreMatch ? parseFloat(scoreMatch[1]) : null;
        const aiComment = commentMatch ? commentMatch[1] : generated;
        if (aiScore !== null && aiScore >= 0 && aiScore <= maxScore) {
            const scoreField = document.getElementById(`score-${questionIndex}`);
            if (scoreField) scoreField.value = aiScore;
            answer.aiScore = aiScore;
            answer.aiComment = aiComment;
            toast(`AI đề xuất: ${aiScore}/${maxScore} điểm. ${aiComment}`, 'success');
        } else { toast('AI không trả về điểm hợp lệ', 'error'); }
    } catch (e) { toast('Lỗi kết nối AI', 'error'); }
    hideLoading();
}

// ========== DỌN DẸP DỮ LIỆU ==========
function renderCleanup(c) {
    const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
    const currentYear = new Date().getFullYear();
    c.innerHTML = `<h3>🧹 Dọn dẹp dữ liệu cũ</h3>
      <div class="card">
        <p>Chọn thời điểm: mọi dữ liệu <b>trước</b> tháng/năm sẽ bị xóa.</p>
        <div style="display:flex; gap:10px;">
          <select id="clean-month">${months.map(m => `<option value="${m}">Tháng ${m}</option>`).join('')}</select>
          <input id="clean-year" type="number" value="${currentYear}" min="2020" max="${currentYear+1}">
        </div>
        <hr>
        <button class="danger" onclick="executeCleanup('all')" style="margin:4px;">🗑️ Xóa TẤT CẢ</button>
        <button class="danger" onclick="executeCleanup('submissions')" style="margin:4px;">🗑️ Xóa bài nộp</button>
        <button class="danger" onclick="executeCleanup('notif')" style="margin:4px;">🗑️ Xóa thông báo</button>
        <button class="danger" onclick="executeCleanup('audit')" style="margin:4px;">🗑️ Xóa lịch sử hoạt động</button>
        <button class="danger" onclick="executeCleanup('sked')" style="margin:4px;">🗑️ Xóa lịch sử tuần</button>
      </div>`;
}

async function executeCleanup(type) {
    const month = document.getElementById('clean-month').value;
    const year = document.getElementById('clean-year').value;
    const cutoff = new Date(`${year}-${month}-01T00:00:00`);
    if (isNaN(cutoff.getTime())) { toast('Thời gian không hợp lệ', 'error'); return; }
    
    const typeNames = { all: 'tất cả', submissions: 'bài nộp', notif: 'thông báo', audit: 'lịch sử hoạt động', sked: 'lịch sử tuần' };
    
    modal(`Xác nhận xóa ${typeNames[type]} trước ${month}/${year}?`, async () => {
        showLoading();
        if (type === 'all' || type === 'submissions') {
            db.submissions = (db.submissions || []).filter(s => new Date(s.date) >= cutoff);
            await saveDB('submissions', db.submissions);
        }
        if (type === 'all' || type === 'notif') {
            db.notif_history = (db.notif_history || []).filter(n => new Date(n.date) >= cutoff);
            await saveDB('notif_history', db.notif_history);
            if (db.private_notif) {
                for (let uid in db.private_notif) {
                    db.private_notif[uid] = (db.private_notif[uid] || []).filter(n => new Date(n.date) >= cutoff);
                    await saveDB(`private_notif/${uid}`, db.private_notif[uid]);
                }
            }
        }
        if (type === 'all' || type === 'audit') {
            db.audit_log = (db.audit_log || []).filter(l => new Date(l.timestamp) >= cutoff);
            await saveDB('audit_log', db.audit_log);
        }
        if (type === 'all') {
            db.forgot_pwd = (db.forgot_pwd || []).filter(r => new Date(r.date) >= cutoff);
            await saveDB('forgot_pwd', db.forgot_pwd);
        }
        if (type === 'all' || type === 'sked') {
            db.sked_history = (db.sked_history || []).filter(h => new Date(h.date) >= cutoff);
            await saveDB('sked_history', db.sked_history);
        }
        hideLoading();
        toast('Đã dọn dẹp xong!');
        op('cleanup');
    });
}

// ========== CÁC HÀM LƯU LỊCH SỬ TUẦN ==========
async function saveWeekToHistory() {
    if (!db.sked_history) db.sked_history = [];
    db.sked_history.unshift({ id: Date.now(), t: db.sked.t, date: new Date().toLocaleDateString(), slots: JSON.parse(JSON.stringify(db.sked.slots)) });
    await saveDB();
    toast('Đã lưu lịch sử tuần');
}

// ========== KHỞI ĐỘNG ==========
(async function init() {
    await loadDB();
    updateStats();
    setInterval(() => {
        if (!db.hw_list) return;
        const now = Date.now();
        db.hw_list.forEach(h => {
            if (h.end && h.assignedTo && new Date(h.end).getTime() - now <= 15*60*1000 && new Date(h.end).getTime() > now) {
                h.assignedTo.forEach(uid => {
                    if (Notification.permission === 'granted') {
                        new Notification(`Sắp hết hạn: ${h.n}`, { body: 'Bạn có 15 phút để nộp bài!' });
                    }
                });
            }
        });
    }, 60000);
    if (window.Notification && Notification.permission === 'default') {
        Notification.requestPermission();
    }
})();
