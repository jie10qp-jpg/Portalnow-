<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL NOW - V19 ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0a0a0f; --card: #12121a; --border: #252535;
            --accent: #ff6b6b; --blue: #5b9bd5; --green: #4ecb71;
            --gold: #e8b730; --red: #e84545; --text: #d0d0d8;
            --sub: #7a7a8a; --r: 14px; --shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            line-height: 1.6; font-size: 14px; overflow-x: hidden;
        }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* LOGIN */
        #pg-login {
            min-height: 100vh; display: flex; justify-content: center;
            align-items: center; padding: 20px;
            background: radial-gradient(ellipse at top, #1a1a2e, #0a0a0f);
        }
        .login-box {
            background: var(--card); padding: 40px 30px; border-radius: 20px;
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .login-box .logo { font-size: 40px; margin-bottom: 5px; }
        .login-box h2 { color: #fff; font-size: 22px; margin-bottom: 2px; font-weight: 700; letter-spacing: -0.5px; }
        .login-box .sub { color: var(--sub); font-size: 11px; margin-bottom: 25px; }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 42px; }
        .pw-wrap .eye {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 18px; user-select: none; color: var(--sub);
            transition: color 0.2s;
        }
        .pw-wrap .eye:hover { color: var(--accent); }

        input, textarea, select {
            width: 100%; padding: 11px 14px; margin: 5px 0;
            background: #0a0a0f; border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 13px;
            font-family: inherit; transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255,107,107,0.08);
        }
        textarea { min-height: 80px; resize: vertical; }

        .btn {
            width: 100%; padding: 12px 16px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: 600; font-size: 13px;
            margin: 4px 0; transition: all 0.2s; letter-spacing: 0.2px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-outline { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .btn-sm { width: auto; padding: 6px 14px; font-size: 11px; border-radius: 8px; }
        .btn-xs { width: auto; padding: 4px 10px; font-size: 10px; border-radius: 6px; }

        .link-row { display: flex; justify-content: center; margin-top: 14px; font-size: 11px; gap: 20px; }
        .link-row a { color: var(--blue); cursor: pointer; text-decoration: none; }

        .msg { padding: 10px 12px; margin: 8px 0; border-radius: 8px; font-size: 11px; text-align: left; }
        .msg-info { background: #1a2535; color: #8cb8e0; border-left: 3px solid var(--blue); }
        .msg-err { background: #2a1515; color: #e88888; border-left: 3px solid var(--red); }
        .msg-ok { background: #152515; color: #88e888; border-left: 3px solid var(--green); }

        /* HEADER */
        .header {
            background: rgba(18,18,26,0.95); backdrop-filter: blur(10px);
            padding: 12px 18px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header h3 { font-size: 14px; color: #fff; font-weight: 700; }

        .container { max-width: 900px; margin: 0 auto; padding: 14px; padding-bottom: 85px; }

        .grid2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-top: 10px; }
        .grid3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 6px; }
        .menu-card {
            background: var(--card); padding: 14px 8px; border-radius: var(--r);
            text-align: center; cursor: pointer; border: 1px solid var(--border);
            transition: all 0.2s; font-size: 10px; font-weight: 600;
        }
        .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,107,107,0.1); }
        .menu-card .icon { font-size: 20px; display: block; margin-bottom: 3px; }
        .menu-card.sel { border-color: var(--green); background: #152515; }

        .card {
            background: var(--card); padding: 16px; border-radius: var(--r);
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .card h4 { margin-bottom: 6px; color: var(--accent); font-size: 13px; font-weight: 700; }
        .card h5 { color: var(--sub); font-size: 11px; margin-bottom: 4px; }

        .form-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 80px; }
        .label { font-size: 10px; color: var(--sub); margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.4px; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #0a0a0f; color: var(--sub); font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
        tr:hover td { background: rgba(255,255,255,0.015); }

        .tag { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; }
        .tag-on { background: #152515; color: var(--green); }
        .tag-off { background: #2a1515; color: var(--red); }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); padding: 22px; border-radius: var(--r);
            z-index: 300; width: 94%; max-width: 440px; max-height: 85vh;
            overflow-y: auto; border: 1px solid var(--border); display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal.active { display: block; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 250; display: none; }
        .overlay.active { display: block; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18,18,26,0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            padding: 6px 4px; border-top: 1px solid var(--border); z-index: 100;
        }
        .bottom-nav .ni {
            display: flex; flex-direction: column; align-items: center;
            color: var(--sub); font-size: 9px; cursor: pointer;
            padding: 5px 8px; border-radius: 10px; transition: all 0.2s;
            text-decoration: none; position: relative; flex: 1;
        }
        .bottom-nav .ni.ac { color: var(--accent); }
        .bottom-nav .ni.me-tab { color: var(--gold); font-weight: 700; }
        .bottom-nav .ni.me-tab.ac { color: var(--gold); background: rgba(232,183,48,0.1); }
        .bottom-nav .ni .ni-icon { font-size: 18px; }
        .badge {
            position: absolute; top: -4px; right: 15%; background: var(--red);
            color: #fff; border-radius: 50%; width: 16px; height: 16px;
            font-size: 9px; display: flex; align-items: center; justify-content: center;
        }

        .avatar-section { text-align: center; padding: 10px 0; }
        .avatar-img { font-size: 50px; cursor: pointer; transition: transform 0.2s; }
        .avatar-img:hover { transform: scale(1.1); }
        .icon-picker { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
        .icon-picker span { font-size: 22px; cursor: pointer; padding: 5px; border-radius: 8px; transition: all 0.2s; }
        .icon-picker span:hover { background: rgba(255,107,107,0.2); }
        .icon-picker span.sel { background: rgba(255,107,107,0.4); }

        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .exam-block { border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin: 8px 0; background: #0a0a0f; }
        .question-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .question-nav span {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600;
            background: var(--card); border: 1px solid var(--border); transition: all 0.2s;
        }
        .question-nav span.done { background: var(--green); color: #000; border-color: var(--green); }
        .question-nav span.flagged { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,183,48,0.3); }
        .question-nav span.current { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,107,107,0.3); }

        .timer {
            font-size: 16px; font-weight: 700; color: var(--accent);
            text-align: center; padding: 8px; background: var(--card);
            border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);
        }
        .timer.warning { animation: pulse 1s infinite; color: var(--red); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        .rich-toolbar { display: flex; gap: 4px; margin-bottom: 4px; flex-wrap: wrap; }
        .rich-toolbar button {
            padding: 4px 8px; font-size: 11px; cursor: pointer;
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; transition: all 0.15s;
        }
        .rich-toolbar button:hover { border-color: var(--accent); }
        .rich-toolbar button.act { background: var(--accent); color: #fff; }

        @media (max-width: 500px) {
            .grid2 { grid-template-columns: repeat(2, 1fr); }
            .login-box { padding: 28px 18px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="ovl" onclick="clsMod()"></div>

<!-- LOGIN -->

            <div class="menu-card" onclick="navAd('students')"><span class="icon">👥</span>Học viên</div>
            <div class="menu-card" onclick="navAd('progress')"><span class="icon">📋</span>Chương trình</div>
            <div class="menu-card" onclick="navAd('fee')"><span class="icon">💰</span>Học phí</div>
            <div class="menu-card" onclick="navAd('results')"><span class="icon">📊</span>Kết quả</div>
            <div class="menu-card" onclick="navAd('support')"><span class="icon">🆘</span>Hỗ trợ <span id="sup-badge" style="display:none;color:red">●</span></div>
            <div class="menu-card" onclick="navAd('settings')"><span class="icon">🔧</span>Cài đặt</div>
        </div>
        <div id="ad-content"></div>

</div>

    <div class="container" id="hv-main"></div>
    <div class="bottom-nav" id="bnav">
        <div class="ni ac" onclick="navSt('home')"><span class="ni-icon">🏠</span><span id="tt-home">Trang chủ</span></div>
        <div class="ni" onclick="navSt('schedule')"><span class="ni-icon">📅</span><span id="tt-sched">Lịch học</span></div>
        <div class="ni me-tab ac" onclick="navSt('me')"><span class="ni-icon">👤</span><span id="tt-me">Tôi</span></div>
        <div class="ni" onclick="navSt('homework')"><span class="ni-icon">📝</span><span id="tt-hw">Bài tập</span><span class="badge" id="hw-badge" style="display:none">!</span></div>
        <div class="ni" onclick="navSt('exam')"><span class="ni-icon">📄</span><span id="tt-exam">Bài thi</span><span class="badge" id="ex-badge" style="display:none">!</span></div>
    </div>
</div>

<script>
// ===== FIREBASE =====
const fbConfig = {
    apiKey: "AIzaSyB2GSKsrFcLlf3IY8TxRH6tXhWyg3Jh-Io",
    authDomain: "portalnow-16452.firebaseapp.com",
    databaseURL: "https://portalnow-16452-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "portalnow-16452"
};
let dbRef;
try { firebase.initializeApp(fbConfig); dbRef = firebase.database(); } catch(e) { alert('Firebase error: '+e.message); }

const H = t => CryptoJS.SHA256(t).toString();
let U = null, DB = {}, stm = null, timerInterval = null, timeLeft = 0;
let _mcq=[],_essay=[],_hwMcq=[],_hwEssay=[];
let currentLang = 'vi';
// Hàm hiển thị thông báo trong ô login-msg
function MSG(text, type) {
    const el = document.getElementById('login-msg');
    if (!el) return;
    el.className = 'msg';
    if (type === 'err') el.classList.add('msg-err');
    else if (type === 'ok') el.classList.add('msg-ok');
    else el.classList.add('msg-info');
    el.innerText = text;
}

// ===== TRANSLATIONS =====
const LANG = {
    vi: {
        loginSub:'Hệ thống quản lý học tập',user:'Tên đăng nhập',pw:'Mật khẩu',pin:'Mã PIN (Admin)',
        login:'ĐĂNG NHẬP',forgot:'Quên mật khẩu',logout:'ĐĂNG XUẤT TÀI KHOẢN',
        home:'Trang chủ',sched:'Lịch học',me:'Tôi',hw:'Bài tập',exam:'Bài thi',
        welcome1:'🎉 Xin chào học viên {0}, chào mừng bạn đã đến với chúng tôi!',
        welcome2:'👋 Xin chào {0}!',
        support:'Hỗ trợ/Khiếu nại',payTitle:'💳 Đóng học phí',
        payInfo:'Thông tin chuyển khoản',payWait:'⏳ Xin đợi ít nhất 1 tiếng để admin cập nhật',
        sureSubmit:'Bạn chắc chắn muốn nộp bài?',checkUnanswered:'Bạn hãy kiểm tra kĩ những câu chưa làm nhé!',
        autoSubmit:'⏰ Hết giờ! Bài đã được tự động nộp.',saveAv:'💾 Lưu avatar',
        fullName:'Họ và tên',class_:'Lớp',language:'Ngoại ngữ',
        register:'Đăng ký',regMany:'Đăng ký nhiều tiết',noReg:'Chưa đăng ký tiết nào',
        history:'Lịch sử đăng ký',viewHistory:'Xem lịch sử',
        editStudent:'Sửa học viên',editAdmin:'Sửa Admin',addAdmin:'Thêm Admin',
        deleteAdmin:'Xóa Admin',deleteAdminConfirm:'Bạn có chắc muốn xóa admin này?',
        cannotDeleteLast:'Không thể xóa admin cuối cùng',
        usernameTaken:'Tên đăng nhập đã tồn tại'
    },
    en: {
        loginSub:'Learning Management System',user:'Username',pw:'Password',pin:'Admin PIN',
        login:'LOGIN',forgot:'Forgot Password',logout:'LOG OUT',
        home:'Home',sched:'Schedule',me:'Profile',hw:'Homework',exam:'Exam',
        welcome1:'🎉 Welcome {0}, glad to have you with us!',
        welcome2:'👋 Hello {0}!',
        support:'Support/Complaint',payTitle:'💳 Pay Tuition',
        payInfo:'Bank Transfer Info',payWait:'⏳ Please wait at least 1 hour for admin update',
        sureSubmit:'Are you sure to submit?',checkUnanswered:'Please check unanswered questions!',
        autoSubmit:'⏰ Time up! Auto-submitted.',saveAv:'💾 Save Avatar',
        fullName:'Full Name',class_:'Class',language:'Language',
        register:'Register',regMany:'Register Multiple Slots',noReg:'No slots registered',
        history:'Registration History',viewHistory:'View History',
        editStudent:'Edit Student',editAdmin:'Edit Admin',addAdmin:'Add Admin',
        deleteAdmin:'Delete Admin',deleteAdminConfirm:'Are you sure to delete this admin?',
        cannotDeleteLast:'Cannot delete the last admin',
        usernameTaken:'Username already exists'
    }
};
function t(key,...args){
    let str = (LANG[currentLang] && LANG[currentLang][key]) ? LANG[currentLang][key] : (LANG.vi[key]||key);
    args.forEach((a,i)=>str=str.replace(`{${i}}`,a));
    return str;
}
function applyLang(){
    document.getElementById('login-sub').innerText = t('loginSub');
    document.getElementById('un').placeholder = t('user');
    document.getElementById('pw').placeholder = t('pw');
    document.getElementById('pin').placeholder = t('pin');
    document.querySelector('#pg-login .btn-accent').innerText = t('login');
    document.querySelectorAll('.link-row a')[0].innerText = t('forgot');
    const tt=['home','sched','me','hw','exam'];
    ['tt-home','tt-sched','tt-me','tt-hw','tt-exam'].forEach((id,i)=>document.getElementById(id).innerText=t(tt[i]));
}
function setLang(l){
    currentLang = l;
    if(!DB.config)DB.config={};
    DB.config.lang = l;
    save('/config/lang',l);
    applyLang();
    if(U&&U.r==='hv') navSt('me');
}

function SHOW(id){
    document.querySelectorAll('body>div:not(.overlay):not(.modal)').forEach(d=>d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}
function logout(){ U=null; clearInterval(timerInterval); SHOW('pg-login'); document.getElementById('pin-wrap').style.display='none'; document.getElementById('pin').value=''; }
function clsMod(){ document.getElementById('mod').classList.remove('active'); document.getElementById('ovl').classList.remove('active'); }
function showMod(type, data){
    const m=document.getElementById('mod'), o=document.getElementById('ovl');
    o.classList.add('active'); m.classList.add('active');
    if(type==='forgot'){
        m.innerHTML=`<h4>🔑 ${t('forgot')}</h4><input id="fp-n" placeholder="${t('fullName')}"><input id="fp-c" placeholder="${t('class_')}"><input id="fp-e" placeholder="Email"><button class="btn btn-blue" onclick="subFP()">GỬI</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;
    } else if(type==='support'){
        m.innerHTML=`<h4>💬 ${t('support')}</h4><input id="sp-n" placeholder="${t('fullName')}"><input id="sp-c" placeholder="${t('class_')}"><textarea id="sp-m" placeholder="Nội dung..."></textarea><button class="btn btn-blue" onclick="subSP()">GỬI</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;
    } else if(type==='pay'){
        const fi = DB.config?.bankInfo||'Chưa có thông tin';
        m.innerHTML=`<h4>${t('payTitle')}</h4><div class="card"><div style="white-space:pre-wrap">${fi}</div></div>
            <div class="label">Tải ảnh (không bắt buộc)</div><input id="pay-img" type="file" accept="image/*">
            <button class="btn btn-green" onclick="subPay()">GỬI XÁC NHẬN</button><button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>
            <p style="font-size:10px;color:var(--sub);margin-top:4px">${t('payWait')}</p>`;
    } else if(type==='editSlot'){
        const i=data.index;
        const s=DB.sked.slots[i];
        const days=['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ nhật'];
        let opts='';
        days.forEach((d,idx)=>{
            opts+=`<option value="${d}" ${s.d===d?'selected':''}>${d}</option>`;
        });
        m.innerHTML=`<h4>✏️ Sửa slot</h4>
            <div class="label">Tên môn</div><input id="eds-n" value="${s.n}">
            <div class="label">Thứ</div><select id="eds-d">${opts}</select>
            <div class="label">Giờ</div><input id="eds-t" value="${s.ti}">
            <div class="label">Slot tối đa</div><input id="eds-c" type="number" value="${s.c}">
            <button class="btn btn-green" onclick="saveEditSlot(${i})">💾 LƯU</button>
            <button class="btn btn-outline" onclick="clsMod()">ĐÓNG</button>`;

let pendingAdmin=null;
function doLogin(){
    const un=document.getElementById('un').value.trim(),pw=document.getElementById('pw').value.trim();
    if(!un||!pw){MSG('Nhập đủ thông tin!','err');return;}
    const adm=(DB.admins||[]).find(a=>a.u===un);
    if(adm&&(adm.p===H(pw)||adm.p===pw)){pendingAdmin=adm;document.getElementById('pin-wrap').style.display='block';document.getElementById('pin').focus();MSG('🔐 Nhập mã PIN','info');return;}
    const st=(DB.hv||[]).find(h=>h.u===un);
    if(st&&(st.p===H(pw)||st.p===pw)){U={r:'hv',...st};if(!U.avatar)U.avatar='👤';U.loginCount=(U.loginCount||0)+1;document.getElementById('hv-title').innerText=U.n;SHOW('pg-hv');navSt('home');return;}
    MSG('❌ Sai tài khoản/mật khẩu!','err');
}
document.getElementById('pin').addEventListener('keyup',function(e){
    if(this.value.length>=4){
        const pin=this.value,cp=pendingAdmin?.pin||DB.config?.adminPin||'2468';
        if(pin===cp){U={r:'admin',name:pendingAdmin.u};pendingAdmin=null;document.getElementById('pin-wrap').style.display='none';this.value='';SHOW('pg-admin');navAd('schedule');}
        else{MSG('❌ Sai PIN!','err');this.value='';}
    }
});

function wrapTag(tag){
    const ta=document.getElementById('nfg');
    const s=ta.selectionStart,e=ta.selectionEnd;
    const txt=ta.value.substring(s,e);
    const openTag=tag.includes('=')?tag.split(' ')[0]+' '+tag.split(' ')[1]:tag;
    ta.value=ta.value.substring(0,s)+`<${tag}>${txt||'text'}</${openTag.split(' ')[0].replace('<','')}>`+ta.value.substring(e);
    ta.focus();
}
function checkShortcut(){const txt=document.getElementById('nfg').value;(DB.shortcuts||[]).forEach(s=>{if(txt.includes(s.key))document.getElementById('nfg').value=txt.replace(s.key,s.val);});}
function addSC(){const k=document.getElementById('sc-key').value.trim(),v=document.getElementById('sc-val').value.trim();if(!k||!v)return;if(!DB.shortcuts)DB.shortcuts=[];DB.shortcuts.push({key:k,val:v});save('/shortcuts',DB.shortcuts);navAd('notif');}
function delSC(i){DB.shortcuts.splice(i,1);save('/shortcuts',DB.shortcuts);navAd('notif');}
function sendGN(){const m=document.getElementById('nfg').value.trim();if(!m)return;if(!DB.notif_history)DB.notif_history=[];DB.notif_history.unshift({msg:m,date:new Date().toLocaleString()});(DB.hv||[]).forEach(h=>{if(!DB.data[h.u])DB.data[h.u]={};DB.data[h.u]['2b_new']=true;});save('/notif_history',DB.notif_history);navAd('notif');}
function sendPN(){const t=document.getElementById('nft').value,m=document.getElementById('nfp').value.trim();if(!t||!m)return;if(!DB.personal_notif)DB.personal_notif={};if(!DB.personal_notif[t])DB.personal_notif[t]=[];DB.personal_notif[t].push({msg:m,date:new Date().toLocaleString(),read:false});save('/personal_notif',DB.personal_notif);alert('✅');navAd('notif');}

function navSt(pg){
    const items=document.querySelectorAll('#bnav .ni');
    items.forEach(el=>el.classList.remove('ac'));
    const idx={home:0,schedule:1,me:2,homework:3,exam:4};
    if(items[idx[pg]])items[idx[pg]].classList.add('ac');

    const m=document.getElementById('hv-main');
    if(!DB.data)DB.data={};
    const d=DB.data[U.u]||{};
    const pn=DB.personal_notif?.[U.u]||[];

    if(pg==='home'){
        m.innerHTML=`<div class="card" style="text-align:center"><h3>${U.loginCount<=1?t('welcome1',U.n):t('welcome2',U.n)}</h3></div>`;
        m.innerHTML+=`<h4>📢 Thông báo</h4>`;
        (DB.notif_history||[]).slice(0,5).forEach(n=>m.innerHTML+=`<div class="card" onclick="markRead('${U.u}','gen')"><small>${n.date}</small><br><span>${n.msg}</span></div>`);
        pn.slice(0,5).forEach(n=>m.innerHTML+=`<div class="card"><small>${n.date}</small><br><span>${n.msg}</span></div>`);
        if(d['2b_new']){d['2b_new']=false;save(`/data/${U.u}/2b_new`,false);checkBadges();}
    } else if(pg==='schedule'){
        const sk=DB.sked||{};
        const now=new Date();
        let canReg=sk.isOpen;
        if(sk.openTime&&new Date(sk.openTime)>now)canReg=false;
        if(sk.closeTime&&new Date(sk.closeTime)<now)canReg=false;
        m.innerHTML=`<h4>📅 ${sk.t||'Lịch học'}</h4>`;
        if(canReg){
            m.innerHTML+=`<p style="font-size:11px;color:var(--sub)">⚠️ Cần đăng ký ít nhất 2 tiết</p>`;
            // Checkbox list
            let form=`<div class="grid3">`;
            (sk.slots||[]).forEach((s,i)=>{
                const checked=(s.r||[]).includes(U.u)?'checked':'';
                form+=`<div class="menu-card"><label style="cursor:pointer"><input type="checkbox" id="chk-${i}" ${checked}><br><b>${s.n}</b><br>${s.d}<br>${s.ti}<br><small>${(s.r||[]).length}/${s.c}</small></label></div>`;
            });
            form+=`</div><button class="btn btn-sm btn-green" onclick="regMultiple()">${t('regMany')}</button>`;
            m.innerHTML+=form;
        } else {
            m.innerHTML+=`<p>⛔ Không trong thời gian đăng ký</p>`;
        }
        m.innerHTML+=`<h5>📌 Đã ĐK:</h5>`;
        const registeredSlots=(sk.slots||[]).filter(s=>(s.r||[]).includes(U.u));
        if(registeredSlots.length){
            registeredSlots.forEach(s=>m.innerHTML+=`<div class="card"><span>✅ ${s.n} - ${s.d} ${s.ti}</span></div>`);
        } else {
            m.innerHTML+=`<p>${t('noReg')}</p>`;
        }
        // History button
        m.innerHTML+=`<button class="btn btn-sm btn-outline" onclick="viewRegHistory()">${t('viewHistory')}</button>`;
    } else if(pg==='homework'){
        m.innerHTML=`<h4>📝 Bài tập</h4>`;
        (DB.hw_list||[]).forEach((h,i)=>m.innerHTML+=`<div class="card"><b>${h.n}</b><br><small>${h.start||'?'}→${h.end||'?'} | ${h.t||30}ph | Slot:${h.slot||1}</small><br><button class="btn btn-sm btn-blue" onclick="stHW(${i})">LÀM</button><button class="btn btn-sm btn-outline" onclick="vwMySub('${h.n}')">📋 Đã nộp</button></div>`);
    } else if(pg==='exam'){
        m.innerHTML=`<h4>📄 Thi cử</h4>`;
        (DB.exams||[]).filter(x=>x.st=='1').forEach((x,i)=>m.innerHTML+=`<div class="card"><b>${x.n}</b> <small>(${x.t}ph - Slot:${x.slot||1})</small><button class="btn btn-sm btn-gold" onclick="stEx(${i})">VÀO THI</button></div>`);
        m.innerHTML+=`<h5>Đã thi:</h5>`;
        (DB.submissions||[]).filter(s=>s.u===U.u&&s.type==='exam').forEach(s=>{
            const ex=(DB.exams||[]).find(x=>x.n===s.n);
            const canView=ex&&ex.st==='0'&&s.scored;
            m.innerHTML+=`<div class="card"><b>${s.n}</b> - ${s.date}<br>
                ${s.scored?`TN: ${s.mcqScore||'?'} | TL: ${s.essayScore||'?'}`:'Chờ chấm'}
                ${canView?`<br><button class="btn btn-xs btn-outline" onclick="vwExRes('${s.n}')">👁 Xem</button>`:''}
            </div>`;
        });
    } else if(pg==='me'){
        const avs=['👤','👨‍🎓','👩‍🎓','🧑‍🎓','👨‍💻','👩‍💻','🧑‍💻','🦊','🐱','🐶','🐼','🐨','🦁','🐯','🐸','🐵','🐔','🦄','🐙','🦋'];
        m.innerHTML=`<div class="avatar-section">
            <div class="avatar-img" onclick="shAv()">${U.avatar||'👤'}</div>
            <div id="avp" style="display:none" class="icon-picker">${avs.map(a=>`<span onclick="selAv('${a}')" class="${U.avatar===a?'sel':''}">${a}</span>`).join('')}</div>
            <button class="btn btn-sm btn-outline" onclick="saveAv()" style="margin-top:4px">${t('saveAv')}</button>
            <div style="margin-top:8px"><b>${t('fullName')}:</b> ${U.n}<br><b>${t('class_')}:</b> ${U.l||'Chưa có'}</div>
            <div style="margin-top:8px"><b>${t('language')}:</b> 
                <select onchange="setLang(this.value)" style="width:auto;display:inline">
                    <option value="vi" ${currentLang==='vi'?'selected':''}>Tiếng Việt</option>
                    <option value="en" ${currentLang==='en'?'selected':''}>English</option>
                </select>
            </div>
        </div>
        <div class="card" onclick="vwScore()"><h5>📊 Kết quả</h5></div>
        <div class="card" onclick="vwProg()"><h5>📋 Chương trình</h5></div>
        <div class="card" onclick="vwFee()"><h5>💰 Học phí</h5></div>
        <div class="card" onclick="showMod('support')"><h5>💬 ${t('support')}</h5></div>
        <button class="btn btn-red" onclick="logout()" style="margin-top:8px">🚪 ${t('logout')}</button>`;
    }
}

function selAv(a){selectedAvatar=a;U.avatar=a;navSt('me');}
function saveAv(){if(selectedAvatar){const h=DB.hv.find(h=>h.u===U.u);if(h){h.avatar=selectedAvatar;save('/hv',DB.hv);alert('✅');}}}
function checkBadges(){

    document.getElementById('ex-badge').style.display='none';
    if(DB.data?.[U.u]?.['2c_new']){document.getElementById('hw-badge').style.display='flex';}
    if(DB.data?.[U.u]?.['2f_new']){document.getElementById('ex-badge').style.display='flex';}
}
function vwScore(){const d=DB.data[U.u]||{};document.getElementById('hv-main').innerHTML=`<h4>📊 Bảng điểm</h4><h5>Tích lũy</h5><table>${(d.pts_tl||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table><h5>Kiểm tra</h5><table>${(d.pts_kt||[]).map(p=>`<tr><td>${p.n}</td><td>${p.s}</td><td>${p.cm}</td></tr>`).join('')}</table><button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;}
function vwProg(){const d=DB.data[U.u]||{};document.getElementById('hv-main').innerHTML=`<h4>📋 Chương trình</h4><div class="card" style="white-space:pre-wrap">${d.prog||'Chưa có'}</div><button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;}

        <hr style="border-color:var(--border);margin:8px 0">
        <div style="white-space:pre-wrap;font-size:11px">${DB.config?.bankInfo||''}</div>
        <button class="btn btn-sm btn-gold" onclick="showMod('pay')">💳 ĐÓNG TIỀN</button></div>
        <h5>LS đóng</h5>${(f.logs||[]).map(l=>`<div class="card"><small>${l}</small></div>`).join('')||'<p>Chưa có</p>'}
        <button class="btn btn-sm btn-outline" onclick="navSt('me')">←</button>`;
}

// ===== REGISTRATION MULTIPLE + HISTORY =====
function regMultiple(){
    const sk=DB.sked;
    const slots=sk.slots;
    const selected=[];
    slots.forEach((s,i)=>{
        if(document.getElementById('chk-'+i)?.checked) selected.push(i);
    });
    if(selected.length<2) return alert('⚠️ Cần đăng ký ít nhất 2 tiết!');
    // Remove user from all slots first
    slots.forEach(s=>{s.r=(s.r||[]).filter(u=>u!==U.u);});
    // Add to selected
    selected.forEach(i=>slots[i].r.push(U.u));
    save('/sked/slots',sk.slots);
    alert('✅ Đã đăng ký '+selected.length+' tiết');
    navSt('schedule');
}

function viewRegHistory(){
    const hist=DB.sked?.history||[];
    const m=document.getElementById('hv-main');
    if(!hist.length){
        m.innerHTML=`<h4>${t('history')}</h4><p>Không có lịch sử tuần nào.</p><button class="btn btn-sm btn-outline" onclick="navSt('schedule')">←</button>`;
        return;
    }
    let html=`<h4>📜 ${t('history')}</h4>`;
    hist.forEach((h,i)=>{
        const mySlots=(h.slots||[]).filter(s=>(s.r||[]).includes(U.u));
        html+=`<div class="card" onclick="viewHistoryWeek(${i})" style="cursor:pointer"><b>${h.t}</b> - ${h.date}<br><small>Đã đăng ký: ${mySlots.length} tiết</small></div>`;
    });
    html+=`<button class="btn btn-sm btn-outline" onclick="navSt('schedule')">←</button>`;
    m.innerHTML=html;
}
function viewHistoryWeek(idx){
    const h=DB.sked.history[idx];
    const m=document.getElementById('hv-main');
    let html=`<h4>📅 ${h.t} (${h.date})</h4>`;
    if(!h.slots||!h.slots.length){
        html+='<p>Không có slot.</p>';
    } else {
        h.slots.forEach(s=>{
            const registered=(s.r||[]).includes(U.u)?'✅':'⬜';
            html+=`<div class="card"><b>${registered} ${s.n}</b> | ${s.d} ${s.ti} | ${(s.r||[]).length}/${s.c}</div>`;
        });
    }
    html+=`<button class="btn btn-sm btn-outline" onclick="viewRegHistory()">← Quay lại</button>`;
    m.innerHTML=html;
}

// ===== HOMEWORK/EXAM RENDERING (unchanged but needed) =====
function stHW(i){const h=DB.hw_list[i];stm=new Date();timeLeft=(h.t||30)*60;startTimer();renderHWExam('hw',h);}
function stEx(i){const x=DB.exams[i];const p=prompt('🔒 MK đề:');if(p!==x.p)return alert('❌ Sai!');stm=new Date();timeLeft=(x.t||45)*60;startTimer();renderHWExam('exam',x);}
function startTimer(){
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        timeLeft--;
        const el=document.getElementById('timer');
        if(el){
            const m=Math.floor(timeLeft/60),s=timeLeft%60;
            el.innerText=`⏱ ${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft<60)el.classList.add('warning');
            if(timeLeft<=0){clearInterval(timerInterval);autoSubmit();}
        }
    },1000);
}
function autoSubmit(){
    alert(t('autoSubmit'));
    const type=document.getElementById('exam-form')?'exam':'hw';
    if(type==='hw')doSubmitHW();else doSubmitEx();
}
function renderHWExam(type,data){
    const total=(data.mcq||[]).length+(data.essay||[]).length;
    let h=`<div class="timer" id="timer">⏱ ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}</div>`;
    h+=`<h4>${type==='hw'?'📝':'📄'} ${data.n}</h4>`;
    if(total>0){
        h+=`<div class="question-nav" id="q-nav">`;
        for(let j=0;j<total;j++)h+=`<span onclick="goToQ(${j})" id="qbtn-${j}">${j+1}</span>`;
        h+=`</div>`;
    }
    h+=`<form id="exam-form">`;
    let qIdx=0;
    if(data.mcq?.length)data.mcq.forEach((m,j)=>{
        h+=`<div class="exam-block" id="q-${qIdx}"><b>Câu ${j+1} (${m.pt}đ):</b> ${m.q}<br>
            <label><input type="radio" name="mq${j}" value="A" onchange="markQ(${qIdx})"> A.${m.a}</label><br>
            <label><input type="radio" name="mq${j}" value="B" onchange="markQ(${qIdx})"> B.${m.b}</label><br>
            <label><input type="radio" name="mq${j}" value="C" onchange="markQ(${qIdx})"> C.${m.c}</label><br>
            <label><input type="radio" name="mq${j}" value="D" onchange="markQ(${qIdx})"> D.${m.d}</label>
            <br><button type="button" class="btn btn-xs btn-outline" onclick="flagQ(${qIdx})">🚩</button></div>`;
        qIdx++;
    });
    if(data.essay?.length)data.essay.forEach((e,j)=>{
        h+=`<div class="exam-block" id="q-${qIdx}"><b>Câu ${j+1} (${e.pt}đ):</b> ${e.q||''}<br><textarea id="es${j}" oninput="markQ(${qIdx})"></textarea>
            <button type="button" class="btn btn-xs btn-outline" onclick="flagQ(${qIdx})">🚩</button></div>`;
        qIdx++;
    });
    h+=`</form><button class="btn btn-green" onclick="confirmSubmit('${type}','${data.n}')">📤 NỘP</button>`;
    document.getElementById('hv-main').innerHTML=h;
}
function markQ(idx){const btn=document.getElementById('qbtn-'+idx);if(btn)btn.classList.add('done');}
function flagQ(idx){const btn=document.getElementById('qbtn-'+idx);if(btn)btn.classList.toggle('flagged');}
function goToQ(idx){document.getElementById('q-'+idx)?.scrollIntoView({behavior:'smooth'});}
function confirmSubmit(type,n){
    let unanswered=[];
    const data=type==='hw'?DB.hw_list.find(h=>h.n===n):DB.exams.find(e=>e.n===n);
    let qIdx=0;
    if(data.mcq)data.mcq.forEach((_,i)=>{if(!document.querySelector(`input[name="mq${i}"]:checked`))unanswered.push(qIdx+1);qIdx++;});
    if(data.essay)data.essay.forEach((_,i)=>{if(!document.getElementById(`es${i}`)?.value.trim())unanswered.push(qIdx+1);qIdx++;});
    if(unanswered.length>0){
        if(!confirm(t('checkUnanswered')+'\nCâu chưa làm: '+unanswered.join(', ')+'\n\n'+t('sureSubmit')))return;
    } else {
        if(!confirm(t('sureSubmit')))return;
    }
    clearInterval(timerInterval);
    if(type==='hw')doSubmitHW();else doSubmitEx();
}
function doSubmitHW(){
    const h=DB.hw_list.find(hw=>document.getElementById('exam-form'));
    if(!h)return;
    let ans={mcq:[],essay:[]};
    if(h.mcq)h.mcq.forEach((_,i)=>{const sel=document.querySelector(`input[name="mq${i}"]:checked`);ans.mcq.push(sel?sel.value:'');});
    if(h.essay)h.essay.forEach((_,i)=>{ans.essay.push(document.getElementById(`es${i}`)?.value||'');});
    const d=Math.floor((new Date()-stm)/1000);
    if(!DB.submissions)DB.submissions=[];
    DB.submissions.push({u:U.u,type:'hw',n:h.n,con:JSON.stringify(ans),date:new Date().toLocaleString(),dur:Math.floor(d/60)+'p'+d%60+'s'});
    save('/submissions',DB.submissions);alert('✅');navSt('homework');
}
function doSubmitEx(){
    const x=DB.exams.find(e=>document.getElementById('exam-form'));
    if(!x)return;
    let ans={mcq:[],essay:[]};
    if(x.mcq)x.mcq.forEach((_,i)=>{const sel=document.querySelector(`input[name="mq${i}"]:checked`);ans.mcq.push(sel?sel.value:'');});
    if(x.essay)x.essay.forEach((_,i)=>{ans.essay.push(document.getElementById(`es${i}`)?.value||'');});
    let mcqScore=0;
    if(x.mcq)x.mcq.forEach((m,i)=>{if(ans.mcq[i]===m.ans)mcqScore+=m.pt;});
    const d=Math.floor((new Date()-stm)/1000);
    if(!DB.submissions)DB.submissions=[];
    DB.submissions.push({u:U.u,type:'exam',n:x.n,con:JSON.stringify(ans),date:new Date().toLocaleString(),dur:Math.floor(d/60)+'p'+d%60+'s',mcqScore:mcqScore,essayScore:0,scored:false});
    save('/submissions',DB.submissions);
    alert(`✅ Đã nộp!\nĐiểm trắc nghiệm: ${mcqScore}đ\nTự luận: Chờ admin chấm`);
    navSt('exam');
}
function vwMySub(n){const ms=(DB.submissions||[]).filter(s=>s.u===U.u&&s.n===n&&s.type==='hw');document.getElementById('hv-main').innerHTML=`<h4>📋 ${n} (${ms.length})</h4>`+ms.map(s=>{let ans='';try{const a=JSON.parse(s.con);if(a.mcq)ans+='TN: '+a.mcq.map((v,i)=>`C${i+1}:${v||'-'}`).join(', ')+'\n';if(a.essay)ans+='TL: '+a.essay.map((v,i)=>`C${i+1}: ${v||'-'}`).join('\n');}catch(e){ans=s.con;}return `<div class="card"><small>${s.date}</small><pre style="white-space:pre-wrap">${ans}</pre></div>`;}).join('')+`<button class="btn btn-outline" onclick="navSt('homework')">←</button>`;}
function vwExRes(n){const sub=(DB.submissions||[]).find(s=>s.u===U.u&&s.n===n&&s.type==='exam');if(!sub)return;let ans='';try{const a=JSON.parse(sub.con);if(a.mcq)ans+='TN: '+a.mcq.map((v,i)=>`C${i+1}:${v||'-'}`).join(', ')+'\n';if(a.essay)ans+='TL: '+a.essay.map((v,i)=>`C${i+1}: ${v||'-'}`).join('\n');}catch(e){ans=sub.con;}document.getElementById('hv-main').innerHTML=`<h4>📄 ${n}</h4><div class="card"><pre style="white-space:pre-wrap">${ans}</pre><small>${sub.date} | TN:${sub.mcqScore||'?'}đ | TL:${sub.essayScore||'?'}đ</small></div><button class="btn btn-outline" onclick="navSt('exam')">←</button>`;}

loadDB();
</script>
